<style>
:root{--navy:#0a0a1a;--navy2:#101834;--cyan:#38bdf8;--ice:#7dd3fc;--white:#fff;--gray:#94a3b8;--gold:#fbbf24;--red:#ef4444;--green:#10b981;--indigo:#818cf8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Inter,system-ui,sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
.topbar{background:rgba(10,10,26,0.95);border-bottom:1px solid rgba(56,189,248,0.1);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.topbar h1{font-size:18px;font-weight:800}
.topbar h1 span{color:var(--cyan)}
.topbar-stats{display:flex;gap:20px;font-size:12px;color:var(--gray)}
.topbar-stats b{color:var(--cyan);font-size:16px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;padding:16px 28px;background:rgba(16,24,52,0.5);border-bottom:1px solid rgba(56,189,248,0.06)}
.filter-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(56,189,248,0.12);color:var(--gray);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.filter-btn:hover,.filter-btn.active{background:rgba(56,189,248,0.15);color:var(--white);border-color:rgba(56,189,248,0.3)}
.container{max-width:1300px;margin:0 auto;padding:24px 28px}
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.service-card{background:rgba(10,10,26,0.6);border:1px solid rgba(56,189,248,0.08);border-radius:18px;padding:22px 24px;transition:all .2s;cursor:default;position:relative;overflow:hidden}
.service-card:hover{border-color:rgba(56,189,248,0.25);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent));opacity:0;transition:opacity .3s}
.service-card:hover::before{opacity:1}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-num{font-size:12px;font-weight:800;color:var(--cyan);opacity:0.5}
.card-icon{font-size:28px;line-height:1}
.card-title{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.3}
.card-desc{font-size:12px;color:var(--gray);line-height:1.5;margin-bottom:12px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{font-size:10px;padding:3px 9px;border-radius:12px;font-weight:600}
.tag-sector{background:rgba(56,189,248,0.1);color:var(--cyan);border:1px solid rgba(56,189,248,0.15)}
.tag-price{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.tag-diff{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.15)}
.card-footer{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--gray);padding-top:10px;border-top:1px solid rgba(255,255,255,0.04)}
.card-footer span{display:flex;align-items:center;gap:4px}
.empty-state{text-align:center;padding:60px;grid-column:1/-1}
.empty-state .icon{font-size:48px;margin-bottom:12px;display:block}
.sector-section{margin-bottom:32px}
.sector-title{font-size:15px;font-weight:700;color:var(--cyan);margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
  .sector-title::after{content:'';flex:1;height:1px;background:rgba(56,189,248,0.1)}
  .sector-nav{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:20px 28px;max-width:1300px;margin:0 auto;width:100%}
  .sector-card{background:linear-gradient(135deg,rgba(16,24,52,0.8),rgba(10,10,26,0.9));border:1px solid rgba(56,189,248,0.12);border-radius:16px;padding:24px 20px;text-align:center;text-decoration:none;color:var(--white);transition:all .3s;position:relative;overflow:hidden}
  .sector-card:hover{border-color:rgba(56,189,248,0.4);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
  .sector-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0;transition:opacity .3s}
  .sector-card:hover::before{opacity:1}
  .sector-card-icon{font-size:40px;display:block;margin-bottom:10px}
  .sector-card-title{font-size:18px;font-weight:700;margin-bottom:4px}
  .sector-card-sub{font-size:12px;color:var(--gray)}
  @media(max-width:768px){.services-grid{grid-template-columns:1fr}.topbar-stats{display:none}.filter-bar{gap:4px}.sector-nav{grid-template-columns:1fr}}
.mobile-toggle { display:none; background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:4px; }
.mobile-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,5,16,0.97); backdrop-filter:blur(20px); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
.mobile-overlay.open { display:flex; }
.mobile-overlay a { color:#fff; font-size:20px; font-weight:600; text-decoration:none; transition:0.3s; }
.mobile-overlay a:hover { color:#38bdf8; }
.mobile-close { position:absolute; top:20px; right:24px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; }
</style>
</head>

<script>
const hizmetler = [
  // A. MUHASEBE & FİNANS
  {id:1,sektor:'muhasebe',ikon:'ğŸ§¾',baslik:'Akıllı Fatura İşleme Asistanı',aciklama:'PDF/taranmış faturaları otomatik okuyup yapılandırılmış veriye çevirir. Tarih, tedarikçi, kalem, KDV — hepsini ayıklar. Google Sheets\'e aktarır.',zorluk:'Orta',fiyat:'2.500-5.000 TL',kaynak:'LlamaParse + OpenAI + Google Sheets'},
  {id:2,sektor:'muhasebe',ikon:'ğŸ“§',baslik:'Gmail Harcama Takip ve Kategorizasyon',aciklama:'E-postalarınızdan fatura ve ödeme bildirimlerini otomatik ayıklar. Kategori bazlı gider takibi, KDV hesaplama, Google Sheets\'e anlık kayıt. Mikro işletmeler için muhasebe öncesi.',zorluk:'Düşük',fiyat:'1.000-2.000 TL',kaynak:'Gmail + OpenAI + Google Sheets'},

  // B. E-TİCARET
  {id:3,sektor:'eticaret',ikon:'â­',baslik:'Ürün Yorum Analizi ve İtibar Yönetimi',aciklama:'Trendyol, Hepsiburada, Google Maps yorumlarınızı toplar, duygu analizi yapar. Olumsuz yorumları anında e-posta ile bildirir. Aylık itibar raporu.',zorluk:'Düşük',fiyat:'1.000-2.500 TL',kaynak:'DeepSeek + OpenAI + Google Sheets'},

  // C. PAZARLAMA
  {id:4,sektor:'pazarlama',ikon:'ğŸ“±',baslik:'4 Platforma Tek Tıkla İçerik',aciklama:'Tek bir brief\'ten X, LinkedIn, Instagram, Facebook için optimize içerik, hashtag ve SEO anahtar kelimeleri üretir. Sosyal medya ekibine haftada 10 saat kazandırır.',zorluk:'Düşük',fiyat:'2.000-4.000 TL',kaynak:'OpenAI + Google Sheets'},
  {id:5,sektor:'pazarlama',ikon:'ğŸ“ˆ',baslik:'Google Analytics AI Raporlama',aciklama:'Haftalık GA4 verilerinizi AI analiz eder. "Geçen haftaya göre trafik %15 arttı, en çok şu sayfa tıklandı" şeklinde Türkçe özet rapor. E-postayla gelsin.',zorluk:'Düşük',fiyat:'1.000-2.500 TL',kaynak:'Google Analytics + OpenAI + Gmail'},
  {id:6,sektor:'pazarlama',ikon:'ğŸ“…',baslik:'Sosyal Medya İçerik Takvimi',aciklama:'Aylık içerik takvimi oluşturur. Caption\'ları AI yazar. 30 günlük içerik tek seferde — sadece marka bilginizi paylaşın.',zorluk:'Düşük',fiyat:'2.500-5.000 TL',kaynak:'OpenAI + Google Sheets + Google Calendar'},

  // D. MÜÅTERİ HİZMETLERİ
  {id:7,sektor:'destek',ikon:'ğŸ“¬',baslik:'E-posta Özetleme ve Akıllı Yanıt',aciklama:'Yoğun e-posta alan yöneticiler için: Gelen e-postaları özetler, taslak yanıt hazırlar. Göndermeden önce size onaylatır. Human-in-the-loop.',zorluk:'Düşük',fiyat:'1.500-3.000 TL',kaynak:'IMAP + OpenAI + Gmail'},
  {id:8,sektor:'destek',ikon:'ğŸ’¬',baslik:'WhatsApp AI Asistan',aciklama:'Mevcut WhatsApp numaranıza bağlanır. Müşteri mesajlarına 7/24 AI ile Türkçe yanıt verir. SSS, randevu, ürün bilgisi — hepsi otomatik. Biz kurarız, siz sadece QR tarayın.',zorluk:'Düşük',fiyat:'1.000-2.000 TL',kaynak:'whatsapp-web.js + OpenAI + Groq'},

  // E. DOKÜMAN & VERİ
  {id:9,sektor:'dokuman',ikon:'ğŸ¦',baslik:'Banka Ekstresi Dijitalleştirme',aciklama:'Taranmış banka ekstrelerini (PDF/görüntü) AI ile okur. Yapılandırılmış veriye çevirir, Google Sheets\'e aktarır. Gelir-gider analizi yapar.',zorluk:'Orta',fiyat:'2.000-4.000 TL',kaynak:'Gemini Vision + OpenAI + Google Sheets'},

  // F. PROJE & OPERASYON
  {id:10,sektor:'proje',ikon:'ğŸš€',baslik:'Müşteri Onboarding Otomasyonu',aciklama:'Yeni müşteri kaydıyla birlikte hoş geldin e-postası, belge talebi, onboarding checklist\'i ve takvim daveti — hepsi otomatik.',zorluk:'Düşük',fiyat:'1.000-2.500 TL',kaynak:'Webhook + Gmail + Google Sheets + Calendar'}
];

const zorlukEmoji = {Düşük:'ğŸŸ¢',Orta:'ğŸŸ¡',Yüksek:'ğŸ”´'};
let aktifFiltre = 'all';

function render(filter) {
  const filtrelenmis = filter === 'all' ? hizmetler : hizmetler.filter(h => h.sektor === filter);
  const sektorAdlari = {muhasebe:'Muhasebe & Finans',satis:'Satış & CRM',ik:'İnsan Kaynakları',eticaret:'E-Ticaret & Perakende',pazarlama:'Pazarlama & İçerik',destek:'Müşteri Hizmetleri',dokuman:'Doküman & Veri Yönetimi',proje:'Proje & Operasyon',teknik:'Teknik & DevOps'};

  const grid = document.getElementById('servicesGrid');

  if (filter === 'all') {
    const sektorler = [...new Set(hizmetler.map(h=>h.sektor))];
    grid.innerHTML = sektorler.map(sektor => {
      const hizmetler = filtrelenmis.filter(h=>h.sektor===sektor);
      if (hizmetler.length===0) return '';
      return `<div class="sector-section" style="grid-column:1/-1"><div class="sector-title">${sektorAdlari[sektor]}</div></div>` +
        hizmetler.map(h => kartHTML(h)).join('');
    }).join('');
  } else {
    grid.innerHTML = filtrelenmis.length ? filtrelenmis.map(h => kartHTML(h)).join('') :
      `<div class="empty-state"><span class="icon">ğŸ“­</span>Bu kategoride henüz hizmet yok.</div>`;
  }
}

function kartHTML(h) {
  return `<div class="service-card">
    <div class="card-header"><span class="card-num">#${h.id}</span><span class="card-icon">${h.ikon}</span></div>
    <div class="card-title">${h.baslik}</div>
    <div class="card-desc">${h.aciklama}</div>
    <div class="card-tags">
      <span class="tag tag-price">${h.fiyat}</span>
      <span class="tag tag-diff">${zorlukEmoji[h.zorluk]} ${h.zorluk}</span>
      <span class="tag tag-sector">${h.kaynak.split('+')[0].trim()}</span>
    </div>
    <div class="card-footer">
      <span>ğŸ”— ${h.kaynak}</span>
    </div>
  </div>`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    aktifFiltre = this.dataset.filter;
    render(aktifFiltre);
  });
});

render('all');
</script>

<script>

</script>
