<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kivon | Hizmet Kataloğu — 30 AI Otomasyon Çözümü</title>
<style>
:root{--navy:#0a0a1a;--navy2:#101834;--cyan:#38bdf8;--ice:#7dd3fc;--white:#fff;--gray:#94a3b8;--gold:#fbbf24;--red:#ef4444;--green:#10b981;--indigo:#818cf8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Inter,system-ui,sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
.topbar{background:rgba(10,10,26,0.95);border-bottom:1px solid rgba(56,189,248,0.1);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.topbar h1{font-size:18px;font-weight:800}
.topbar h1 span{color:var(--cyan)}
.topbar-stats{display:flex;gap:20px;font-size:12px;color:var(--gray)}
.topbar-stats b{color:var(--cyan);font-size:16px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;padding:16px 28px;background:rgba(16,24,52,0.5);border-bottom:1px solid rgba(56,189,248,0.06)}
.filter-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(56,189,248,0.12);color:var(--gray);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.filter-btn:hover,.filter-btn.active{background:rgba(56,189,248,0.15);color:var(--white);border-color:rgba(56,189,248,0.3)}
.container{max-width:1300px;margin:0 auto;padding:24px 28px}
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.service-card{background:rgba(10,10,26,0.6);border:1px solid rgba(56,189,248,0.08);border-radius:18px;padding:22px 24px;transition:all .2s;cursor:default;position:relative;overflow:hidden}
.service-card:hover{border-color:rgba(56,189,248,0.25);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent));opacity:0;transition:opacity .3s}
.service-card:hover::before{opacity:1}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-num{font-size:12px;font-weight:800;color:var(--cyan);opacity:0.5}
.card-icon{font-size:28px;line-height:1}
.card-title{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.3}
.card-desc{font-size:12px;color:var(--gray);line-height:1.5;margin-bottom:12px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{font-size:10px;padding:3px 9px;border-radius:12px;font-weight:600}
.tag-sector{background:rgba(56,189,248,0.1);color:var(--cyan);border:1px solid rgba(56,189,248,0.15)}
.tag-price{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.tag-diff{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.15)}
.card-footer{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--gray);padding-top:10px;border-top:1px solid rgba(255,255,255,0.04)}
.card-footer span{display:flex;align-items:center;gap:4px}
.empty-state{text-align:center;padding:60px;grid-column:1/-1}
.empty-state .icon{font-size:48px;margin-bottom:12px;display:block}
.sector-section{margin-bottom:32px}
.sector-title{font-size:15px;font-weight:700;color:var(--cyan);margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
.sector-title::after{content:'';flex:1;height:1px;background:rgba(56,189,248,0.1)}
@media(max-width:768px){.services-grid{grid-template-columns:1fr}.topbar-stats{display:none}.filter-bar{gap:4px}}
</style>
</head>
<body>

<div class="topbar">
  <h1><span>Kivon</span> Hizmet Kataloğu</h1>
  <div class="topbar-stats">
    <span>Toplam: <b>30</b></span>
    <span>Sektör: <b>9</b></span>
    <span>n8n tabanlı: <b>%100</b></span>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">Tümü</button>
  <button class="filter-btn" data-filter="muhasebe">💰 Muhasebe & Finans</button>
  <button class="filter-btn" data-filter="satis">📊 Satış & CRM</button>
  <button class="filter-btn" data-filter="ik">👥 İnsan Kaynakları</button>
  <button class="filter-btn" data-filter="eticaret">🛒 E-Ticaret</button>
  <button class="filter-btn" data-filter="pazarlama">📢 Pazarlama</button>
  <button class="filter-btn" data-filter="destek">🎧 Müşteri Hizmetleri</button>
  <button class="filter-btn" data-filter="dokuman">📄 Doküman & Veri</button>
  <button class="filter-btn" data-filter="proje">📋 Proje & Operasyon</button>
  <button class="filter-btn" data-filter="teknik">⚙️ Teknik & DevOps</button>
</div>

<div class="container">
  <div class="services-grid" id="servicesGrid"></div>
</div>

<script>
const hizmetler = [
  // A. MUHASEBE & FİNANS
  {id:1,sektor:'muhasebe',ikon:'🧾',baslik:'Akıllı Fatura İşleme Asistanı',aciklama:'PDF/taranmış faturaları otomatik okuyup yapılandırılmış veriye çevirir. Tarih, tedarikçi, kalem, KDV — hepsini ayıklar. LOGO/Paraşüt/Mikro gibi muhasebe yazılımlarına aktarır.',zorluk:'Orta',fiyat:'2.500-5.000 TL',kaynak:'LlamaParse + OpenAI + Muhasebe API'},
  {id:2,sektor:'muhasebe',ikon:'🏢',baslik:'Kira ve Cari Mutabakat Otomasyonu',aciklama:'Banka dekontlarınızı kiracı/borçlu listenizle otomatik eşleştirir. Hangi kiracı ödedi, hangisi gecikti — anında rapor. Gayrimenkul yatırımcıları ve emlak ofisleri için.',zorluk:'Düşük',fiyat:'1.500-3.000 TL',kaynak:'Excel + OpenAI + Banka API'},
  {id:3,sektor:'muhasebe',ikon:'📧',baslik:'Gmail Harcama Takip ve Kategorizasyon',aciklama:'E-postalarınızdan fatura ve ödeme bildirimlerini otomatik ayıklar. Kategori bazlı gider takibi, KDV hesaplama, Google Sheets\'e anlık kayıt. Mikro işletmeler için muhasebe öncesi.',zorluk:'Düşük',fiyat:'1.000-2.000 TL',kaynak:'Gmail + OpenAI + Google Sheets'},
  {id:4,sektor:'muhasebe',ikon:'📚',baslik:'Türk Vergi Mevzuatı AI Asistanı',aciklama:'Vergi kanunları, tebliğler, özelgeler vektör veritabanında. Muhasebeciler "şu durumda KDV istisnası var mı?" diye sorar, anında madde numarasıyla cevap alır.',zorluk:'Yüksek',fiyat:'3.000-7.500 TL',kaynak:'Qdrant + Mistral + OpenAI + RAG'},

  // B. SATIŞ & CRM
  {id:5,sektor:'satis',ikon:'💬',baslik:'WhatsApp Business AI Satış Asistanı',aciklama:'WhatsApp\'tan gelen müşteri sorularına 7/24 ürün kataloğu ve fiyat bilgisiyle yanıt verir. Sipariş alır, randevu oluşturur. Restoran, e-ticaret, hizmet sektörü için.',zorluk:'Düşük',fiyat:'1.500-3.000 TL',kaynak:'WhatsApp Business API + OpenAI + Qdrant'},
  {id:6,sektor:'satis',ikon:'🎯',baslik:'Otomatik Müşteri Adayı (Lead) Keşif',aciklama:'LinkedIn ve sosyal medyadan ideal müşteri profiline uyan kişileri tespit eder. AI ile kişiselleştirilmiş erişim e-postaları oluşturur. Outbound satışı otomatikleştirir.',zorluk:'Orta',fiyat:'2.000-4.000 TL',kaynak:'LinkedIn API + Gmail + OpenAI'},
  {id:7,sektor:'satis',ikon:'📅',baslik:'Akıllı Randevu Takip ve SMS Follow-up',aciklama:'Randevu alan ama gelmeyen/cevap vermeyen müşterilere 3 günde bir otomatik SMS/WhatsApp takibi. Kuaför, diş hekimi, estetik klinikleri, danışmanlar için.',zorluk:'Düşük',fiyat:'1.500-3.000 TL',kaynak:'Twilio + Cal.com + OpenAI + Airtable'},
  {id:8,sektor:'satis',ikon:'🤝',baslik:'CRM AI Canlı Destek Entegrasyonu',aciklama:'Web sitenizdeki canlı sohbeti AI ile yanıtlar. Lead bilgilerini otomatik CRM\'e kaydeder. HubSpot, Salesforce veya özel CRM\'inizle çalışır.',zorluk:'Düşük',fiyat:'1.500-3.000 TL',kaynak:'HubSpot + OpenAI + Airtable'},

  // C. İNSAN KAYNAKLARI
  {id:9,sektor:'ik',ikon:'📋',baslik:'Toplu CV Tarama ve Kısa Liste',aciklama:'Yüzlerce CV\'yi iş tanımınızla karşılaştırır, AI puanlaması yapar. En uygun adayları İK\'ya e-posta ile bildirir. İşe alım süresini %70 kısaltır.',zorluk:'Orta',fiyat:'3.000-7.500 TL',kaynak:'OpenAI + Supabase + Gmail + PDF Extract'},
  {id:10,sektor:'ik',ikon:'🎤',baslik:'AI Mülakat Asistanı',aciklama:'Pozisyona özel dinamik sorular üretir. Aday cevaplarını değerlendirir, puanlama ve rapor oluşturur. İlk tur elemeyi otomatikleştirir.',zorluk:'Orta',fiyat:'2.500-5.000 TL',kaynak:'n8n Forms + OpenAI Agent + Airtable'},
  {id:11,sektor:'ik',ikon:'📖',baslik:'Şirket İçi Politika Chatbot\'u',aciklama:'İzin yönetmeliği, yan haklar, disiplin prosedürü... Tüm şirket içi dokümanları öğrenir. Çalışanlar "yıllık iznim kaç gün" diye sorar, anında cevap alır.',zorluk:'Orta',fiyat:'3.000-6.000 TL',kaynak:'BambooHR + OpenAI + Pinecone + RAG'},
  {id:12,sektor:'ik',ikon:'🔍',baslik:'İşyeri Uyum ve Ayrımcılık Analizi',aciklama:'Kurumsal iletişimleri (e-posta, Slack) tarayarak ayrımcılık, mobbing veya uyum risklerini tespit eder. 50+ çalışanlı firmalar için erken uyarı sistemi.',zorluk:'Yüksek',fiyat:'5.000-10.000 TL',kaynak:'OpenAI + Slack API + Gmail'},

  // D. E-TİCARET
  {id:13,sektor:'eticaret',ikon:'🛍️',baslik:'Akıllı Kişisel Alışveriş Asistanı',aciklama:'Ürün kataloğunuzu bilen, müşteriye "bu bütçeyle en iyi laptop" gibi sorularda akıllı öneri yapan chatbot. WooCommerce/Shopify entegre.',zorluk:'Orta',fiyat:'2.000-4.000 TL',kaynak:'WooCommerce + OpenAI + Google Drive + RAG'},
  {id:14,sektor:'eticaret',ikon:'⭐',baslik:'Ürün Yorum Analizi ve İtibar Yönetimi',aciklama:'Trendyol, Hepsiburada, Google Maps yorumlarınızı toplar, duygu analizi yapar. Olumsuz yorumları anında WhatsApp\'la size bildirir. Aylık itibar raporu.',zorluk:'Düşük',fiyat:'1.000-2.500 TL',kaynak:'DeepSeek + OpenAI + Google Drive + WhatsApp'},
  {id:15,sektor:'eticaret',ikon:'📦',baslik:'Sipariş ve Stok Takip Asistanı',aciklama:'Stok seviyelerini anlık izler, kritik seviye uyarısı verir. Müşteri "siparişim nerede" diye sorduğunda kargo durumunu anında söyler.',zorluk:'Orta',fiyat:'2.000-4.000 TL',kaynak:'WooCommerce/Shopify API + OpenAI + WhatsApp'},
  {id:16,sektor:'eticaret',ikon:'🔄',baslik:'İade ve Değişim Süreç Otomasyonu',aciklama:'İade/değişim taleplerini chatbot karşılar. Kuralları hatırlatır, iade kodu oluşturur. Karmaşık vakaları insana yönlendirir. Müşteri memnuniyetsizliğini iadeye dönüşmeden çözer.',zorluk:'Düşük',fiyat:'1.500-3.000 TL',kaynak:'n8n Chat + OpenAI + CRM API'},

  // E. PAZARLAMA
  {id:17,sektor:'pazarlama',ikon:'📱',baslik:'4 Platforma Tek Tıkla İçerik',aciklama:'Tek bir blog yazısından X, LinkedIn, Instagram, Facebook için optimize içerik, hashtag ve SEO anahtar kelimeleri üretir. Sosyal medya ekibine haftada 10 saat kazandırır.',zorluk:'Düşük',fiyat:'2.000-4.000 TL',kaynak:'OpenAI + WordPress + Sosyal Medya API'},
  {id:18,sektor:'pazarlama',ikon:'✍️',baslik:'Marka Sesiyle Otomatik Blog',aciklama:'Geçmiş içeriklerinizden marka sesinizi öğrenir. SEO odaklı blog yazıları üretir, WordPress\'te otomatik yayınlar. Haftalık 3-5 yazı.',zorluk:'Düşük',fiyat:'2.000-4.000 TL',kaynak:'WordPress + OpenAI + SEO Analiz'},
  {id:19,sektor:'pazarlama',ikon:'📈',baslik:'Google Analytics AI Raporlama',aciklama:'Haftalık GA4 verilerinizi AI analiz eder. "Geçen haftaya göre trafik %15 arttı, en çok şu sayfa tıklandı" şeklinde Türkçe özet rapor. E-postayla gelsin.',zorluk:'Düşük',fiyat:'1.000-2.500 TL',kaynak:'Google Analytics + OpenAI + Baserow'},
  {id:20,sektor:'pazarlama',ikon:'📅',baslik:'Sosyal Medya İçerik Takvimi',aciklama:'Aylık içerik takvimi oluşturur. Caption\'ları AI yazar, görselleri hazırlar. Planlanan zamanda otomatik paylaşır. 30 günlük içerik tek seferde.',zorluk:'Düşük',fiyat:'2.500-5.000 TL',kaynak:'OpenAI + Instagram API + Google Calendar'},

  // F. MÜŞTERİ HİZMETLERİ
  {id:21,sektor:'destek',ikon:'🎙️',baslik:'Sesli Müşteri Hizmetleri (Türkçe)',aciklama:'Telefonla arayan müşterileri Türkçe AI ses ile karşılar. SSS\'leri yanıtlar, gerekirse insana aktarır. Çağrı merkezi maliyetini %60 düşürür.',zorluk:'Yüksek',fiyat:'4.000-8.000 TL',kaynak:'ElevenLabs + OpenAI + Qdrant + Telefon API'},
  {id:22,sektor:'destek',ikon:'🎫',baslik:'Akıllı Destek Bilet Sistemi',aciklama:'Slack/Discord/Telegram destek kanallarından gelen mesajları AI önceliklendirir. Kategorize eder, otomatik ticket açar, doğru ekibe yönlendirir.',zorluk:'Orta',fiyat:'2.000-4.000 TL',kaynak:'Slack + OpenAI + Linear/Jira'},
  {id:23,sektor:'destek',ikon:'📬',baslik:'E-posta Özetleme ve Akıllı Yanıt',aciklama:'Yoğun e-posta alan yöneticiler için: Gelen e-postaları özetler, taslak yanıt hazırlar. Göndermeden önce size onaylatır. Human-in-the-loop.',zorluk:'Düşük',fiyat:'1.500-3.000 TL',kaynak:'IMAP + OpenAI + Gmail + DeepSeek'},
  {id:24,sektor:'destek',ikon:'🤖',baslik:'Telegram AI Asistan',aciklama:'Telegram\'da çalışan, komut tabanlı veya serbest sohbet eden AI asistan. SSS, ürün bilgisi, destek — hepsi Telegram\'da.',zorluk:'Düşük',fiyat:'1.000-2.000 TL',kaynak:'Telegram Bot API + OpenAI'},

  // G. DOKÜMAN & VERİ
  {id:25,sektor:'dokuman',ikon:'📚',baslik:'Şirket İçi Bilgi Tabanı AI',aciklama:'Tüm şirket dokümanlarınızı, prosedürlerinizi, fiyat listelerinizi vektörleştirir. "Bu ürünün toptan fiyatı ne?" diye sorun, anında cevap.',zorluk:'Orta',fiyat:'3.000-6.000 TL',kaynak:'Google Drive + Gemini + Pinecone + RAG'},
  {id:26,sektor:'dokuman',ikon:'🏦',baslik:'Banka Ekstresi Dijitalleştirme',aciklama:'Taranmış banka ekstrelerini (PDF/görüntü) Gemini Vision ile okur. Yapılandırılmış veriye çevirir. Gelir-gider analizi yapar.',zorluk:'Orta',fiyat:'2.000-4.000 TL',kaynak:'Gemini Vision + Google Drive + OpenAI'},
  {id:27,sektor:'dokuman',ikon:'🗄️',baslik:'Doğal Dil ile Veritabanı Sorgulama',aciklama:'Teknik bilmeseniz de "Bu ay en çok satan 5 ürün hangisi?" diye sorun. AI SQL yazıp çalıştırır, cevabı grafikle gösterir.',zorluk:'Orta',fiyat:'2.500-5.000 TL',kaynak:'PostgreSQL + OpenAI + Chart.js'},

  // H. PROJE & OPERASYON
  {id:28,sektor:'proje',ikon:'🎥',baslik:'Toplantı Asistanı: Not, Görev, Takip',aciklama:'Zoom/Teams toplantı kayıtlarını AI özetler. Aksiyon maddelerini ClickUp/Notion\'da görev açar. Katılımcılara e-posta ile özet gönderir.',zorluk:'Düşük',fiyat:'1.500-3.000 TL',kaynak:'Zoom + OpenAI + ClickUp/Trello + Gmail'},
  {id:29,sektor:'proje',ikon:'🚀',baslik:'Müşteri Onboarding Otomasyonu',aciklama:'Yeni müşteri kaydıyla birlikte hoş geldin e-postası, belge talebi, onboarding checklist\'i ve takvim daveti — hepsi otomatik.',zorluk:'Düşük',fiyat:'1.000-2.500 TL',kaynak:'Webhook + Gmail + Google Sheets + Calendar'},

  // I. TEKNİK & DEVOPS
  {id:30,sektor:'teknik',ikon:'🐳',baslik:'Akıllı Sunucu ve Servis Yönetimi',aciklama:'Webhook ile Docker servislerini start/stop edin. Sistem hatalarını AI kategorize edip doğru geliştiriciye atar. Log analizi ve uptime takibi.',zorluk:'Orta',fiyat:'2.000-4.000 TL',kaynak:'SSH + Docker + Linear + OpenAI'}
];

const zorlukEmoji = {Düşük:'🟢',Orta:'🟡',Yüksek:'🔴'};
let aktifFiltre = 'all';

function render(filter) {
  const filtrelenmis = filter === 'all' ? hizmetler : hizmetler.filter(h => h.sektor === filter);
  const sektorAdlari = {muhasebe:'Muhasebe & Finans',satis:'Satış & CRM',ik:'İnsan Kaynakları',eticaret:'E-Ticaret & Perakende',pazarlama:'Pazarlama & İçerik',destek:'Müşteri Hizmetleri',dokuman:'Doküman & Veri Yönetimi',proje:'Proje & Operasyon',teknik:'Teknik & DevOps'};

  const grid = document.getElementById('servicesGrid');

  if (filter === 'all') {
    const sektorler = [...new Set(hizmetler.map(h=>h.sektor))];
    grid.innerHTML = sektorler.map(sektor => {
      const hizmetler = filtrelenmis.filter(h=>h.sektor===sektor);
      if (hizmetler.length===0) return '';
      return `<div class="sector-section" style="grid-column:1/-1"><div class="sector-title">${sektorAdlari[sektor]}</div></div>` +
        hizmetler.map(h => kartHTML(h)).join('');
    }).join('');
  } else {
    grid.innerHTML = filtrelenmis.length ? filtrelenmis.map(h => kartHTML(h)).join('') :
      `<div class="empty-state"><span class="icon">📭</span>Bu kategoride henüz hizmet yok.</div>`;
  }
}

function kartHTML(h) {
  return `<div class="service-card">
    <div class="card-header"><span class="card-num">#${h.id}</span><span class="card-icon">${h.ikon}</span></div>
    <div class="card-title">${h.baslik}</div>
    <div class="card-desc">${h.aciklama}</div>
    <div class="card-tags">
      <span class="tag tag-price">${h.fiyat}</span>
      <span class="tag tag-diff">${zorlukEmoji[h.zorluk]} ${h.zorluk}</span>
      <span class="tag tag-sector">${h.kaynak.split('+')[0].trim()}</span>
    </div>
    <div class="card-footer">
      <span>🔗 ${h.kaynak}</span>
    </div>
  </div>`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    aktifFiltre = this.dataset.filter;
    render(aktifFiltre);
  });
});

render('all');
</script>
</body>
</html>
