<!DOCTYPE html>
<html lang="tr">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1777930373819703" crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIVON — AI Tanı</title>
<meta name="description" content="KIVON AI Tanı - İşletmenize en uygun yapay zeka çözümünü bulun. Sektör ve ihtiyaçlarınıza göre özel AI önerileri.">
<meta name="keywords" content="KIVON, yapay zeka, KOBİ, AI tanı, Bursa, AI danışmanlık, çözüm bul">

<meta property="og:title" content="KIVON - İşletmene Özel AI Çözümü Bul">
<meta property="og:description" content="KIVON AI Tanı - İşletmenize en uygun yapay zeka çözümünü bulun. Sektör ve ihtiyaçlarınıza göre özel AI önerileri.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kivontr.com/ai-tani.html">
<link rel="canonical" href="https://kivontr.com/ai-tani.html">
<style>
:root{--navy:#0a0a1a;--navy2:#101834;--cyan:#38bdf8;--ice:#7dd3fc;--white:#fff;--gray:#94a3b8;--gold:#fbbf24;--green:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Inter,system-ui,sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{max-width:700px;width:100%}
.header{text-align:center;margin-bottom:40px}
.header h1{font-size:clamp(24px,5vw,40px);font-weight:800;line-height:1.2;margin-bottom:10px}
.header h1 span{color:var(--cyan)}
.header p{color:var(--gray);font-size:16px}
.form-card{background:rgba(10,10,26,0.7);border:1px solid rgba(56,189,248,0.1);border-radius:24px;padding:36px 32px;backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.form-group{margin-bottom:24px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.form-group select,.form-group textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(56,189,248,0.15);border-radius:12px;padding:12px 16px;color:var(--white);font-size:15px;font-family:inherit;transition:all .2s;resize:vertical}
.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(56,189,248,0.08)}
.form-group select option{background:var(--navy);color:var(--white)}
.form-group textarea{min-height:100px}
.btn{width:100%;background:linear-gradient(135deg,var(--cyan),#6366f1);color:var(--white);border:none;padding:16px;border-radius:14px;font-weight:700;font-size:16px;cursor:pointer;font-family:inherit;transition:all .3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(56,189,248,0.3)}
.btn:disabled{opacity:0.5;cursor:wait;transform:none}
.result{display:none;margin-top:28px;animation:fadeUp .5s ease}
.result.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.result-card{background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:20px;padding:28px 24px;margin-bottom:16px}
.result-card h3{font-size:16px;font-weight:700;color:var(--cyan);margin-bottom:8px}
.result-card p{font-size:14px;color:var(--gray);line-height:1.6;white-space:pre-wrap}
.result-cta{text-align:center;margin-top:16px}
.result-cta a{display:inline-block;background:linear-gradient(135deg,#25D366,#1ea952);color:var(--white);padding:12px 28px;border-radius:12px;font-weight:700;text-decoration:none;font-size:15px;transition:all .2s}
.result-cta a:hover{transform:translateY(-2px)}
.steps{display:flex;justify-content:center;gap:8px;margin-bottom:32px}
.step{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all .3s}
.step.active{background:var(--cyan);box-shadow:0 0 12px rgba(56,189,248,0.4);width:28px;border-radius:5px}
.mobile-toggle { display:none; background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:4px; }
.mobile-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,5,16,0.97); backdrop-filter:blur(20px); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
.mobile-overlay.open { display:flex; }
.mobile-overlay a { color:#fff; font-size:20px; font-weight:600; text-decoration:none; transition:0.3s; }
.mobile-overlay a:hover { color:#38bdf8; }
.mobile-close { position:absolute; top:20px; right:24px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
  <div class="header" style="position:relative;">
    <button class="mobile-toggle" id="mobileToggle" style="position:absolute;top:0;right:0;">☰</button>
    <div class="steps"><div class="step active" id="step1"></div><div class="step" id="step2"></div></div>
    <h1>İşletmene Özel <span>AI Çözümü</span></h1>
    <p>30 saniyede doldur, Groq AI sana en uygun Kivon hizmetlerini önersin.</p>
  </div>

<div class="mobile-overlay" id="mobileOverlay">
  <button class="mobile-close" id="mobileClose">✕</button>
  <a href="index.html">Ana Sayfa</a>
</div>

  <div class="form-card">
    <div class="form-group"><label>Sektörünüz</label>
      <select id="sektor">
        <option value="">Seçiniz...</option>
        <option>Muhasebe / Mali Müşavirlik</option>
        <option>E-Ticaret / Online Satış</option>
        <option>Restoran / Kafe / Yemek</option>
        <option>Perakende / Mağaza</option>
        <option>Sağlık / Klinik / Muayenehane</option>
        <option>Hukuk / Avukatlık</option>
        <option>İnşaat / Gayrimenkul</option>
        <option>Eğitim / Kurs</option>
        <option>Yazılım / Teknoloji</option>
        <option>Diğer</option>
      </select>
    </div>
    <div class="form-group"><label>En büyük zaman kaybınız ne?</label>
      <textarea id="sorun" placeholder="Örn: Müşteriler sürekli aynı soruları soruyor, fatura ve evrak işleri çok vakit alıyor, randevuları takip edemiyorum..."></textarea>
    </div>
    <button class="btn" id="btn" onclick="analizEt()">🤖 AI Analiz Et</button>

    <div class="result" id="result"></div>
  </div>
</div>

<script>
const API_PROXY_URL = 'https://kivon-3.onrender.com/api/groq'; // ← Render URL gelince burayı değiştir
const PROXY = API_PROXY_URL;

async function analizEt() {
  const sektor = document.getElementById('sektor').value;
  const sorun = document.getElementById('sorun').value.trim();
  if (!sektor) { alert('Lütfen sektörünüzü seçin'); return; }
  if (sorun.length < 10) { alert('Lütfen en büyük zaman kaybınızı yazın (en az 10 karakter)'); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'â³ Groq AI analiz ediyor...';
  document.getElementById('step2').classList.add('active');

  const result = document.getElementById('result');
  result.innerHTML = '<div style="text-align:center;padding:30px"><div class="typing-dots"><span></span><span></span><span></span></div><p style="color:var(--gray);margin-top:12px">AI işletmenizi analiz ediyor...</p></div>';
  result.classList.add('show');

  try {
    const res = await fetch(PROXY, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        soru: `Isletme profili:\nSektor: ${sektor}\nEn buyuk zaman kaybi: ${sorun}\n\nBu isletme icin Kivon'un hangi 3 AI cozumu en uygun olur? Her birini 2-3 cumleyle, neden faydali olacagini anlatarak oner. En uygun paketi de belirt (Baslangic 5.000 TL, Profesyonel 8.000 TL, Kurumsal 12.000 TL). Sonuna "WhatsApp +905303982712" ve "14 gun ucretsiz deneme" hatirlatmasi ekle.`,
        sistem: 'Sen Kivon\'un AI cozum danismanisin. Kivon KOBİ\'lere chatbot, veri analitigi, proses otomasyonu ve AI danismanlik sunar. 30 farkli AI otomasyon hizmeti var. Profesyonel, samimi, Turkce cevap ver.'
      })
    });
    const data = await res.json();
    result.innerHTML = `<div class="result-card"><h3>💡 ${sektor} İçin Önerilen Çözümler</h3><p>${data.cevap || 'Analiz tamamlandı ancak detay alınamadı.'}</p></div>
    <div class="result-cta"><a href="https://wa.me/905303982712">💬 Ücretsiz Keşif Görüşmesi</a></div>`;
  } catch(e) {
    result.innerHTML = `<div class="result-card"><h3>âŒ Bağlantı Hatası</h3><p>API proxy çalışmıyor. Lütfen şu komutu çalıştırın:<br><code style="background:rgba(0,0,0,0.3);padding:4px 8px;border-radius:4px">node api-server.js</code></p></div>`;
  }

  btn.disabled = false;
  btn.textContent = '🔄 Tekrar Analiz Et';
}
</script>

<script>
(function(){var b=document.getElementById('mobileToggle'),o=document.getElementById('mobileOverlay'),c=document.getElementById('mobileClose');if(b&&o){b.onclick=function(){o.classList.add('open')};c.onclick=function(){o.classList.remove('open')};o.querySelectorAll('a').forEach(function(a){a.onclick=function(){o.classList.remove('open')}});}})();
</script>
<footer style="padding:40px 24px;text-align:center;border-top:1px solid rgba(56,189,248,0.04);position:relative;z-index:1"><p style="font-size:12px;color:rgba(255,255,255,0.12)">&copy; 2026 Kivon &middot; <a href="index.html" style="color:rgba(255,255,255,0.2)">Ana Sayfa</a></p></footer>
</body>
</html>
