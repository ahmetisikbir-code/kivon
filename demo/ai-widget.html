<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIVON — AI Widget</title>
<meta name="description" content="KIVON AI Widget - Web sitenize entegre edebileceğiniz yapay zeka sohbet widget'ı. Müşterilerinize 7/24 AI destek.">
<meta name="keywords" content="KIVON, yapay zeka, KOBİ, AI widget, Bursa, chatbot, web entegrasyon">
<meta name="author" content="KIVON">
<meta property="og:title" content="KIVON - AI Widget">
<meta property="og:description" content="KIVON AI Widget - Web sitenize entegre edebileceğiniz yapay zeka sohbet widget'ı. Müşterilerinize 7/24 AI destek.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kivontr.com/demo/ai-widget.html">
<link rel="canonical" href="https://kivontr.com/demo/ai-widget.html">
<style>
:root{--navy:#0a0a1a;--cyan:#38bdf8;--white:#fff;--gray:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Inter,system-ui,sans-serif;background:transparent}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),#6366f1);border:none;cursor:pointer;font-size:24px;color:var(--white);box-shadow:0 8px 32px rgba(56,189,248,0.3);z-index:9999;transition:all .3s;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1);box-shadow:0 12px 40px rgba(56,189,248,0.5)}
.fab.open{transform:rotate(45deg)}
.panel{position:fixed;bottom:96px;right:24px;width:380px;max-width:90vw;height:520px;max-height:70vh;background:rgba(10,10,26,0.95);border:1px solid rgba(56,189,248,0.15);border-radius:20px;overflow:hidden;display:none;flex-direction:column;z-index:9998;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.panel.open{display:flex;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.panel-header{background:linear-gradient(135deg,var(--navy),#101834);padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(56,189,248,0.1)}
.panel-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),#6366f1);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--white);font-weight:800}
.panel-title{font-size:14px;font-weight:700;color:var(--white)}
.panel-sub{font-size:10px;color:var(--cyan)}
.panel-close{background:none;border:none;color:var(--gray);font-size:18px;cursor:pointer;margin-left:auto}
.panel-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:rgba(56,189,248,0.15)}
.msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.45;animation:fadeIn .3s ease;white-space:pre-wrap}
.msg.ai{background:rgba(56,189,248,0.08);color:#e2e8f0;align-self:flex-start;border:1px solid rgba(56,189,248,0.12)}
.msg.user{background:var(--cyan);color:var(--navy);align-self:flex-end;font-weight:500}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing-dots{display:flex;gap:3px;padding:10px 14px;align-self:flex-start}
.typing-dots span{width:5px;height:5px;background:var(--cyan);border-radius:50%;animation:dot 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.3}30%{opacity:1}}
.panel-input{padding:8px 14px 12px;border-top:1px solid rgba(56,189,248,0.06);display:flex;gap:8px}
.panel-input input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(56,189,248,0.12);border-radius:16px;padding:8px 14px;color:var(--white);font-size:12px;outline:none;font-family:inherit}
.panel-input input:focus{border-color:var(--cyan)}
.panel-input button{background:var(--cyan);color:var(--navy);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-weight:700;font-size:14px}
.quick-btns{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 8px}
.quick-btns button{background:rgba(255,255,255,0.03);border:1px solid rgba(56,189,248,0.1);color:var(--gray);font-size:10px;padding:4px 10px;border-radius:12px;cursor:pointer;font-family:inherit}
.quick-btns button:hover{background:rgba(56,189,248,0.08);color:var(--white)}
.status{font-size:9px;color:var(--gray);padding:4px 14px 0;text-align:center}
.status.on{color:#10b981}
.mobile-toggle { display:none; background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:4px; }
.mobile-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,5,16,0.97); backdrop-filter:blur(20px); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
.mobile-overlay.open { display:flex; }
.mobile-overlay a { color:#fff; font-size:20px; font-weight:600; text-decoration:none; transition:0.3s; }
.mobile-overlay a:hover { color:#38bdf8; }
.mobile-close { position:absolute; top:20px; right:24px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; }
</style>
</head>
<body>

<button class="mobile-toggle" id="mobileToggle" style="position:fixed;top:16px;right:20px;z-index:10000;">☰</button>

<div class="mobile-overlay" id="mobileOverlay">
  <button class="mobile-close" id="mobileClose">✕</button>
  <a href="../index.html">Ana Sayfa</a>
</div>

<button class="fab" id="fab" onclick="togglePanel()" title="Kivon AI'a sor">💬</button>

<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-avatar">K</div>
    <div><div class="panel-title">Kivon AI</div><div class="panel-sub">Groq · Ücretsiz</div></div>
    <button class="panel-close" onclick="togglePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="quick-btns" id="quickBtns"></div>
  <div class="status" id="status">Hazır</div>
  <div class="panel-input">
    <input type="text" id="panelInput" placeholder="Sorunuzu yazın..." onkeydown="if(event.key==='Enter')gonder()">
    <button onclick="gonder()">▶</button>
  </div>
</div>

<script>
const API_PROXY_URL = 'https://kivon-3.onrender.com/api/groq'; // ← Render URL gelince burayı değiştir
const PROXY = API_PROXY_URL;
const body = document.getElementById('panelBody');
const input = document.getElementById('panelInput');
const status = document.getElementById('status');
const quickBtns = document.getElementById('quickBtns');
const SISTEM = 'Sen Kivon AI asistanisin. Kivon, Bursa merkezli, KOBIlere AI cozumleri sunar. 13 kisilik ekip. Paketler: Baslangic 1.200 TL, Profesyonel 2.000 TL, Kurumsal 3.500 TL (KDV haric). 3 sektor: muhasebe, e-ticaret, restoran/kafe. Iletisim: WhatsApp +905303982712, @kivon.iletisim. Web: ahmetisikbir-code.github.io/kivon. Turkce, kisa (max 3 cumle), profesyonel ama sicak cevap ver.';

let open = false;

function togglePanel() {
  open = !open;
  document.getElementById('panel').classList.toggle('open', open);
  document.getElementById('fab').classList.toggle('open', open);
  if (open && body.children.length === 0) baslangic();
  if (open) input.focus();
}

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing-dots';
  div.innerHTML = '<span></span><span></span><span></span>';
  div.id = 'typing';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function aiSor(soru) {
  showTyping();
  status.textContent = 'Düşünüyor...';
  status.className = 'status';
  try {
    const res = await fetch(PROXY, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({soru, sistem:SISTEM})
    });
    const data = await res.json();
    hideTyping();
    if (data.cevap) {
      addMsg(data.cevap, 'ai');
      status.textContent = 'Groq AI · Ücretsiz';
      status.className = 'status on';
    } else {
      addMsg('Üzgünüm, şu an cevap veremiyorum. Lütfen tekrar deneyin.', 'ai');
      status.textContent = 'Hata';
      status.className = 'status';
    }
  } catch(e) {
    hideTyping();
    addMsg('Bağlantı hatası. api-server.js çalıştığından emin olun.\nKomut: node api-server.js', 'ai');
    status.textContent = 'Proxy kapalı';
    status.className = 'status';
  }
}

function gonder() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  aiSor(text);
}

function baslangic() {
  const btns = ['Fiyatlarınız nedir?', 'Chatbot nasıl çalışır?', 'Hangi sektörlerdesiniz?', 'Verilerim güvende mi?'];
  quickBtns.innerHTML = btns.map(b => `<button>${b}</button>`).join('');
  quickBtns.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function() {
      addMsg(this.textContent, 'user');
      aiSor(this.textContent);
    });
  });
  addMsg('Merhaba! 👋 Ben Kivon AI. Size nasıl yardımcı olabilirim?', 'ai');
}
</script>

<script>
(function(){var b=document.getElementById('mobileToggle'),o=document.getElementById('mobileOverlay'),c=document.getElementById('mobileClose');if(b&&o){b.onclick=function(){o.classList.add('open')};c.onclick=function(){o.classList.remove('open')};o.querySelectorAll('a').forEach(function(a){a.onclick=function(){o.classList.remove('open')}});}})();
</script>
</body>
</html>
