<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kivon | AI Hazırlık Testi</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--navy:#0a0a1a;--navy2:#0f1535;--cyan:#38bdf8;--ice:#7dd3fc;--gold:#fbbf24;--white:#fff;--gray:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Inter,system-ui,sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{max-width:700px;width:100%}
.card{background:rgba(10,10,26,.7);border:1px solid rgba(56,189,248,.12);border-radius:24px;padding:40px 36px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo-area{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 2px rgba(56,189,248,.4)}
.logo-avatar img{width:100%;height:100%;object-fit:cover}
.logo-name{font-size:18px;font-weight:800;letter-spacing:2px}h1{font-size:28px;font-weight:800;margin-bottom:8px}h1 span{color:var(--cyan)}
.sub{color:var(--gray);font-size:15px;margin-bottom:28px}
.progress{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .4s ease}
.question h2{font-size:20px;font-weight:700;margin-bottom:20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:rgba(255,255,255,.03);border:1px solid rgba(56,189,248,.12);border-radius:14px;padding:14px 18px;color:var(--white);font-size:15px;cursor:pointer;text-align:left;transition:all .2s;font-family:inherit}
.opt-btn:hover{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.3)}
.opt-btn.selected{background:rgba(56,189,248,.15);border-color:var(--cyan);color:var(--cyan);font-weight:600}
.nav-btns{display:flex;justify-content:space-between;margin-top:24px}
.nav-btn{background:var(--cyan);color:var(--navy);border:none;padding:10px 24px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;opacity:.4;pointer-events:none;transition:all .2s}
.nav-btn.active{opacity:1;pointer-events:auto}
.nav-btn.active:hover{background:var(--ice)}
.nav-btn.back{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--gray)}
.nav-btn.back:hover{background:rgba(255,255,255,.05);color:var(--white)}
.result h2{font-size:26px;font-weight:800;margin-bottom:6px}
.result .score{font-size:56px;font-weight:800;color:var(--cyan);margin-bottom:4px}
.result .level{display:inline-block;padding:4px 16px;border-radius:20px;font-size:14px;font-weight:700;margin-bottom:24px}
.level.baslangic{background:rgba(245,158,11,.15);color:#f59e0b}
.level.orta{background:rgba(56,189,248,.15);color:#38bdf8}
.level.ileri{background:rgba(16,185,129,.15);color:#10b981}
.categories{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.cat-card{background:rgba(255,255,255,.03);border:1px solid rgba(56,189,248,.08);border-radius:14px;padding:16px;text-align:center}
.cat-card h4{font-size:13px;color:var(--gray);margin-bottom:6px}
.cat-card .cat-score{font-size:28px;font-weight:800;color:var(--cyan)}
.advice{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.1);border-radius:14px;padding:18px 20px;margin-bottom:20px;font-size:14px;color:var(--gray);line-height:1.6}
.cta-btn{display:block;text-align:center;background:var(--cyan);color:var(--navy);padding:14px;border-radius:12px;text-decoration:none;font-weight:700;font-size:15px;transition:all .2s}
.cta-btn:hover{background:var(--ice)}
@media(max-width:600px){.categories{grid-template-columns:1fr}.card{padding:28px 20px}}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const questions=[
  {q:"Müşteri mesajlarına ortalama ne kadar sürede dönüş yapıyorsunuz?",opts:[{t:"1 saat içinde",p:3},{t:"Aynı gün içinde",p:2},{t:"1-2 gün içinde",p:1},{t:"Birkaç günü bulabiliyor",p:0}],cat:"iletisim"},
  {q:"Tekrarlayan sorulara (dekont, fatura, randevu) kim cevap veriyor?",opts:[{t:"Otomatik sistem var",p:3},{t:"Asistan/yardımcı personel",p:2},{t:"Kendim cevaplıyorum",p:1},{t:"Cevapsız kalabiliyor",p:0}],cat:"iletisim"},
  {q:"Haftalık kaç saatiniz tekrarlayan idari işlere gidiyor?",opts:[{t:"5 saatten az",p:3},{t:"5-10 saat",p:2},{t:"10-20 saat",p:1},{t:"20 saatten fazla",p:0}],cat:"operasyon"},
  {q:"Fatura ve rapor hazırlama süreciniz nasıl?",opts:[{t:"Tamamen dijital ve otomatik",p:3},{t:"Yazılım kullanıyorum, manuel kontrol var",p:2},{t:"Yarı manuel, şablonlarla",p:1},{t:"Tamamen manuel",p:0}],cat:"operasyon"},
  {q:"Stok veya sipariş takibini nasıl yapıyorsunuz?",opts:[{t:"Otomatik takip sistemi var",p:3},{t:"Yazılımla takip ediyorum",p:2},{t:"Manuel kontrol ediyorum",p:1},{t:"Düzenli takip yapmıyorum",p:0}],cat:"operasyon"},
  {q:"Müşterileriniz size hangi kanallardan ulaşıyor?",opts:[{t:"Web sitesi + WhatsApp + telefon",p:3},{t:"WhatsApp ve telefon",p:2},{t:"Sadece telefon",p:1},{t:"Düzensiz, ortak kanal yok",p:0}],cat:"iletisim"},
  {q:"Sosyal medyada aktif olarak var mısınız?",opts:[{t:"Evet, düzenli paylaşım yapıyorum",p:3},{t:"Ara sıra paylaşıyorum",p:2},{t:"Hesabım var ama aktif değil",p:1},{t:"Sosyal medya kullanmıyorum",p:0}],cat:"dijital"},
  {q:"İşletme verilerinizi (gelir, gider, müşteri) nasıl takip ediyorsunuz?",opts:[{t:"Özel dashboard/yazılım var",p:3},{t:"Excel/Google Sheets",p:2},{t:"Ajanda veya defter",p:1},{t:"Düzenli takip etmiyorum",p:0}],cat:"dijital"},
  {q:"Dijital dönüşüm veya yapay zekâ hakkında bilgi seviyeniz?",opts:[{t:"Aktif takip ediyor, uyguluyorum",p:3},{t:"Temel bilgim var, ilgileniyorum",p:2},{t:"Duydum ama detaylı bilmiyorum",p:1},{t:"Hiç bilgim yok",p:0}],cat:"dijital"},
  {q:"Randevu ve takvim yönetimini nasıl yapıyorsunuz?",opts:[{t:"Online takvim, müşteri kendi seçiyor",p:3},{t:"Dijital takvim, manuel ekleme",p:2},{t:"Ajanda veya not defteri",p:1},{t:"Kafamda tutuyorum",p:0}],cat:"operasyon"},
  {q:"Müşteri memnuniyetini nasıl ölçüyorsunuz?",opts:[{t:"Düzenli anket ve analiz var",p:3},{t:"Sözlü geri bildirim alıyorum",p:2},{t:"Şikayet gelirse ilgileniyorum",p:1},{t:"Ölçüm yapmıyorum",p:0}],cat:"iletisim"},
  {q:"Yeni teknolojilere bütçe ayırıyor musunuz?",opts:[{t:"Evet, yıllık teknoloji bütçem var",p:3},{t:"Gerekirse ayırıyorum",p:2},{t:"Bütçe yok ama ilgileniyorum",p:1},{t:"Teknolojiye bütçe ayırmıyorum",p:0}],cat:"dijital"}
];

let current=0,answers=new Array(12).fill(null),scores={iletisim:0,operasyon:0,dijital:0};

function render(){
  const app=document.getElementById('app');
  if(current<12){
    const q=questions[current];
    const pct=Math.round((current/12)*100);
    app.innerHTML=`
      <div class="card">
        <div class="logo-area">
          <div class="logo-avatar"><img src="" alt="" id="testLogo"></div>
          <div class="logo-name">KIVON</div>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="question"><h2>${current+1}. ${q.q}</h2></div>
        <div class="options">${q.opts.map((o,i)=>`<button class="opt-btn${answers[current]===i?' selected':''}" onclick="select(${i})">${o.t}</button>`).join('')}</div>
        <div class="nav-btns">
          <button class="nav-btn back${current>0?' active':''}" onclick="current>0?(current--,render()):null">← Geri</button>
          <button class="nav-btn${answers[current]!==null?' active':''}" onclick="current<11?(current++,render()):(current++,render())">${current===11?'Sonuçları Gör':'İleri →'}</button>
        </div>
      </div>`;
  }else{
    const total=answers.reduce((s,a,i)=>s+questions[i].opts[a].p,0);
    const max=36, pct=Math.round((total/max)*100);
    const cats={iletisim:0,operasyon:0,dijital:0};
    questions.forEach((q,i)=>{
      if(answers[i]!==null) cats[q.cat]+=q.opts[answers[i]].p;
    });
    const catMax={iletisim:12,operasyon:12,dijital:12};
    let level='başlangıç',advice='';
    if(pct>=70){level='ileri';advice='İşletmeniz dijital dönüşüme oldukça hazır. AI çözümleriyle operasyonlarınızı bir üst seviyeye taşıyabilir, müşteri deneyiminde fark yaratabilirsiniz. Size özel ileri seviye AI entegrasyon paketimizle tanışın.'}
    else if(pct>=40){level='orta';advice='Dijital altyapınız var ama hâlâ manuel işlere çok zaman harcıyorsunuz. Başlangıç paketimizle haftada 3-5 saat kazanabilir, tekrarlayan işleri otomatikleştirebilirsiniz.'}
    else{level='başlangıç';advice='İşletmenizde ciddi bir dijital dönüşüm fırsatı var. Tekrarlayan işler zamanınızın büyük kısmını alıyor. Ücretsiz keşif görüşmemizde size özel yol haritası çıkaralım.'}

    app.innerHTML=`
      <div class="card result">
        <div class="logo-area">
          <div class="logo-avatar"><img src="" alt="" id="testLogo2"></div>
          <div class="logo-name">KIVON</div>
        </div>
        <h2>AI Hazırlık Skorunuz</h2>
        <div class="score">${pct}<span style="font-size:24px;color:var(--gray)">/100</span></div>
        <div class="level ${level}">${level==='ileri'?'🚀 İleri Seviye':level==='orta'?'⚡ Orta Seviye':'🌱 Başlangıç Seviyesi'}</div>
        <div class="categories">
          <div class="cat-card"><h4>Müşteri İletişimi</h4><div class="cat-score">${Math.round((cats.iletisim/catMax.iletisim)*100)}%</div></div>
          <div class="cat-card"><h4>Operasyon</h4><div class="cat-score">${Math.round((cats.operasyon/catMax.operasyon)*100)}%</div></div>
          <div class="cat-card"><h4>Dijital Altyapı</h4><div class="cat-score">${Math.round((cats.dijital/catMax.dijital)*100)}%</div></div>
        </div>
        <div class="advice">${advice}</div>
        <a href="https://wa.me/905303982712?text=Merhaba%2C+AI+Haz%C4%B1rl%C4%B1k+Testi+sonucumu+payla%C5%9Fmak+istiyorum.+Skorum:+${pct}%2F100" target="_blank" class="cta-btn">📞 Ücretsiz Keşif Görüşmesi Planla</a>
      </div>`;

    setTimeout(()=>{
      document.getElementById('testLogo2').src=document.getElementById('testLogo')?.src||'';
    },100);
  }
  setTimeout(()=>{
    const logoImg=document.getElementById('testLogo');
    if(logoImg) logoImg.src=window.location.hostname==='localhost'||window.location.protocol==='file:'?'../gorseller/profil_foto_final.png':'img/logo.png';
  },50);
}

function select(i){answers[current]=i;render()}

render();
</script>
</body>
</html>
