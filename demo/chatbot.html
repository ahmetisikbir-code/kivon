<style>
:root{--navy:#0a0a1a;--navy2:#101834;--cyan:#38bdf8;--ice:#7dd3fc;--white:#fff;--gray:#94a3b8;--gold:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Inter,system-ui,sans-serif;background:#0d1117;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
.chat-container{width:440px;max-width:100%;height:740px;max-height:95vh;background:var(--navy);border-radius:24px;overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(56,189,248,0.2);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.chat-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(56,189,248,0.12)}
.chat-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 2px rgba(56,189,248,0.4);background:var(--navy2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--cyan)}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.chat-header-info{flex:1}
.chat-header-name{font-size:15px;font-weight:700;color:var(--white)}
.chat-header-status{font-size:11px;color:var(--cyan);display:flex;align-items:center;gap:5px}
.status-dot{width:7px;height:7px;background:#10b981;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.7)}50%{box-shadow:0 0 0 7px rgba(16,185,129,0)}}
.chat-header-badge{background:rgba(56,189,248,0.12);color:var(--cyan);font-size:9px;font-weight:700;padding:2px 8px;border-radius:12px}
.chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-body::-webkit-scrollbar{width:3px}
.chat-body::-webkit-scrollbar-thumb{background:rgba(56,189,248,0.15);border-radius:2px}
.msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;animation:fadeIn .3s ease;white-space:pre-wrap;word-break:break-word}
.msg.bot{background:rgba(56,189,248,0.08);color:#e2e8f0;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid rgba(56,189,248,0.14)}
.msg.user{background:var(--cyan);color:var(--navy);align-self:flex-end;border-bottom-right-radius:4px;font-weight:500}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.typing span{width:6px;height:6px;background:var(--cyan);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.quick-replies{display:flex;flex-wrap:wrap;gap:5px;padding:6px 14px 10px}
.quick-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(56,189,248,0.16);color:var(--gray);font-size:12px;padding:6px 12px;border-radius:16px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.quick-btn:hover{background:rgba(56,189,248,0.1);color:var(--white)}
.chat-input-area{padding:8px 14px 12px;border-top:1px solid rgba(56,189,248,0.08);display:flex;gap:8px}
.chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(56,189,248,0.15);border-radius:20px;padding:10px 16px;color:var(--white);font-size:13px;font-family:inherit;outline:none;transition:all .2s}
.chat-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(56,189,248,0.08)}
.chat-input::placeholder{color:rgba(255,255,255,0.2)}
.send-btn{background:var(--cyan);color:var(--navy);border:none;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px;font-weight:700;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.send-btn:hover{background:var(--ice);box-shadow:0 0 16px rgba(56,189,248,0.25)}
.chat-footer-brand{font-size:9px;color:rgba(255,255,255,0.15);text-align:center;padding:0 14px 8px}
.admin-toggle{position:absolute;bottom:8px;right:14px;font-size:10px;color:rgba(255,255,255,0.15);cursor:pointer;background:none;border:none;font-family:inherit}
.admin-panel{display:none;background:rgba(0,0,0,0.4);border:1px solid rgba(251,191,36,0.3);border-radius:14px;padding:12px;margin:0 14px 8px;max-height:180px;overflow-y:auto}
.admin-panel.show{display:block}
.admin-panel h4{font-size:11px;color:var(--gold);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.admin-panel textarea{width:100%;height:140px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--white);font-size:11px;font-family:monospace;padding:8px;resize:vertical}
.admin-panel button{background:var(--gold);color:var(--navy);border:none;padding:4px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit}
.mobile-toggle { display:none; background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:4px; }
.mobile-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,5,16,0.97); backdrop-filter:blur(20px); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
.mobile-overlay.open { display:flex; }
.mobile-overlay a { color:#fff; font-size:20px; font-weight:600; text-decoration:none; transition:0.3s; }
.mobile-overlay a:hover { color:#38bdf8; }
.mobile-close { position:absolute; top:20px; right:24px; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; }
</style>

const KB_KEY = 'kivon_bilgi_tabani';

// ─── VARSAYILAN BİLGİ TABANI (45+ zengin yanıt) ────────────────
const varsayilanBilgiTabani = {
  "karsilama": "Merhaba! 👋 Ben Kivon'un AI asistanıyım. KOBİ'lere özel yapay zeka çözümleri sunuyoruz — muhasebe büroları, e-ticaret işletmeleri, restoran ve kafeler için. Fiyat, teknik detay, demo talebi... Ne merak ediyorsunuz?",
  "bilinmeyen": "Bu konuda hemen net bir cevap veremiyorum. Ancak uzman ekibimiz size özel bilgiyi sunabilir. WhatsApp (+90 530 398 27 12) veya Instagram (@kivon.iletisim) üzerinden bize yazın, en geç 24 saat içinde dönüş yapalım. ğŸ“",
  "konu_disi": "Ben işletmenizle ilgili konularda yardımcı olmak için buradayım — yapay zeka, otomasyon, verimlilik, müşteri iletişimi gibi. Spor, hava durumu ya da gündelik sohbet konularında destek veremem. İşletmenizle ilgili ne sormak istersiniz? 💼",

  "yanitlar": {

    // ── 1. BİZ KİMİZ & NEDEN KİVON ──────────────────────────
    "kimsin|kivon|şirket|firma|siz kimsiniz": "Kivon, Bursa merkezli bir yapay zeka danışmanlık şirketi. KOBİ'lerin tekrarlayan işlerini AI ile hafifletiyoruz — müşteri soruları, randevu takibi, fatura hazırlama, stok yönetimi gibi. Butik çalışıyoruz — her müşteriye özel, yüz yüze, Bursa'dan Türkiye geneline.",

    "neden|fark|avantaj|rakip|farkınız": "Üç temel farkımız var. Birincisi, yerel ve yüz yüze hizmet — online rakiplerin aksine Bursa'dayız, dilinizden anlıyoruz, gerektiğinde ofisinize geliyoruz. İkincisi, sektör odaklı çözümler — muhasebeciye muhasebeci gibi, e-ticaretçiye e-ticaretçi gibi konuşan AI. Üçüncüsü, şeffaf fiyatlandırma — 1.200 TL'den başlayan, KOBİ bütçesine uygun, sürpriz maliyetsiz paketler. Risk almak istemeyene 14 gün koşulsuz çıkış hakkı.",

    "referans|müşteri|örnek|tecrübe|portföy": "Seçici ve butik ilerliyoruz — az müşteri, çok ilgi prensibiyle çalışıyoruz. Bu yaklaşım sayesinde her müşterimize aceleye gelmemiş, özel çözümler sunabiliyoruz. Ayrıca erken katılım döneminde avantajlı fiyatlar ve 14 gün koşulsuz çıkış hakkı tanıyoruz. Risk sıfır, çözüm size özel.",

    // ── 2. SEKTÖREL: MUHASEBE ────────────────────────────────
    "muhasebe|smmm|mali müşavir|muhasebeci": "Muhasebe büroları bizim en derin uzmanlık alanımız. Sektörü tanıyoruz: beyanname dönemi yoğunluğu, tekrarlayan müşteri soruları (dekont, fatura, randevu), evrak takibi. Chatbot'umuz bu yükün %70'ini alır. Müşteriniz 'dekont nerede' diye sorduğunda cevabı chatbot verir, siz danışmanlığa odaklanırsınız. Entegrasyon: Logo, Paraşüt, LUCA, Mikro ile tam uyumlu.",

    "muhasebe chatbot|muhasebeci chatbot": "Muhasebe büroları için özel eğitilmiş chatbot'umuz şunları yapar: 1) Müşteri 'dekont/fatura/ödeme' sorduğunda anında yanıtlar, 2) Randevu alır ve takvime ekler, 3) Beyanname dönemlerinde otomatik bilgilendirme yapar, 4) Sık sorulan 50-100 soruyu ezbere cevaplar, 5) Cevap veremediğini size yönlendirir. Kurulum 3-5 iş günü. Siz onay vermeden canlıya almıyoruz.",

    "sipariş|stok|kargo|lojistik": "Sipariş ve stok takibi e-ticaretin en büyük zaman tuzağıdır. AI sistemimiz stok seviyelerini anlık izler, kritik seviyenin altına düşen ürünler için uyarı verir, tedarikçiye otomatik sipariş taslağı hazırlar. Kargo durumu sorgulamalarını chatbot karşılar. Müşteri 'siparişim nerede' diye sorduğunda anında kargo durumunu söyler. Haftada 10 saat kazanç.",

    "iade|değişim|müşteri şikayet": "İade ve değişim süreçleri e-ticaretin kaçınılmaz gerçeği. Chatbot'umuz iade/değişim taleplerini alır, kuralları hatırlatır, iade kodu oluşturur, süreci başlatır. Müşteri memnuniyetsizliğini insan müdahalesi gerekmeden yönetir. Karmaşık vakaları size yönlendirir. İade işlemleri %60 azalır çünkü çoğu soru daha iadeye dönüşmeden çözülür.",

    "pazaryeri|trendyol|hepsiburada|amazon": "Trendyol, Hepsiburada, Amazon, N11 gibi pazaryerlerinde satış yapıyorsanız, chatbot'umuz sipariş ve müşteri sorularını tek panelden yönetir. Entegrasyonla birlikte tüm platformlardan gelen mesajlar tek bir yerde toplanır. Stok senkronizasyonu, fiyat güncelleme — hepsi otomasyona bağlanabilir. Proses Otomasyonu paketiyle çalışır.",


    // ── 4. SEKTÖREL: RESTORAN & KAFE ─────────────────────────
    "restoran|kafe|yemek|cafe|restaurant": "Restoran ve kafeler için özel AI çözümümüz var. WhatsApp'tan rezervasyon alma, müsaitlik kontrolü, menü bilgisi paylaşma, doğum günü/kutlama organizasyonu sorguları. Müşteri 'bu akşam yer var mı' diye sorduğunda chatbot anında müsaitlik durumuna bakar ve rezervasyonu oluşturur. Telefonla uğraşmazsınız, servise odaklanırsınız.",

    "rezervasyon|masa|yer": "Rezervasyon yönetimi restoranlar için en büyük zaman kaybı. Chatbot'umuz 7/24 WhatsApp'tan rezervasyon alır, takviminizdeki boş masa/saati gösterir, müşteriye uygun seçenekleri sunar, onaylanan rezervasyonu otomatik takvime ekler. İptalleri yönetir, hatırlatma mesajı gönderir. Garsonlarınız telefona bakmak yerine misafirlerinizle ilgilenir.",

    "menü|yemek listesi|fiyat listesi": "Menü bilgisi paylaşımı restoranınızın dijital vitrinidir. Chatbot güncel menüyü, fiyatları, günün spesiyalini müşteriye anında iletir. Alerjen bilgisi, vejetaryen seçenekler, çocuk menüsü gibi detayları da cevaplar. Menü değişikliğinde bilgi tabanını güncellemeniz yeterli — chatbot otomatik öğrenir.",

    "paket servis|sipariş|teslimat": "Paket servis ve online sipariş için AI destekli çözüm sunuyoruz. Müşteri WhatsApp'tan sipariş verir, chatbot menüyü gösterir, seçenekleri alır, tutarı hesaplar, siparişi mutfağa iletir. Ödeme entegrasyonu da yapabiliyoruz. Telefon trafiğini azaltır, yanlış siparişleri minimuma indirir, mutfak operasyonunu rahatlatır.",

    "entegrasyon|logo|paraşüt|luca|mikro|yazılım": "Mevcut yazılımlarınızla sorunsuz entegre çalışırız. Muhasebe: Logo, Paraşüt, LUCA, Mikro. E-ticaret: Shopify, WooCommerce. Restoran: Adisyon ve POS sistemleri. Özel yazılım kullanıyorsanız API bağlantısı kurarız. Amacımız sizi değiştirmek değil, mevcut sisteminize güç katmak.",

    "veri|nerede|sunucu|data|veriler nerede": "Tüm verileriniz Türkiye'deki sunucularda, KVKK uyumlu şekilde saklanır. Åifreleme ile korunur, yetkisiz erişime kapalıdır. Avrupa veya Amerika'daki sunuculara veri aktarımı yapmayız. Hukuk danışmanımız Ege Bey tüm veri işleme sözleşmelerini hazırladı. Her müşteri için ayrı veri alanı — verileriniz asla başka müşterilerle karışmaz.",

    "kesinti|çalışmama|arıza|sorun": "Chatbot'unuz %99.5 uptime ile çalışır. Sistemimiz yedekli sunucularda barındırılır, olası bir kesintide otomatik olarak yedek sunucuya geçer. Mesai saatleri içinde 2 saat, mesai dışı 4 saat içinde müdahale garantisi veriyoruz. Aylık performans raporunda uptime oranınızı görürsünüz.",

    "ai|yapay zeka|artificial intelligence|zeka": "Yapay zeka bizim işimiz, ama karmaşıklaştırmak değil basitleştirmek için çalışıyoruz. Sizin AI'ın nasıl çalıştığını bilmenize gerek yok — ne işe yaradığını bilmeniz yeterli. AI sizin için angaryayı alır: tekrarlayan soruları cevaplar, evrakları sınıflandırır, raporları hazırlar. Siz işinize, uzmanlığınıza, müşterinize odaklanırsınız. AI bir araçtır, rakip değil.",

function bilgiTabaniOku() {

  catch { return JSON.parse(JSON.stringify(varsayilanBilgiTabani)); }
}

let bilgiTabani = bilgiTabaniOku();

// ─── YANIT BULMA ────────────────────────────────────────────────
function yanitBul(metin) {
  const lower = metin.toLowerCase().trim();
  if (!lower) return null;

  for (const [anahtar, yanit] of Object.entries(bilgiTabani.yanitlar)) {
    const kelimeler = anahtar.split('|');
    for (const k of kelimeler) {
      if (lower.includes(k.trim())) return yanit;
    }
  }
  return null;
}

function enIyiEslesme(metin) {
  const lower = metin.toLowerCase().trim();
  let enIyi = null, enIyiPuan = 0;

  for (const [anahtar, yanit] of Object.entries(bilgiTabani.yanitlar)) {
    const kelimeler = anahtar.split('|');
    let puan = 0;
    for (const k of kelimeler) {
      if (lower.includes(k.trim())) puan += k.trim().length;
      // Kismi eslesme: en az 4 harf
      if (k.trim().length >= 4 && lower.split(' ').some(w => {
        const k2 = k.trim();
        return w.length >= 4 && (k2.includes(w) || w.includes(k2));
      })) {
        puan += 2;
      }
    }
    if (puan > enIyiPuan) { enIyiPuan = puan; enIyi = yanit; }
  }

  return enIyiPuan > 2 ? enIyi : null;
}

function konuDisiMi(metin) {
  const disiKelimeler = ['hava', 'spor', 'maç', 'film', 'dizi', 'müzik', 'şarkı', 'yemek', 'tarif', 'aşk', 'sevgi', 'politika', 'siyaset', 'din', 'futbol', 'oyun', 'tatil', 'araba'];
  const lower = metin.toLowerCase();
  return disiKelimeler.some(k => lower.includes(k));
}

// ─── MESAJ SİSTEMİ ─────────────────────────────────────────────
function saveHistory() {
  const messages = [];
  chatBody.querySelectorAll('.msg').forEach(el => {
    messages.push({ text: el.textContent, type: el.classList.contains('user') ? 'user' : 'bot' });
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const messages = JSON.parse(raw);
    messages.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + m.type;
      div.textContent = m.text;
      chatBody.appendChild(div);
    });
    chatBody.scrollTop = chatBody.scrollHeight;
    return true;
  } catch { return false; }
}

async function botYaz(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.textContent = '';
  chatBody.appendChild(div);
  for (let i = 0; i < text.length; i++) {
    div.textContent += text[i];
    chatBody.scrollTop = chatBody.scrollHeight;
    await new Promise(r => setTimeout(r, 20));
  }
  saveHistory();
}

function kullaniciYaz(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
  saveHistory();
}

async function typing(ms) {
  const div = document.createElement('div');
  div.className = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
  await new Promise(r => setTimeout(r, ms));
  div.remove();
}

function butonlariAyarla(butonlar) {
  quickReplies.innerHTML = butonlar.map(b => `<button class="quick-btn">${b}</button>`).join('');
  quickReplies.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', function() { mesajIsle(this.textContent); });

async function mesajIsle(metin) {
  const lower = metin.toLowerCase();
  kullaniciYaz(metin);
  chatInput.value = '';
  await typing(400 + Math.random() * 400);

  // Paket seçim diyaloğu
  if (dialogStep === 'paket') {
    const eslesen = Object.keys(paketDetay).find(p => metin.includes(p));
    if (eslesen) {
      await botYaz(paketDetay[eslesen]);
      butonlariAyarla(varsayilanButonlar);
      dialogStep = null;
      return;
    }
  }

  // Fiyat/paket sorulduysa paket seçimine geç
  if (lower.includes('fiyat') || lower.includes('ücret') || lower.includes('paket') || lower.includes('💰')) {
    dialogStep = 'paket';
    butonlariAyarla(['📦 Başlangıç Paketi', '📦 Profesyonel Paket', '📦 Kurumsal Paket']);
    await botYaz('Size en uygun paketi seçmeniz için yardımcı olayım. Hangi paket hakkında bilgi almak istersiniz? 📋');
    return;
  }

  // Konu dışı
  if (konuDisiMi(metin)) {
    await botYaz(bilgiTabani.konu_disi);
    butonlariAyarla(varsayilanButonlar);
    return;
  }

  // Bilgi tabanından yanıt ara (her zaman önce yerel)
  const tamYanit = yanitBul(metin);
  const enIyi = enIyiEslesme(metin);
  const kbYanit = tamYanit || enIyi;

  if (kbYanit) {
    await botYaz(kbYanit);
    butonlariAyarla(varsayilanButonlar);
    // AI'yi de her zaman çalıştır
    const groqYanit = await groqSor(metin);
    if (groqYanit) {
      await botYaz('🤖 AI destekli: ' + groqYanit);
    }
    return;
  }

  // Hiçbir şey bulunamadı — Groq AI dene
  const groqYanit = await groqSor(metin);
  if (groqYanit) {
    await botYaz(groqYanit);
    butonlariAyarla(varsayilanButonlar);
    return;
  }

  await botYaz(bilgiTabani.bilinmeyen);
  butonlariAyarla(varsayilanButonlar);
}

// ─── GROQ AI FALLBACK ──────────────────────────────────────────
const GROQ_KEY = ''; // https://console.groq.com/keys
const GROQ_MODEL = 'llama-3.3-70b-versatile';
const API_PROXY_URL = 'https://kivon-3.onrender.com/api/groq'; // Render proxy
const PROXY_URL = API_PROXY_URL;

async function groqSor(soru) {
  try {
    // Once proxy'yi dene (anahtar guvende)
    let res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ soru })
    });
    if (res.ok) {
      const data = await res.json();
      return data.cevap || null;
    }
  } catch(e) {
    // Proxy yoksa direkt API'yi dene
    if (GROQ_KEY) {
      try {
        let res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
          body: JSON.stringify({
            model: GROQ_MODEL,
            messages: [
              { role: 'system', content: 'Sen Kivon\'un AI asistanisin. Kivon, Bursa merkezli, KOBİ\'lere AI cozumleri sunan bir teknoloji danismanligidir. Paketler: Baslangic 1.200 TL, Profesyonel 2.000 TL, Kurumsal 3.500 TL. 3 sektor: muhasebe, e-ticaret, restoran/kafe. Turkce, kisa ve net cevap ver. Max 3-4 cumle.' },
              { role: 'user', content: soru }
            ],
            temperature: 0.7, max_tokens: 300
          })
        });
        if (res.ok) {
          const data = await res.json();
          return data.choices?.[0]?.message?.content || null;
        }
      } catch(e2) {}
    }
  }
  return null;
}
