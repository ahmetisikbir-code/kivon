<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kivon Chatbot Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Inter,system-ui,sans-serif;background:#0d1117;display:flex;justify-content:center;align-items:center;min-height:100vh}
.chat-container{width:420px;max-width:95vw;height:700px;max-height:90vh;background:#0a0a1a;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(56,189,248,0.2);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 60px rgba(56,189,248,0.08)}
.chat-header{background:linear-gradient(135deg,#0a0a1a,#101834);padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(56,189,248,0.15)}
.chat-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 2px rgba(56,189,248,0.4)}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.chat-header-info{flex:1}
.chat-header-name{font-size:16px;font-weight:700;color:#fff}
.chat-header-status{font-size:12px;color:#38bdf8;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;background:#10b981;border-radius:50%;display:inline-block;flex-shrink:0;animation:statusPulse 2s ease-in-out infinite}
@keyframes statusPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.7)}50%{box-shadow:0 0 0 9px rgba(16,185,129,0)}}
.chat-header-badge{background:rgba(56,189,248,0.15);color:#38bdf8;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.5px}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:rgba(56,189,248,0.2);border-radius:2px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;animation:fadeIn .3s ease;white-space:pre-wrap}
.msg.bot{background:rgba(56,189,248,0.1);color:#e2e8f0;align-self:flex-start;border-bottom-left-radius:4px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(56,189,248,0.18)}
.msg.user{background:#38bdf8;color:#0a0a1a;align-self:flex-end;border-bottom-right-radius:4px;font-weight:500;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(56,189,248,0.18)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.typing span{width:6px;height:6px;background:#38bdf8;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px 12px}
.quick-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(56,189,248,0.2);color:#94a3b8;font-size:13px;padding:8px 14px;border-radius:20px;cursor:pointer;transition:all .2s;font-family:inherit}
.quick-btn:hover{background:rgba(56,189,248,0.12);color:#fff;border-color:rgba(56,189,248,0.4)}
.chat-footer{padding:10px 16px;border-top:1px solid rgba(56,189,248,0.1)}
.chat-footer-inner{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border-radius:24px;padding:4px 16px;border:1px solid rgba(56,189,248,0.12)}
.chat-footer-inner span{color:#64748b;font-size:13px;flex:1}
.chat-footer-brand{font-size:10px;color:rgba(255,255,255,0.2);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="chat-avatar"><img src="" alt="" id="headerAvatar"></div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="headerName">Muhasebe Asistanı</div>
      <div class="chat-header-status"><span class="status-dot"></span> Çevrimiçi</div>
    </div>
    <div class="chat-header-badge">AI</div>
  </div>
  <div class="chat-body" id="chatBody"></div>
  <div class="quick-replies" id="quickReplies"></div>
  <div class="chat-footer">
    <div class="chat-footer-inner"><span>Mesaj seçin...</span></div>
    <div class="chat-footer-brand">Kivon AI • @kivon.iletisim</div>
  </div>
</div>

<script>
const chatBody = document.getElementById('chatBody');
const quickReplies = document.getElementById('quickReplies');
const STORAGE_KEY = 'kivon_chat_history';

let dialogStep = null;
let lastMessageTime = 0;

const responses = {
  'merhaba': 'Merhaba! Ben Kivon\'un muhasebe büroları için geliştirdiği yapay zekâ asistanıyım. Size nasıl yardımcı olabilirim?',
  'merhaba|selam|iyi günler': 'Merhaba! Hoş geldiniz. Sıkça sorulan sorulardan birini seçin veya aklınıza takılanı sorun.',
  'dekont|ödeme|havale': 'Müşterileriniz "dekont nerede, ödeme ulaştı mı?" diye sorduğunda, asistanımız anında havale/EFT kayıtlarını kontrol edip cevap verir. Size günde ortalama 45 dakika kazandırır.',
  'randevu|takvim|görüşme': 'Randevu yönetimi en büyük zaman kayıplarından biri. AI asistanımız boş takvim dilimlerinizi görür, müşteriye uygun saatleri önerir ve onaylanan randevuyu otomatik takvime ekler.',
  'fatura|e-fatura|e-arşiv': 'Fatura sorgulama ve hatırlatma tamamen otomatik. Müşteri "geçen ayki faturam ne kadardı?" diye sorduğunda, sistem anında ilgili faturayı bulur ve tutarı söyler. PDF olarak da iletebilir.',
  'beyanname|vergi|kdv': 'Beyanname dönemlerinde müşterilerinizden gelen tekrarlayan soruları asistan karşılar. "KDV beyannamesi ne zaman verilecek?", "Vergi borcum var mı?" gibi sorulara standart ve doğru cevaplar verir.',
  'çalışma|nasıl|sistem': 'Şöyle çalışır: Mevcut muhasebe yazılımınıza (Logo, Paraşüt, LUCA vb.) bağlanırız. Sık sorulan 50-100 soruyu birlikte belirleriz. AI bu sorulara sizin onayladığınız cevapları verir. Tam kontrol sizde.',
  'güvenlik|veri|kvkk': 'KVKK ve GDPR uyumluyuz. Tüm müşteri verileri Türkiye\'deki sunucularda şifrelenir. Hiçbir veriyi başka amaçla kullanmayız. Hukuk danışmanımız Ege Bey tüm sözleşmeleri hazırladı.',
  'referans|müşteri|örnek': 'Henüz çok yeni bir şirketiz. İlk müşterilerimizden biri siz olabilirsiniz! Bu nedenle erken katılım indirimi ve özel ilgi sunuyoruz. İlk 5 müşterimize %20 indirim uyguluyoruz.',
  'teşekkür|sağ ol|teşekkürler': 'Rica ederiz! Başka bir sorunuz olursa her zaman buradayım. İsterseniz sizi bir keşif görüşmesi için yönlendirebilirim. ☺️',
  'görüşme|iletişim|ulaşmak': 'Harika! Bize şu kanallardan ulaşabilirsiniz:\n📞 WhatsApp: +90 530 398 27 12\n📧 E-posta: kivon.iletisim@gmail.com\n📷 Instagram: @kivon.iletisim\n\nDilerseniz ücretsiz keşif görüşmesi planlayalım!'
};

const packageDetails = {
  'Başlangıç': '📦 Başlangıç Paketi — 1.200 TL/ay\n\n✅ 1 AI çözümü\n✅ WhatsApp entegrasyonu\n✅ 7/24 otomatik yanıt\n✅ Aylık rapor\n✅ Kurulum dahil\n\n14 gün ücretsiz deneme, sözleşmede çıkış maddesi var. Başlangıç için ideal.',
  'Profesyonel': '📦 Profesyonel Paket — 2.000 TL/ay\n\n✅ 2 AI çözümü\n✅ WhatsApp + Web entegrasyonu\n✅ 7/24 otomatik yanıt\n✅ Haftalık rapor\n✅ Randevu yönetimi\n✅ Kurulum + eğitim dahil\n\nEn çok tercih edilen paketimiz. Orta ölçekli bürolar için ideal.',
  'Kurumsal': '📦 Kurumsal Paket — 3.500 TL/ay\n\n✅ Sınırsız AI çözümü\n✅ Tüm kanallarda entegrasyon\n✅ Özel eğitilmiş model\n✅ Canlı dashboard\n✅ Öncelikli destek\n✅ Kurulum + eğitim + danışmanlık\n\nYüksek hacimli bürolar ve zincir muhasebe ofisleri için.'
};

const defaultQuickButtons = ['💰 Fiyat ve paketler', '🔒 Veri güvenliği', '📅 Randevu yönetimi', '🧾 Fatura sorgulama', '📋 Nasıl çalışır?', '📞 Görüşme talep et'];

function saveHistory() {
  const messages = [];
  chatBody.querySelectorAll('.msg').forEach(el => {
    messages.push({ text: el.textContent, type: el.classList.contains('user') ? 'user' : 'bot' });
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const messages = JSON.parse(raw);
    if (!Array.isArray(messages) || messages.length === 0) return false;
    messages.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + m.type;
      div.textContent = m.text;
      chatBody.appendChild(div);
    });
    chatBody.scrollTop = chatBody.scrollHeight;
    return true;
  } catch (e) {
    return false;
  }
}

function addMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
  saveHistory();
}

async function addTypewriterMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.textContent = '';
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;

  for (let i = 0; i < text.length; i++) {
    div.textContent += text[i];
    chatBody.scrollTop = chatBody.scrollHeight;
    await new Promise(r => setTimeout(r, 30));
  }
  saveHistory();
}

function typing(duration) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
    setTimeout(() => { div.remove(); resolve(); }, duration);
  });
}

function findResponse(text) {
  const lower = text.toLowerCase();
  for (const [key, val] of Object.entries(responses)) {
    const keywords = key.split('|');
    if (keywords.some(k => lower.includes(k))) return val;
  }
  return null;
}

async function callGemini(question) {
  const API_KEY = 'AIzaSyDbBWPZrtVzD7TQro4YNaHDr9qSgdqbXUU';

  // 1. Uzunluk siniri
  if (question.length > 200) return 'Sorunuz biraz uzun. Daha kısa ve net sorabilir misiniz? 😊';

  // 2. Konu disi filtre (yapay zeka kontrolu)
  const offTopic = ['hava', 'spor', 'maç', 'film', 'dizi', 'müzik', 'şarkı', 'yemek', 'tarif', 'aşk', 'sevgi', 'politika', 'siyaset', 'din', 'futbol'];
  if (offTopic.some(w => question.toLowerCase().includes(w))) {
    return 'Bu konuda yardımcı olamam. Ben muhasebe, yapay zekâ ve işletme konularında size destek olmak için buradayım. Başka bir sorunuz var mı? 💼';
  }

  // 3. Spam korumasi (2 saniye bekleme)
  const now = Date.now();
  if (now - lastMessageTime < 2000) return null;
  lastMessageTime = now;

  // 4. Gunluk kota kontrolu (50 soru/gun)
  const today = new Date().toDateString();
  const usage = JSON.parse(localStorage.getItem('kivon_usage') || '{}');
  if (usage.date !== today) { usage.date = today; usage.count = 0; }
  if (usage.count >= 50) return 'Bugünlük AI soru limitine ulaştık. Yarın tekrar bekleriz. Acil konular için WhatsApp\'tan ulaşabilirsiniz: +905303982712 📞';
  usage.count++;
  localStorage.setItem('kivon_usage', JSON.stringify(usage));

  const systemPrompt = `Sen Kivon'un AI asistanısın. Kivon, Bursa merkezli bir yapay zeka danışmanlık şirketidir. KOBİ'lere (özellikle muhasebe bürolarına) chatbot, otomasyon ve veri analitiği hizmeti verirsin.
Paketler: Başlangıç 1.200 TL/ay, Profesyonel 2.000 TL/ay, Kurumsal 3.500 TL/ay.
İletişim: Instagram @kivon.iletisim, WhatsApp +905303982712.
Kısa, samimi, KOBİ dilinde cevap ver. 3-4 cümleyi geçme. Sadece muhasebe, yapay zeka, işletme konularında konuş. Alakasız sorulara cevap verme, kibarca konuya dön.`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ parts: [{ text: question }] }]
      })
    });
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || null;
  } catch (e) {
    return null;
  }
}

async function handleMsg(text) {
  const lower = text.toLowerCase();
  addMsg(text, 'user');
  await typing(600 + Math.random() * 500);

  if (dialogStep === 'awaiting_package') {
    const match = Object.keys(packageDetails).find(p => text.includes(p));
    if (match) {
      await addTypewriterMsg(packageDetails[match]);
      setQuickButtons(defaultQuickButtons);
      dialogStep = null;
      return;
    }
  }

  const hasFiyat = lower.includes('fiyat') || lower.includes('ücret') || lower.includes('paket') || lower.includes('💰');
  if (hasFiyat) {
    dialogStep = 'awaiting_package';
    setQuickButtons(['📦 Başlangıç Paketi', '📦 Profesyonel Paket', '📦 Kurumsal Paket']);
    await addTypewriterMsg('Size en uygun paketi seçmeniz için yardımcı olayım. Hangi paket hakkında detaylı bilgi almak istersiniz? 📋');
    return;
  }

  const localResponse = findResponse(text);
  if (localResponse) {
    await addTypewriterMsg(localResponse);
    setQuickButtons(defaultQuickButtons);
    return;
  }

  // Gemini API
  await typing(800);
  const aiResponse = await callGemini(text);
  if (aiResponse) {
    await addTypewriterMsg(aiResponse);
  } else {
    await addTypewriterMsg('Bu konuda hemen cevap veremedim. İsterseniz bize WhatsApp\'tan ulaşın, uzman ekibimiz en kısa sürede dönüş yapsın. 📞');
  }
  setQuickButtons(defaultQuickButtons);
}

function setQuickButtons(buttons) {
  quickReplies.innerHTML = buttons.map(b => '<button class="quick-btn">' + b + '</button>').join('');
  quickReplies.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      handleMsg(this.textContent);
    });
  });
}

function renderQuickReplies() {
  setQuickButtons(defaultQuickButtons);
}

window.onload = async () => {
  const avatarUrl = location.hostname === 'localhost' || location.protocol === 'file:'
    ? '../profil_foto_final.png'
    : 'https://raw.githubusercontent.com/ahmetisikbir-code/kivon/main/gorseller/profil_foto_final.png';
  document.getElementById('headerAvatar').src = avatarUrl;
  document.getElementById('headerName').textContent = 'Kivon Muhasebe Asistanı';

  renderQuickReplies();

  const restored = loadHistory();
  if (!restored) {
    await typing(1000);
    await addTypewriterMsg('Merhaba! 👋 Ben Kivon\'un muhasebe büroları için geliştirdiği yapay zekâ asistanıyım. Müşterilerinizin sık sorduğu soruları 7/24 yanıtlayarak size zaman kazandırırım.');
    await typing(600);
    await addTypewriterMsg('Aşağıdan merak ettiğiniz bir konuyu seçin, hemen anlatayım ⤵');
  }
};
</script>
</body>
</html>
