<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="description" content="KIVON 3D Network animasyonu — bağlantılı sistemlerin ve ağ teknolojilerinin görsel bir temsili."><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KIVON — 3D Network</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden}
#c{position:fixed;top:0;left:0;width:100%;height:100%}
.h{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.1);font-size:12px;z-index:10;letter-spacing:2px;pointer-events:none}
</style>
</head>
<body>
<div class="h">✦ Fare ile döndür · Tıkla patlat ✦</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z=18;

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.prepend(renderer.domElement);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.2,0.3,0.05);
composer.addPass(bloom);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.05;controls.autoRotate=true;
controls.autoRotateSpeed=0.5;controls.enableZoom=true;controls.enablePan=false;

// Network nodes
const nodeCount=400;
const nodePos=new Float32Array(nodeCount*3);
const nodeOrig=new Float32Array(nodeCount*3);
const nodeDest=new Float32Array(nodeCount*3);
const nodeColors=new Float32Array(nodeCount*3);

const c1=new THREE.Color('#38bdf8');
const c2=new THREE.Color('#6366f1');
const c3=new THREE.Color('#fbbf24');

for(let i=0;i<nodeCount;i++){
  const theta=Math.random()*Math.PI*2;
  const phi=Math.acos(2*Math.random()-1);
  const r=2+Math.random()*4;
  nodeOrig[i*3]=Math.sin(phi)*Math.cos(theta)*r;
  nodeOrig[i*3+1]=Math.sin(phi)*Math.sin(theta)*r;
  nodeOrig[i*3+2]=Math.cos(phi)*r;
  nodeDest[i*3]=(Math.random()-0.5)*25;
  nodeDest[i*3+1]=(Math.random()-0.5)*25;
  nodeDest[i*3+2]=(Math.random()-0.5)*25;
  nodePos[i*3]=nodeOrig[i*3];nodePos[i*3+1]=nodeOrig[i*3+1];nodePos[i*3+2]=nodeOrig[i*3+2];
  const c=i%3===0?c1:i%3===1?c2:c3;
  nodeColors[i*3]=c.r;nodeColors[i*3+1]=c.g;nodeColors[i*3+2]=c.b;
}

const nodeGeo=new THREE.BufferGeometry();
nodeGeo.setAttribute('position',new THREE.BufferAttribute(nodePos,3));
nodeGeo.setAttribute('color',new THREE.BufferAttribute(nodeColors,3));
const nodeMat=new THREE.PointsMaterial({
  size:0.12,vertexColors:true,transparent:true,opacity:0.9,
  blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true
});
const nodes=new THREE.Points(nodeGeo,nodeMat);
scene.add(nodes);

// Connections
const connPositions=[];
const connColors=[];
for(let i=0;i<nodeCount;i++){
  for(let j=i+1;j<nodeCount;j++){
    const dx=nodeOrig[i*3]-nodeOrig[j*3];
    const dy=nodeOrig[i*3+1]-nodeOrig[j*3+1];
    const dz=nodeOrig[i*3+2]-nodeOrig[j*3+2];
    const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist<3&&Math.random()<0.3){
      const alpha=0.3*(1-dist/3);
      connPositions.push(nodeOrig[i*3],nodeOrig[i*3+1],nodeOrig[i*3+2]);
      connPositions.push(nodeOrig[j*3],nodeOrig[j*3+1],nodeOrig[j*3+2]);
      connColors.push(c1.r,c1.g,c1.b,alpha,c1.r,c1.g,c1.b,alpha);
    }
  }
}

const connGeo=new THREE.BufferGeometry();
connGeo.setAttribute('position',new THREE.Float32BufferAttribute(connPositions,3));
const connMat=new THREE.LineBasicMaterial({color:'#38bdf8',transparent:true,opacity:0.15});
const conn=new THREE.LineSegments(connGeo,connMat);
scene.add(conn);

// Center
const g=new THREE.Mesh(
  new THREE.SphereGeometry(0.5,16,16),
  new THREE.MeshBasicMaterial({color:'#38bdf8',transparent:true,opacity:0.15})
);
scene.add(g);

let progress=0,dir=1;
const p=nodes.geometry.attributes.position.array;

function animate(){
  requestAnimationFrame(animate);
  progress+=0.002*dir;
  if(progress>=1||progress<=0)dir*=-1;
  const e=progress<0.5?2*progress*progress:1-Math.pow(-2*progress+2,2)/2;
  for(let i=0;i<nodeCount;i++){
    p[i*3]=nodeOrig[i*3]+(nodeDest[i*3]-nodeOrig[i*3])*e;
    p[i*3+1]=nodeOrig[i*3+1]+(nodeDest[i*3+1]-nodeOrig[i*3+1])*e;
    p[i*3+2]=nodeOrig[i*3+2]+(nodeDest[i*3+2]-nodeOrig[i*3+2])*e;
  }
  nodes.geometry.attributes.position.needsUpdate=true;
  conn.material.opacity=0.15*(1-e);
  g.scale.setScalar(1+e*5);
  controls.update();
  composer.render();
}
animate();
renderer.domElement.addEventListener('click',()=>{dir*=-1});
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  composer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
