<style>
:root{--navy:#0a0a1a;--navy2:#101834;--cyan:#38bdf8;--ice:#7dd3fc;--white:#fff;--gray:#94a3b8;--gold:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Inter,system-ui,sans-serif;background:transparent}

/* в”Җв”Җв”Җ FLOATING BUTTON в”Җв”Җв”Җ */
#kivon-widget-btn{position:fixed;bottom:24px;right:24px;z-index:999998;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#0a0a1a,#101834);border:2px solid rgba(56,189,248,0.4);box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 30px rgba(56,189,248,0.15);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.4,0,.2,1);user-select:none}
#kivon-widget-btn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(0,0,0,0.6),0 0 40px rgba(56,189,248,0.25)}
#kivon-widget-btn:active{transform:scale(.95)}
#kivon-widget-btn svg{width:28px;height:28px}
#kivon-widget-btn .badge{position:absolute;top:-4px;right:-4px;width:20px;height:20px;background:#10b981;border-radius:50%;font-size:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #0a0a1a;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.6)}50%{box-shadow:0 0 0 8px rgba(16,185,129,0)}}

/* в”Җв”Җв”Җ CHAT PANEL в”Җв”Җв”Җ */
#kivon-chat-panel{position:fixed;bottom:90px;right:24px;z-index:999999;width:380px;height:600px;max-height:calc(100vh - 120px);background:var(--navy);border-radius:20px;border:1px solid rgba(56,189,248,0.15);box-shadow:0 20px 60px rgba(0,0,0,0.6);display:flex;flex-direction:column;overflow:hidden;transform:translateY(20px) scale(.96);opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.22,1,.36,1)}
#kivon-chat-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all}

/* в”Җв”Җв”Җ HEADER в”Җв”Җв”Җ */
.kivon-chat-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(56,189,248,0.12);flex-shrink:0}
.kivon-chat-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 0 0 2px rgba(56,189,248,0.4);background:var(--navy2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--cyan)}
.kivon-chat-avatar svg{width:20px;height:20px}
.kivon-chat-header-info{flex:1;min-width:0}
.kivon-chat-header-name{font-size:14px;font-weight:700;color:var(--white)}
.kivon-chat-header-status{font-size:11px;color:var(--cyan);display:flex;align-items:center;gap:5px}
.kivon-status-dot{width:6px;height:6px;background:#10b981;border-radius:50%;animation:kivon-pulse 2s infinite}
@keyframes kivon-pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.7)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0)}}
.kivon-close-btn{background:none;border:none;color:var(--gray);font-size:20px;cursor:pointer;padding:2px;line-height:1;transition:color .2s;flex-shrink:0}
.kivon-close-btn:hover{color:var(--white)}

/* в”Җв”Җв”Җ BODY в”Җв”Җв”Җ */
.kivon-chat-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
.kivon-chat-body::-webkit-scrollbar{width:3px}
.kivon-chat-body::-webkit-scrollbar-thumb{background:rgba(56,189,248,0.15);border-radius:2px}
.kivon-msg{max-width:88%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.45;animation:kivon-fadeIn .3s ease;white-space:pre-wrap;word-break:break-word}
.kivon-msg.bot{background:rgba(56,189,248,0.08);color:#e2e8f0;align-self:flex-start;border-bottom-left-radius:3px;border:1px solid rgba(56,189,248,0.14)}
.kivon-msg.user{background:var(--cyan);color:var(--navy);align-self:flex-end;border-bottom-right-radius:3px;font-weight:500}
@keyframes kivon-fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* в”Җв”Җв”Җ TYPING в”Җв”Җв”Җ */
.kivon-typing{display:flex;gap:4px;padding:9px 13px;align-self:flex-start;background:rgba(56,189,248,0.08);border-radius:14px;border-bottom-left-radius:3px;border:1px solid rgba(56,189,248,0.14);animation:kivon-fadeIn .2s ease}
.kivon-typing span{width:5px;height:5px;background:var(--cyan);border-radius:50%;animation:kivon-bounce 1.2s infinite}
.kivon-typing span:nth-child(2){animation-delay:.2s}
.kivon-typing span:nth-child(3){animation-delay:.4s}
@keyframes kivon-bounce{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* в”Җв”Җв”Җ QUICK REPLIES в”Җв”Җв”Җ */
.kivon-quick-replies{display:flex;flex-wrap:wrap;gap:5px;padding:4px 14px 8px;flex-shrink:0}
.kivon-quick-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(56,189,248,0.16);color:var(--gray);font-size:11px;padding:5px 11px;border-radius:14px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.kivon-quick-btn:hover{background:rgba(56,189,248,0.1);color:var(--white)}

/* в”Җв”Җв”Җ INPUT AREA в”Җв”Җв”Җ */
.kivon-chat-input-area{padding:6px 14px 10px;border-top:1px solid rgba(56,189,248,0.08);display:flex;gap:8px;flex-shrink:0}
.kivon-chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(56,189,248,0.15);border-radius:18px;padding:9px 14px;color:var(--white);font-size:12px;font-family:inherit;outline:none;transition:all .2s}
.kivon-chat-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(56,189,248,0.08)}
.kivon-chat-input::placeholder{color:rgba(255,255,255,0.2)}
.kivon-send-btn{background:var(--cyan);color:var(--navy);border:none;width:35px;height:35px;border-radius:50%;cursor:pointer;font-size:14px;font-weight:700;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.kivon-send-btn:hover{background:var(--ice);box-shadow:0 0 16px rgba(56,189,248,0.25)}

/* в”Җв”Җв”Җ FOOTER в”Җв”Җв”Җ */
.kivon-chat-footer{font-size:8px;color:rgba(255,255,255,0.12);text-align:center;padding:0 14px 6px;flex-shrink:0}

/* в”Җв”Җв”Җ RESPONSIVE в”Җв”Җв”Җ */
@media(max-width:480px){
#kivon-chat-panel{bottom:84px;right:8px;left:8px;width:auto;max-height:calc(100vh - 100px);border-radius:16px}
#kivon-widget-btn{bottom:16px;right:16px;width:50px;height:50px}
#kivon-widget-btn svg{width:24px;height:24px}
.kivon-chat-header{padding:12px 14px}
.kivon-chat-avatar{width:34px;height:34px}
.kivon-chat-header-name{font-size:13px}
.kivon-msg{max-width:92%;font-size:12px;padding:8px 12px}
.kivon-chat-input-area{padding:5px 12px 8px}
.kivon-quick-replies{padding:3px 12px 6px}
.kivon-quick-btn{font-size:10px;padding:4px 9px}
}
@media(max-width:768px){.mobile-toggle{display:block!important}.nav-links{display:none!important}}

<nav style='position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,5,16,0.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(56,189,248,0.06);height:64px'><div style='display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1200px;margin:0 auto;padding:0 24px'><a href='../index.html' style='display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;text-decoration:none;color:#fff'><span style='color:#38bdf8'>KIVON</span></a></div></nav>

<!-- в”Җв”Җв”Җ FLOATING BUTTON в”Җв”Җв”Җ -->
<div id="kivon-widget-btn" onclick="kivonToggleChat()" title="KIVON Asistan" role="button" tabindex="0" aria-label="KIVON Asistan">
  <svg viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

<!-- в”Җв”Җв”Җ CHAT PANEL в”Җв”Җв”Җ -->
<div id="kivon-chat-panel">
  <div class="kivon-chat-header">
    <div class="kivon-chat-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M9 10a.5.5 0 0 0 0 1m6 0a.5.5 0 0 0 0-1m-5.5 4c.7 1 2 1.6 3.5 1.6s2.8-.6 3.5-1.6"/>
      </svg>
    </div>
    <div class="kivon-chat-header-info">
      <div class="kivon-chat-header-name">KIVON Asistan</div>
      <div class="kivon-chat-header-status"><span class="kivon-status-dot"></span> ГҮevrimiГ§i</div>
    </div>
    <button class="kivon-close-btn" onclick="kivonToggleChat()" aria-label="Kapat">вң•</button>
  </div>
  <div class="kivon-chat-body" id="kivonChatBody"></div>
  <div class="kivon-quick-replies" id="kivonQuickReplies"></div>
  <div class="kivon-chat-input-area">
    <input type="text" class="kivon-chat-input" id="kivonChatInput" placeholder="Sorunuzu yazДұn..." onkeydown="if(event.key==='Enter')kivonSendMsg()">
    <button class="kivon-send-btn" onclick="kivonSendMsg()">в–¶</button>
  </div>
  <div class="kivon-chat-footer">KIVON В· AI Asistan</div>
</div>

<script>
(function(){

// в”Җв”Җв”Җ BILGI TABANI в”Җв”Җв”Җ
const KB = {
  karsilama: "Merhaba! рҹ‘Ӣ Ben KIVON'un AI asistanДұyДұm. KOBД°'lere Г¶zel yapay zekГғВў Г§Г¶zГјmleri sunuyoruz. Fiyat, Г§Г¶zГјmler, demo veya iletiЕҹim вҖ” size nasДұl yardДұmcДұ olabilirim?",
  bilinmeyen: "DetaylДұ bilgi iГ§in WhatsApp'tan bize ulaЕҹДұn: +90 530 398 27 12. En geГ§ 24 saat iГ§inde dГ¶nГјЕҹ yaparДұz. рҹ“һ",
  yanitlar: {
    "fiyat|Гјcret|paket|kaГ§ para|kaГ§ tl|ne kadar": "рҹ“Ұ **KIVON Paketleri**\n\nрҹ”№ **BaЕҹlangДұГ§:** 5.000 TL/ay + KDV вҖ” 1 AI Г§Г¶zГјmГј, WhatsApp entegrasyonu\nрҹ”№ **Profesyonel:** 8.000 TL/ay + KDV вҖ” 2 AI Г§Г¶zГјmГј, WhatsApp+Web, randevu yГ¶netimi\nрҹ”№ **Kurumsal:** 12.000 TL/ay + KDV вҖ” SДұnДұrsДұz AI, canlДұ dashboard, 7/24 Г¶ncelikli destek\n\n*TГјm paketlerde: Kurulum dahil, 14 gГјn Гјcretsiz deneme, koЕҹulsuz Г§ДұkДұЕҹ hakkДұ.*",
    "Г§Г¶zГјm|hizmet|ne yapДұyor|nedir|ГјrГјn": "KOBД°'ler iГ§in 3 ana alanda Г§Г¶zГјm sunuyoruz:\n\nрҹ“Ӣ **Muhasebe bГјrolarДұ** вҖ” MГјЕҹteri sorgularДұnДұ yanДұtlama, randevu yГ¶netimi, evrak takibi\nрҹӣ’ **E-ticaret** вҖ” 7/24 mГјЕҹteri desteДҹi, sipariЕҹ takibi, stok yГ¶netimi\nрҹҚҪпёҸ **Restoran & Kafe** вҖ” WhatsApp'tan rezervasyon, menГј bilgisi, paket servis yГ¶netimi\n\n*Hepsi mevcut yazДұlДұmДұnДұzla entegre Г§alДұЕҹДұr.*",
    "iletiЕҹim|ulaЕҹmak|telefon|mail|whatsapp|instagram": "рҹ“һ **Bize UlaЕҹДұn**\n\nрҹ’¬ **WhatsApp:** +90 530 398 27 12\nрҹ“§ **E-posta:** kivon.iletisim@gmail.com\nрҹ“ё **Instagram:** @kivon.iletisim\n\n*En geГ§ 24 saat iГ§inde dГ¶nГјЕҹ yaparДұz. Гңcretsiz keЕҹif gГ¶rГјЕҹmesi iГ§in mesaj atmanДұz yeterli!*",
    "demo|deneme|test|gГ¶steri": "рҹ–ҘпёҸ **CanlДұ DemolarДұmДұz**\n\nрҹ’¬ AI Chatbot вҖ” Soru sorun, cevap alsДұn\nрҹ“Ҡ Veri AnalitiДҹi Paneli вҖ” Grafikleri inceleyin\nрҹ§Ә AI HazДұrlДұk Testi вҖ” Д°Еҹletmenizin AI seviyesini Г¶lГ§Гјn\nрҹ§® Muhasebe AraГ§larДұ вҖ” Fatura, KDV hesaplama\n\n*TГјmГј Гјcretsiz, kayДұt gerekmez.*",
    "muhasebe|smmm|mali mГјЕҹavir|muhasebeci": "Muhasebe bГјrolarДұ iГ§in chatbot'umuz, tekrarlayan mГјЕҹteri sorularДұnДұn %70'ini alДұr. Dekont, fatura, randevu sorgularДұnДұ otomatik yanДұtlar. Logo, ParaЕҹГјt, LUCA, Mikro ile tam uyumlu. Ayda 16+ saat zaman kazancДұ.",
    "eticaret|e-ticaret|e ticaret|online maДҹaza": "E-ticaret iЕҹletmeleri iГ§in 7/24 otomatik mГјЕҹteri desteДҹi, sipariЕҹ/iade takibi, stok uyarДұlarДұ, terk edilen sepet hatДұrlatmalarДұ. Shopify, WooCommerce, Trendyol, Hepsiburada entegrasyonu.",
    "restoran|kafe|yemek|cafe|restaurant": "Restoran ve kafeler iГ§in WhatsApp Гјzerinden rezervasyon alma, mГјsaitlik kontrolГј, menГј bilgisi paylaЕҹma, paket servis yГ¶netimi. Telefon trafiДҹini azaltДұr, servise odaklanmanДұzДұ saДҹlar.",
    "merhaba|selam|naber|iyi gГјnler|gГјnaydДұn": "Merhaba! рҹ‘Ӣ Size nasДұl yardДұmcДұ olabilirim? AЕҹaДҹДұdaki butonlardan bir konu seГ§ebilir veya sorunuzu doДҹrudan yazabilirsiniz."
  }
};

// в”Җв”Җв”Җ DOM в”Җв”Җв”Җ
const body = document.getElementById('kivonChatBody');
const quick = document.getElementById('kivonQuickReplies');
const input = document.getElementById('kivonChatInput');

let isOpen = false;

window.kivonToggleChat = function() {
  const panel = document.getElementById('kivon-chat-panel');
  const btn = document.getElementById('kivon-widget-btn');
  isOpen = !isOpen;
  panel.classList.toggle('open', isOpen);
  if (isOpen) {
    btn.querySelector('.badge').style.display = 'none';
    input.focus();
    body.scrollTop = body.scrollHeight;
  }
};

// в”Җв”Җв”Җ MESSAGES в”Җв”Җв”Җ
function kivonAddMsg(text, type) {
  const div = document.createElement('div');
  div.className = 'kivon-msg ' + type;
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function kivonTyping(ms) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = 'kivon-typing';
    div.id = 'kivonTypingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    setTimeout(() => { const el = document.getElementById('kivonTypingIndicator'); if (el) el.remove(); resolve(); }, ms);
  });
}

async function kivonBotReply(text) {
  await kivonTyping(600 + Math.random() * 500);
  kivonAddMsg(text, 'bot');
  kivonSetButtons(varsayilanButonlar);
}

function kivonFindAnswer(metin) {
  const lower = metin.toLowerCase().trim();
  if (!lower) return null;
  for (const [anahtar, yanit] of Object.entries(KB.yanitlar)) {
    const kelimeler = anahtar.split('|');
    for (const k of kelimeler) {
      if (lower.includes(k.trim())) return yanit;
    }
  }
  return null;
}

// в”Җв”Җв”Җ BUTTONS в”Җв”Җв”Җ
const varsayilanButonlar = ['рҹ’° Fiyat', 'рҹ”§ ГҮГ¶zГјmler', 'рҹ“һ Д°letiЕҹim', 'рҹ–ҘпёҸ Demolar'];

function kivonSetButtons(butonlar) {
  quick.innerHTML = butonlar.map(b => `<button class="kivon-quick-btn">${b}</button>`).join('');
  quick.querySelectorAll('.kivon-quick-btn').forEach(btn => {
    btn.addEventListener('click', function() { kivonHandleMsg(this.textContent); });
  });
}

async function kivonHandleMsg(metin) {
  input.value = '';
  kivonAddMsg(metin, 'user');

  const lower = metin.toLowerCase();

  if (lower.includes('fiyat') || lower.includes('рҹ’°')) {
    await kivonBotReply(KB.yanitlar["fiyat|Гјcret|paket|kaГ§ para|kaГ§ tl|ne kadar"]);
    return;
  }
  if (lower.includes('Г§Г¶zГјm') || lower.includes('hizmet') || lower.includes('рҹ”§')) {
    await kivonBotReply(KB.yanitlar["Г§Г¶zГјm|hizmet|ne yapДұyor|nedir|ГјrГјn"]);
    return;
  }
  if (lower.includes('iletiЕҹim') || lower.includes('ulaЕҹmak') || lower.includes('telefon') || lower.includes('рҹ“һ')) {
    await kivonBotReply(KB.yanitlar["iletiЕҹim|ulaЕҹmak|telefon|mail|whatsapp|instagram"]);
    return;
  }
  if (lower.includes('demo') || lower.includes('deneme') || lower.includes('рҹ–ҘпёҸ')) {
    await kivonBotReply(KB.yanitlar["demo|deneme|test|gГ¶steri"]);
    return;
  }
  const yanit = kivonFindAnswer(metin);
  if (yanit) {
    await kivonBotReply(yanit);
    return;
  }
  await kivonBotReply(KB.bilinmeyen);
}

window.kivonSendMsg = function() {
  const text = input.value.trim();
  if (!text) return;
  kivonHandleMsg(text);
};

// в”Җв”Җв”Җ INIT в”Җв”Җв”Җ
setTimeout(async () => {
  await kivonTyping(700);
  kivonAddMsg(KB.karsilama, 'bot');
  kivonSetButtons(varsayilanButonlar);
}, 300);

})();
