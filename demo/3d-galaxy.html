<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="description" content="KIVON 3D Galaxy animasyonu — AI ve teknolojinin evrensel etkisini simgeleyen büyüleyici galaksi partikül gösterimi."><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KIVON — 3D Galaxy</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden}
#c{position:fixed;top:0;left:0;width:100%;height:100%}
.h{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.1);font-size:12px;z-index:10;letter-spacing:2px;pointer-events:none}
</style>
</head>
<body>
<div class="h">✦ Fare ile döndür · Tıkla patlat ✦</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z=15;

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
document.body.prepend(renderer.domElement);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.4,0.3,0.1);
composer.addPass(bloom);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.05;controls.autoRotate=true;
controls.autoRotateSpeed=0.8;controls.enableZoom=true;controls.enablePan=false;
controls.maxPolarAngle=Math.PI/2;controls.minPolarAngle=0;

// Galaxy
const count=15000;
const pos=new Float32Array(count*3);
const col=new Float32Array(count*3);
const size=new Float32Array(count);
const orig=new Float32Array(count*3);
const dest=new Float32Array(count*3);

const c1=new THREE.Color('#38bdf8');
const c2=new THREE.Color('#6366f1');
const c3=new THREE.Color('#fbbf24');
const c4=new THREE.Color('#ec4899');

for(let i=0;i<count;i++){
  const t=i/count;
  const angle=t*Math.PI*8;
  const radius=2+Math.abs(t-0.5)*8;
  const spread=Math.sin(t*Math.PI*6)*0.5;
  
  orig[i*3]=Math.cos(angle)*radius+spread;
  orig[i*3+1]=(t-0.5)*6+Math.cos(t*Math.PI*10)*0.3;
  orig[i*3+2]=Math.sin(angle)*radius+spread;
  
  dest[i*3]=(Math.random()-0.5)*25;
  dest[i*3+1]=(Math.random()-0.5)*25;
  dest[i*3+2]=(Math.random()-0.5)*25;
  
  pos[i*3]=orig[i*3];pos[i*3+1]=orig[i*3+1];pos[i*3+2]=orig[i*3+2];
  size[i]=0.02+Math.random()*0.1;
  
  const c=i%4===0?c1:i%4===1?c2:i%4===2?c3:c4;
  col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
}

const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.BufferAttribute(col,3));
geo.setAttribute('size',new THREE.BufferAttribute(size,1));

const mat=new THREE.PointsMaterial({
  size:0.06,vertexColors:true,transparent:true,opacity:0.85,
  blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true
});
const pts=new THREE.Points(geo,mat);
scene.add(pts);

// Center glow
const g=new THREE.Mesh(
  new THREE.SphereGeometry(0.3,16,16),
  new THREE.MeshBasicMaterial({color:'#38bdf8',transparent:true,opacity:0.3})
);
scene.add(g);

let progress=0,dir=1;
const p=pts.geometry.attributes.position.array;

function animate(){
  requestAnimationFrame(animate);
  progress+=0.002*dir;
  if(progress>=1||progress<=0)dir*=-1;
  const e=progress<0.5?2*progress*progress:1-Math.pow(-2*progress+2,2)/2;
  for(let i=0;i<count;i++){
    p[i*3]=orig[i*3]+(dest[i*3]-orig[i*3])*e;
    p[i*3+1]=orig[i*3+1]+(dest[i*3+1]-orig[i*3+1])*e;
    p[i*3+2]=orig[i*3+2]+(dest[i*3+2]-orig[i*3+2])*e;
  }
  pts.geometry.attributes.position.needsUpdate=true;
  g.scale.setScalar(1+e*4);
  controls.update();
  composer.render();
}
animate();

renderer.domElement.addEventListener('click',()=>{dir*=-1});

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  composer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
