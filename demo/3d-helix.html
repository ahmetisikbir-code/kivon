<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KIVON — 3D Helix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;font-family:-apple-system,'Segoe UI',sans-serif}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%}
.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;z-index:10;
}
.overlay h1{
  font-size:clamp(3rem,10vw,8rem);font-weight:900;
  letter-spacing:-0.04em;color:#fff;
  text-shadow:0 0 80px rgba(56,189,248,0.2);
  opacity:0;animation:fadeIn 2s 1s forwards;
}
.overlay h1 span{background:linear-gradient(135deg,#38bdf8,#6366f1,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay p{
  color:rgba(255,255,255,0.3);font-size:clamp(0.8rem,2vw,1.2rem);
  letter-spacing:6px;text-transform:uppercase;
  margin-top:8px;opacity:0;animation:fadeIn 2s 1.5s forwards;
}
@keyframes fadeIn{to{opacity:1}}
.hint{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.1);font-size:12px;z-index:10;
  letter-spacing:2px;animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
</style>
</head>
<body>
<div class="overlay">
  <h1><span>KIVON</span></h1>
  <p>Yapay Zeka ile Geleceğe</p>
</div>
<div class="hint">✦ Fare ile etkileşim ✦</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 12;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.prepend(renderer.domElement);

// Bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.3, 0.5, 0.1);
composer.addPass(bloom);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;
controls.enableZoom = true;
controls.enablePan = false;
controls.maxPolarAngle = Math.PI / 2;
controls.minPolarAngle = 0;

// Particles
const particleCount = 4000;
const positions = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);
const colors = new Float32Array(particleCount * 3);
const speeds = new Float32Array(particleCount);
const origins = new Float32Array(particleCount * 3);
const targets = new Float32Array(particleCount * 3);

const color1 = new THREE.Color('#38bdf8');
const color2 = new THREE.Color('#6366f1');
const color3 = new THREE.Color('#fbbf24');

// Create helix shape
for (let i = 0; i < particleCount; i++) {
  const t = i / particleCount;
  const angle = t * Math.PI * 12;
  const radius = 3 + Math.sin(t * Math.PI * 4) * 1;
  
  origins[i*3] = Math.cos(angle) * radius;
  origins[i*3+1] = (t - 0.5) * 8;
  origins[i*3+2] = Math.sin(angle) * radius;
  
  // Random target (exploded state)
  targets[i*3] = (Math.random() - 0.5) * 20;
  targets[i*3+1] = (Math.random() - 0.5) * 20;
  targets[i*3+2] = (Math.random() - 0.5) * 20;
  
  positions[i*3] = origins[i*3];
  positions[i*3+1] = origins[i*3+1];
  positions[i*3+2] = origins[i*3+2];
  
  sizes[i] = 0.03 + Math.random() * 0.08;
  speeds[i] = 0.2 + Math.random() * 0.3;
  
  const col = i % 3 === 0 ? color1 : i % 3 === 1 ? color2 : color3;
  colors[i*3] = col.r;
  colors[i*3+1] = col.g;
  colors[i*3+2] = col.b;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const material = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

// Central glow
const glowGeometry = new THREE.SphereGeometry(0.5, 16, 16);
const glowMaterial = new THREE.MeshBasicMaterial({
  color: '#38bdf8',
  transparent: true,
  opacity: 0.2,
});
const glow = new THREE.Mesh(glowGeometry, glowMaterial);
scene.add(glow);

// Animation state
let progress = 0;
let direction = 1;
const pos = particles.geometry.attributes.position.array;

function animate() {
  requestAnimationFrame(animate);
  
  progress += 0.003 * direction;
  
  if (progress >= 1 || progress <= 0) {
    direction *= -1;
  }
  
  const ease = progress < 0.5 
    ? 2 * progress * progress 
    : 1 - Math.pow(-2 * progress + 2, 2) / 2;
  
  for (let i = 0; i < particleCount; i++) {
    pos[i*3]     = origins[i*3]   + (targets[i*3]   - origins[i*3])   * ease;
    pos[i*3+1]   = origins[i*3+1] + (targets[i*3+1] - origins[i*3+1]) * ease;
    pos[i*3+2]   = origins[i*3+2] + (targets[i*3+2] - origins[i*3+2]) * ease;
  }
  
  particles.geometry.attributes.position.needsUpdate = true;
  glow.scale.setScalar(1 + ease * 3);
  
  controls.update();
  composer.render();
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// Click toggle
renderer.domElement.addEventListener('click', () => {
  direction *= -1;
});
</script>
</body>
</html>
