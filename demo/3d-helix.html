<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KIVON — 3D Helix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;font-family:-apple-system,'Segoe UI',sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%}
.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
}
.overlay svg{width:64px;height:64px;margin-bottom:16px;opacity:0;animation:fi 2s 2s forwards}
.overlay h1{
  font-size:clamp(2.5rem,8vw,6rem);font-weight:900;letter-spacing:-0.04em;
  background:linear-gradient(135deg,#38bdf8,#6366f1,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:0;animation:fi 2s 1.5s forwards;
}
.overlay p{
  color:rgba(255,255,255,0.2);font-size:clamp(0.7rem,1.5vw,1rem);
  letter-spacing:6px;text-transform:uppercase;margin-top:8px;
  opacity:0;animation:fi 2s 2.5s forwards;
}
@keyframes fi{to{opacity:1}}
.stats{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:32px;pointer-events:none;
  opacity:0;animation:fi 2s 3s forwards;
}
.stat{text-align:center}
.stat-n{font-size:20px;font-weight:900;color:#38bdf8}
.stat-l{font-size:10px;color:rgba(255,255,255,0.15);text-transform:uppercase;letter-spacing:2px}
.hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
  color:rgba(255,255,255,0.06);font-size:11px;letter-spacing:2px;
  animation:br 2s infinite;pointer-events:none;
}
@keyframes br{0%,100%{opacity:0.2}50%{opacity:0.5}}
</style>
</head>
<body>
<div class="overlay">
  <svg viewBox="0 0 64 64" fill="none"><rect x="2" y="2" width="60" height="60" rx="14" fill="#0a0a1a" stroke="#38bdf8" stroke-width="2"/><circle cx="20" cy="22" r="5" fill="#38bdf8"/><circle cx="44" cy="18" r="5" fill="#38bdf8"/><circle cx="32" cy="42" r="5" fill="#38bdf8"/><line x1="25" y1="22" x2="39" y2="18" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/><line x1="20" y1="27" x2="28" y2="37" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/><line x1="44" y1="23" x2="37" y2="37" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/></svg>
  <h1>KIVON</h1>
  <p>Yapay Zeka ile KOBİ'nizi Dönüştürün</p>
</div>
<div class="stats">
  <div class="stat"><div class="stat-n">29</div><div class="stat-l">MCP</div></div>
  <div class="stat"><div class="stat-n">30</div><div class="stat-l">Çözüm</div></div>
  <div class="stat"><div class="stat-n">17</div><div class="stat-l">Uzman</div></div>
  <div class="stat"><div class="stat-n">3</div><div class="stat-l">Sektör</div></div>
</div>
<div class="hint">✦ Fare ile döndür · Tıkla patlat · Kaydır yakınlaş ✦</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,14);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
document.body.prepend(renderer.domElement);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new Vector2(innerWidth,innerHeight),0.3,0.5,0.1);
composer.addPass(bloom);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.05;controls.autoRotate=true;
controls.autoRotateSpeed=1.2;controls.enableZoom=true;controls.enablePan=false;
controls.maxPolarAngle=Math.PI/2;controls.minPolarAngle=0;controls.target.set(0,0,0);

// Particles
const N=5000;
const pos=new Float32Array(N*3);
const col=new Float32Array(N*3);
const sz=new Float32Array(N);
const src=new Float32Array(N*3);
const dst=new Float32Array(N*3);

const c1=new THREE.Color('#38bdf8');
const c2=new THREE.Color('#6366f1');
const c3=new THREE.Color('#fbbf24');
const c4=new THREE.Color('#7dd3fc');

for(let i=0;i<N;i++){
  const t=i/N;
  const angle=t*Math.PI*12;
  const radius=2.5+Math.sin(t*Math.PI*5)*1.2;
  const y=(t-0.5)*7;
  
  src[i*3]=Math.cos(angle)*radius;
  src[i*3+1]=y+Math.sin(t*Math.PI*8)*0.2;
  src[i*3+2]=Math.sin(angle)*radius;
  
  const r=6+Math.random()*8;
  const theta=Math.random()*Math.PI*2;
  const phi=Math.acos(2*Math.random()-1);
  dst[i*3]=Math.sin(phi)*Math.cos(theta)*r;
  dst[i*3+1]=Math.sin(phi)*Math.sin(theta)*r;
  dst[i*3+2]=Math.cos(phi)*r;
  
  pos[i*3]=src[i*3];pos[i*3+1]=src[i*3+1];pos[i*3+2]=src[i*3+2];
  sz[i]=0.02+Math.random()*0.1;
  
  const ci=i%4===0?c1:i%4===1?c2:i%4===2?c3:c4;
  col[i*3]=ci.r;col[i*3+1]=ci.g;col[i*3+2]=ci.b;
}

const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.BufferAttribute(col,3));
geo.setAttribute('size',new THREE.BufferAttribute(sz,1));

const mat=new THREE.PointsMaterial({
  size:0.07,vertexColors:true,transparent:true,opacity:0.9,
  blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true
});
const pts=new THREE.Points(geo,mat);
scene.add(pts);

// Central glow ring
const ringGeo=new THREE.TorusGeometry(1.8,0.02,16,64);
const ringMat=new THREE.MeshBasicMaterial({color:'#38bdf8',transparent:true,opacity:0.2});
const ring=new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x=Math.PI/3;
scene.add(ring);

const ring2=new THREE.Mesh(new THREE.TorusGeometry(2.2,0.015,16,64),ringMat);
ring2.rotation.x=-Math.PI/4;ring2.rotation.y=0.5;
scene.add(ring2);

const core=new THREE.Mesh(
  new THREE.SphereGeometry(0.3,16,16),
  new THREE.MeshBasicMaterial({color:'#38bdf8',transparent:true,opacity:0.3})
);
scene.add(core);

// Floating particles
const fCount=200;
const fPos=new Float32Array(fCount*3);
for(let i=0;i<fCount;i++){
  fPos[i*3]=(Math.random()-0.5)*20;
  fPos[i*3+1]=(Math.random()-0.5)*15;
  fPos[i*3+2]=(Math.random()-0.5)*20;
}
const fGeo=new THREE.BufferGeometry();
fGeo.setAttribute('position',new THREE.BufferAttribute(fPos,3));
const fMat=new THREE.PointsMaterial({
  size:0.015,color:'#38bdf8',transparent:true,opacity:0.15,
  blending:THREE.AdditiveBlending,depthWrite:false
});
const fPts=new THREE.Points(fGeo,fMat);
scene.add(fPts);

let progress=0,dir=1;
const p=pts.geometry.attributes.position.array;

function anim(){
  requestAnimationFrame(anim);
  progress+=0.002*dir;
  if(progress>=1||progress<=0)dir*=-1;
  const e=progress<0.5?2*progress*progress:1-Math.pow(-2*progress+2,2)/2;
  
  for(let i=0;i<N;i++){
    p[i*3]=src[i*3]+(dst[i*3]-src[i*3])*e;
    p[i*3+1]=src[i*3+1]+(dst[i*3+1]-src[i*3+1])*e;
    p[i*3+2]=src[i*3+2]+(dst[i*3+2]-src[i*3+2])*e;
  }
  pts.geometry.attributes.position.needsUpdate=true;
  
  ring.rotation.z+=0.005;
  ring2.rotation.x+=0.003;ring2.rotation.y+=0.004;
  core.scale.setScalar(1+e*4);
  
  controls.update();
  composer.render();
}
anim();

renderer.domElement.addEventListener('click',()=>{dir*=-1});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
