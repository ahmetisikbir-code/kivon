<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d872"/>
      <stop offset="25%" stop-color="#e8c44e"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="75%" stop-color="#dbb94a"/>
      <stop offset="100%" stop-color="#a08630"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="30%" stop-color="#f5e080"/>
      <stop offset="70%" stop-color="#e8c44e"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="goldWarm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf0a0"/>
      <stop offset="50%" stop-color="#dbb94a"/>
      <stop offset="100%" stop-color="#b89430"/>
    </linearGradient>
    <linearGradient id="burgundy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a1a3a"/>
      <stop offset="50%" stop-color="#6b142b"/>
      <stop offset="100%" stop-color="#4a0e1e"/>
    </linearGradient>
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0e1a"/>
      <stop offset="60%" stop-color="#1f0c14"/>
      <stop offset="100%" stop-color="#12060a"/>
    </radialGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e080"/>
      <stop offset="30%" stop-color="#e8c44e"/>
      <stop offset="60%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6b20"/>
    </linearGradient>
    <path id="topArc" d="M 22,100 A 78,78 0 0,1 178,100"/>
    <path id="bottomArc" d="M 32,100 A 68,68 0 0,0 168,100"/>
    <g id="dot">
      <circle cx="0" cy="0" r="1.2" fill="url(#goldLight)"/>
    </g>
  </defs>

  <!-- Outer dark circle -->
  <circle cx="100" cy="100" r="98" fill="url(#darkBg)"/>

  <!-- Outer gold rim -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#gold)" stroke-width="2.5"/>

  <!-- Beaded ring -->
  <circle cx="100" cy="100" r="91.5" fill="none" stroke="url(#goldLight)" stroke-width="2" stroke-dasharray="0, 8.5" stroke-linecap="round"/>

  <!-- Burgundy band -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="url(#burgundy)" stroke-width="5"/>
  <circle cx="100" cy="100" r="84.5" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#gold)" stroke-width="0.8"/>

  <!-- Small dot ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#goldLight)" stroke-width="1" stroke-dasharray="0, 5" stroke-linecap="round"/>

  <!-- Inner thin ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#gold)" stroke-width="0.6"/>

  <!-- ===== CENTRAL DIAMOND ===== -->
  <path d="M 100,38 L 148,100 L 100,162 L 52,100 Z" fill="url(#diamondGrad)" stroke="url(#goldLight)" stroke-width="1.2"/>
  <path d="M 100,38 L 100,162" stroke="url(#goldLight)" stroke-width="0.6" opacity="0.6"/>
  <path d="M 52,100 L 148,100" stroke="url(#goldLight)" stroke-width="0.6" opacity="0.6"/>

  <!-- Diamond facets - upper -->
  <path d="M 100,38 L 100,100 L 78,78 Z" fill="url(#goldLight)" opacity="0.4"/>
  <path d="M 100,38 L 122,78 L 100,100 Z" fill="url(#goldWarm)" opacity="0.4"/>
  <!-- Diamond facets - lower -->
  <path d="M 100,100 L 78,122 L 100,162 Z" fill="url(#goldWarm)" opacity="0.4"/>
  <path d="M 100,100 L 122,122 L 100,162 Z" fill="url(#goldLight)" opacity="0.4"/>
  <!-- Diamond wings -->
  <path d="M 52,100 L 78,78 L 100,100 L 78,122 Z" fill="url(#goldWarm)" opacity="0.3"/>
  <path d="M 148,100 L 122,78 L 100,100 L 122,122 Z" fill="url(#goldLight)" opacity="0.3"/>

  <!-- Inner diamond border -->
  <path d="M 100,44 L 144,100 L 100,156 L 56,100 Z" fill="none" stroke="url(#goldWarm)" stroke-width="0.8"/>

  <!-- ===== 8-POINTED STAR ===== -->
  <path d="M 100,72 L 103.5,88 L 116,82 L 109.5,95 L 126,100 L 109.5,105 L 116,118 L 103.5,112 L 100,128 L 96.5,112 L 84,118 L 90.5,105 L 74,100 L 90.5,95 L 84,82 L 96.5,88 Z" fill="url(#goldWarm)" stroke="url(#gold)" stroke-width="1"/>

  <!-- Star center -->
  <circle cx="100" cy="100" r="4" fill="#fff8d0" stroke="url(#goldLight)" stroke-width="0.5"/>
  <circle cx="100" cy="100" r="1.5" fill="#fff" opacity="0.8"/>

  <!-- ===== CURVED TEXT ===== -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="9" fill="url(#gold)" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">BİNDALLI &amp; KAFTAN</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="5.5" fill="url(#goldLight)" letter-spacing="2.5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">✦ PREMIUM BRIDAL WEAR ✦</textPath>
  </text>

  <!-- ===== DECORATIVE DOTS ===== -->
  <use href="#dot" x="100" y="20"/>
  <use href="#dot" x="100" y="180"/>
  <use href="#dot" x="20" y="100"/>
  <use href="#dot" x="180" y="100"/>
  <use href="#dot" x="143" y="32"/>
  <use href="#dot" x="57" y="32"/>
  <use href="#dot" x="143" y="168"/>
  <use href="#dot" x="57" y="168"/>

  <!-- Small decorative arcs at cardinal points -->
  <path d="M 88,16 Q 100,12 112,16" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>
  <path d="M 88,184 Q 100,188 112,184" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>
  <path d="M 16,88 Q 12,100 16,112" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>
  <path d="M 184,88 Q 188,100 184,112" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>

  <!-- Tiny corner flourishes -->
  <path d="M 32,6 Q 26,10 24,18" fill="none" stroke="url(#gold)" stroke-width="0.7" opacity="0.5"/>
  <path d="M 168,6 Q 174,10 176,18" fill="none" stroke="url(#gold)" stroke-width="0.7" opacity="0.5"/>
  <path d="M 32,194 Q 26,190 24,182" fill="none" stroke="url(#gold)" stroke-width="0.7" opacity="0.5"/>
  <path d="M 168,194 Q 174,190 176,182" fill="none" stroke="url(#gold)" stroke-width="0.7" opacity="0.5"/>

  <!-- Subtle glow ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="url(#gold)" stroke-width="0.4" opacity="0.3"/>
</svg>
