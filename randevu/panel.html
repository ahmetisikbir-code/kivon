<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Randevularım — KIVON</title>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      KIVON
    </div>
    <div class="nav-links">
      <span id="userName" style="font-weight:600;font-size:14px;color:var(--text)"></span>
      <a href="admin.html" id="doctorLink" class="btn btn-outline btn-sm" style="display:none">Doktor Paneli</a>
      <button id="logoutBtn" class="btn btn-ghost btn-sm">Çıkış Yap</button>
    </div>
  </nav>

  <main style="padding-top:92px;padding-bottom:60px;">
    <div class="container">
      <div class="page-header" style="margin-top:4px">
        <h1 class="page-title">Randevularım</h1>
        <div class="page-actions">
          <button id="newAppointmentBtn" class="btn btn-primary">Yeni Randevu</button>
        </div>
      </div>

      <div id="appointmentsList">
        <div class="spinner" style="margin:60px auto;"></div>
      </div>

      <div class="whatsapp-section">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="1.5" style="margin-bottom:12px">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <h3>WhatsApp'tan da randevu alabilirsiniz</h3>
        <p>7/24 randevu almak için WhatsApp üzerinden mesaj gönderebilirsiniz.</p>
        <a href="https://wa.me/905303982712" class="btn btn-outline" target="_blank">WhatsApp'tan Yaz</a>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="bookModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Yeni Randevu</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="step-indicators">
          <div class="step-indicator active">1</div>
          <div class="step-indicator">2</div>
          <div class="step-indicator">3</div>
        </div>
        <div id="modalContent">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { redirectIfNotAuthenticated, getUser, setUser } from './js/auth.js';
    import { supabase, getProfile, getAppointments, logout, getDoctors } from './js/api.js';
    import { renderAppointments, setupBookModal } from './js/appointments.js';
    import { showToast, confirmDialog, statusBadge, getInitials, formatDate, formatTime } from './js/ui.js';

    redirectIfNotAuthenticated();

    const userNameEl = document.getElementById('userName');
    const user = getUser();
    if (user?.full_name) {
      userNameEl.textContent = user.full_name;
    } else if (user?.email) {
      userNameEl.textContent = user.email;
    }

    getProfile().then(res => {
      if (res.data?.user) {
        setUser(res.data.user);
        const u = res.data.user;
        userNameEl.textContent = u.full_name || u.email;
      }
      if (res.data?.profile?.role === 'doctor') {
        document.getElementById('doctorLink').style.display = 'inline-flex';
      }
    }).catch(() => {});

    const container = document.getElementById('appointmentsList');
    renderAppointments(container);

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'giris.html';
    });

    document.getElementById('newAppointmentBtn').addEventListener('click', () => {
      window.dispatchEvent(new CustomEvent('open-book-modal'));
    });

    setupBookModal();
  </script>
</body>
</html>
