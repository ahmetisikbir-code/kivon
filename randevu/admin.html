<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doktor Paneli — KIVON Randevu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <aside class="dash-sidebar" id="sidebar">
      <a href="admin.html" class="dash-sidebar-logo">KIVON</a>
      <nav class="dash-nav">
        <a href="admin.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Randevularim
        </a>
      </nav>
      <div class="dash-sidebar-footer">
        <a href="#" id="logoutBtn" style="color:var(--danger)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;vertical-align:middle;margin-right:8px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cikis Yap
        </a>
      </div>
    </aside>

    <main class="dash-main">
      <div class="dash-header">
        <h1>Doktor Paneli</h1>
        <div class="dash-header-right">
          <div class="user-avatar" id="userAvatar">D</div>
        </div>
      </div>

      <div class="admin-controls">
        <div style="display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius)">
          <span style="font-size:14px;color:var(--text-muted)">Musaitlik Durumu:</span>
          <label class="toggle-switch">
            <input type="checkbox" id="availabilityToggle" checked>
            <span class="toggle-slider"></span>
          </label>
          <span id="availabilityStatus" style="font-size:14px;color:var(--success);font-weight:500">Musait</span>
        </div>
        <button class="btn btn-primary" id="generateSlotsBtn">Slot Olustur</button>
      </div>

      <div id="appointmentsContainer"></div>
    </main>
  </div>

  <div class="modal-overlay" id="generateModal">
    <div class="modal glass" style="position:relative">
      <button class="modal-close">&times;</button>
      <h2>Slot Olustur</h2>
      <form id="generateForm">
        <div class="form-group">
          <label>Baslangic Tarihi</label>
          <input type="date" class="form-input" id="startDate" required>
        </div>
        <div class="form-group">
          <label>Bitis Tarihi</label>
          <input type="date" class="form-input" id="endDate" required>
        </div>
        <button type="submit" class="btn btn-primary form-submit">Olustur</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { redirectIfNotAuthenticated, getUser, clearToken } from './js/auth.js';
    import { supabase, getSession, getAppointments, cancelAppointment, generateSlots } from './js/api.js';

    redirectIfNotAuthenticated();

    const user = getUser();
    const avatar = document.getElementById('userAvatar');
    if (user && user.full_name) {
      avatar.textContent = user.full_name.charAt(0).toUpperCase();
    }

    async function checkRole() {
      const session = await getSession();
      if (!session) return;
      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single();
      if (profile && profile.role !== 'doctor') {
        window.location.href = 'panel.html';
      }
    }

    async function getDoctorId() {
      const session = await getSession();
      if (!session) throw new Error('Oturum bulunamadi');
      const { data: doctor } = await supabase
        .from('doctors')
        .select('id')
        .eq('profile_id', session.user.id)
        .single();
      if (!doctor) throw new Error('Doktor profili bulunamadi');
      return doctor.id;
    }

    async function fetchDoctorAppointments() {
      const session = await getSession();
      if (!session) throw new Error('Oturum bulunamadi');
      const doctorId = await getDoctorId();
      const { data, error } = await supabase
        .from('appointments')
        .select('id, date, time, status, notes, user_id, profiles(full_name, phone)')
        .eq('doctor_id', doctorId)
        .order('date', { ascending: true })
        .order('time', { ascending: true });
      if (error) throw new Error(error.message);
      return data || [];
    }

    async function cancelDoctorAppointment(id) {
      const session = await getSession();
      if (!session) throw new Error('Oturum bulunamadi');
      const doctorId = await getDoctorId();
      const { data: appt, error: getError } = await supabase
        .from('appointments')
        .select('slot_id')
        .eq('id', id)
        .eq('doctor_id', doctorId)
        .single();
      if (getError) throw new Error('Randevu bulunamadi');
      if (appt.slot_id) {
        await supabase.from('availability').update({ is_booked: false }).eq('id', appt.slot_id);
      }
      const { error } = await supabase
        .from('appointments')
        .update({ status: 'cancelled' })
        .eq('id', id)
        .eq('doctor_id', doctorId);
      if (error) throw new Error(error.message);
      return true;
    }

    async function loadAppointments() {
      const container = document.getElementById('appointmentsContainer');
      try {
        const appointments = await fetchDoctorAppointments();

        if (!appointments.length) {
          container.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <h3>Henuz randevu yok</h3>
              <p>Henuz size ait bir randevu bulunmuyor.</p>
            </div>
          `;
          return;
        }

        const table = document.createElement('table');
        table.className = 'appointments-table';
        table.style.cssText = 'width:100%;border-collapse:collapse;margin-top:24px';
        table.innerHTML = `
          <thead>
            <tr style="background:var(--glass);border-bottom:1px solid var(--glass-border)">
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px">Tarih</th>
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px">Saat</th>
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px">Hasta</th>
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px">Durum</th>
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px"></th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const tbody = table.querySelector('tbody');

        appointments.forEach(apt => {
          const date = new Date(apt.date + 'T00:00:00');
          const fullDate = date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
          const time = apt.time ? apt.time.slice(0, 5) : '';
          const status = (apt.status || 'pending').toLowerCase();
          const patientName = apt.profiles?.full_name || 'Bilinmeyen Hasta';
          const labels = { pending: 'Beklemede', confirmed: 'Onaylandi', cancelled: 'Iptal Edildi', completed: 'Tamamlandi' };
          const statusLabel = labels[status] || status;

          const tr = document.createElement('tr');
          tr.style.cssText = 'border-bottom:1px solid var(--glass-border);transition:background 0.2s';
          tr.addEventListener('mouseenter', () => { tr.style.background = 'var(--glass)'; });
          tr.addEventListener('mouseleave', () => { tr.style.background = ''; });
          tr.innerHTML = `
            <td style="padding:12px 16px;font-size:14px">${fullDate}</td>
            <td style="padding:12px 16px;font-size:14px">${time}</td>
            <td style="padding:12px 16px;font-size:14px">${patientName}</td>
            <td style="padding:12px 16px"><span class="badge badge-${status}">${statusLabel}</span></td>
            <td style="padding:12px 16px">
              ${status === 'pending' || status === 'confirmed' ? `<button class="btn btn-sm btn-danger cancel-btn" data-id="${apt.id}">Iptal</button>` : ''}
            </td>
          `;
          tbody.appendChild(tr);

          const cancelBtn = tr.querySelector('.cancel-btn');
          if (cancelBtn) {
            cancelBtn.addEventListener('click', async () => {
              if (await cancelBooking(cancelBtn.dataset.id)) {
                loadAppointments();
              }
            });
          }
        });

        container.innerHTML = '';
        container.appendChild(table);

      } catch (err) {
        container.innerHTML = `<p style="color:var(--danger);text-align:center;padding:40px">${err.message}</p>`;
      }
    }

    async function cancelBooking(id) {
      const confirmed = confirm('Randevuyu iptal etmek istediginize emin misiniz?');
      if (!confirmed) return false;
      try {
        await cancelDoctorAppointment(id);
        return true;
      } catch (err) {
        alert(err.message);
        return false;
      }
    }

    await checkRole();
    loadAppointments();

    const toggle = document.getElementById('availabilityToggle');
    const statusEl = document.getElementById('availabilityStatus');
    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        statusEl.textContent = 'Musait';
        statusEl.style.color = 'var(--success)';
      } else {
        statusEl.textContent = 'Musait Degil';
        statusEl.style.color = 'var(--danger)';
      }
    });

    const generateModal = document.getElementById('generateModal');
    document.getElementById('generateSlotsBtn').addEventListener('click', () => {
      generateModal.classList.add('open');
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('startDate').value = today;
      document.getElementById('endDate').value = '';
    });

    generateModal.querySelector('.modal-close').addEventListener('click', () => generateModal.classList.remove('open'));
    generateModal.addEventListener('click', (e) => { if (e.target === generateModal) generateModal.classList.remove('open'); });

    document.getElementById('generateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Olusturuluyor...';
      try {
        const session = await getSession();
        const { data: doctor } = await supabase
          .from('doctors')
          .select('id')
          .eq('profile_id', session.user.id)
          .single();
        await generateSlots(doctor.id, startDate, endDate);
        generateModal.classList.remove('open');
        loadAppointments();
      } catch (err) {
        alert('Hata: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Olustur';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await clearToken();
      window.location.href = 'giris.html';
    });
  </script>
</body>
</html>
