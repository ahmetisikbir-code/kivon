<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel — KIVON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%235b5bd6'/><text x='50' y='68' font-size='52' font-weight='bold' fill='white' text-anchor='middle' font-family='Inter,sans-serif'>K</text></svg>">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.supabase.co https://unpkg.com https://cdnjs.cloudflare.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.groq.com https://remiwuslxbqlzuevecic.supabase.co;">
  <style>
    .ambient-bg {
      position: fixed; inset: 0; z-index: -1; overflow: hidden;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    }
    .ambient-bg .bg-img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
      filter: blur(60px) saturate(1.2); transform: scale(1.15);
    }
    .ambient-bg .bg-img-1 { opacity: 0.35; }
    .ambient-bg .bg-img-2 { opacity: 0.2; filter: blur(100px); }
    .ambient-bg .orb {
      position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3;
      animation: orbFloat 25s ease-in-out infinite;
    }
    .ambient-bg .orb:nth-child(3) { width: 700px; height: 700px; background: radial-gradient(circle, #22d3ee, #0891b2); top: -15%; left: -8%; animation-delay: -5s; }
    .ambient-bg .orb:nth-child(4) { width: 600px; height: 600px; background: radial-gradient(circle, #a78bfa, #7c3aed); bottom: -20%; right: -10%; animation-delay: -10s; }
    .ambient-bg .orb:nth-child(5) { width: 400px; height: 400px; background: radial-gradient(circle, #fbbf24, #f59e0b); top: 50%; left: 60%; animation-delay: -15s; }
    .ambient-bg .grid-overlay {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    @keyframes orbFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 25% { transform: translate(40px, -50px) scale(1.1); } 50% { transform: translate(-30px, 20px) scale(0.95); } 75% { transform: translate(20px, -30px) scale(1.05); } }

    .ambient-sidebar {
      background: rgba(15,23,42,0.9); backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-right: 1px solid rgba(255,255,255,0.06);
      position: fixed; overflow: hidden;
    }
    .ambient-sidebar .sidebar-header { padding: 16px 16px 12px; }
    .ambient-sidebar .sidebar-nav { padding: 8px 8px; gap: 1px; }
    .ambient-sidebar .sidebar-link { padding: 8px 12px; font-size: 13px; }
    .ambient-sidebar .sidebar-link svg { width: 18px; height: 18px; }
    .ambient-sidebar .sidebar-footer { padding: 8px 8px; }
    .ambient-sidebar .sidebar-footer a, .ambient-sidebar .sidebar-footer button { font-size: 13px; padding: 8px 12px; }
    .ambient-sidebar::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(8,145,178,0.08) 0%, rgba(124,58,237,0.05) 100%);
      pointer-events: none;
    }
    .ambient-sidebar .sidebar-logo { color: white; }
    .ambient-sidebar .sidebar-link { color: rgba(255,255,255,0.55); }
    .ambient-sidebar .sidebar-link:hover { background: rgba(255,255,255,0.06); color: white; }
    .ambient-sidebar .sidebar-link.active { background: rgba(8,145,178,0.15); color: var(--primary-light); box-shadow: inset 3px 0 0 var(--primary-light); }
    .ambient-sidebar .sidebar-footer { border-top-color: rgba(255,255,255,0.06); }
    .ambient-sidebar .sidebar-footer a { color: rgba(255,255,255,0.45); }
    .ambient-sidebar .sidebar-footer a:hover { background: rgba(239,68,68,0.12); color: #fca5a5; }
    .ambient-sidebar .sidebar-brand { display: flex; align-items: center; gap: 10px; }
    .ambient-sidebar .sidebar-brand-icon { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: white; box-shadow: 0 4px 12px rgba(8,145,178,0.3); }

    .glass-card {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      transition: all var(--transition-slow);
    }
    .glass-card:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.12); }
    .glass-card-padded { padding: 24px; }

    .stat-card-dash {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: var(--space-xl) var(--space-2xl);
      position: relative; overflow: hidden; transition: all var(--transition-slow);
    }
    .stat-card-dash:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .stat-card-dash .stat-label { color: var(--text-muted); font-size: var(--text-xs); font-weight: var(--weight-semibold); text-transform: uppercase; letter-spacing: var(--tracking-wide); margin-bottom: var(--space-2xs); }
    .stat-card-dash .stat-value { color: var(--text); font-size: var(--text-3xl); font-weight: var(--weight-extrabold); letter-spacing: var(--tracking-tighter); line-height: var(--leading-snug); }
    .stat-card-dash .stat-trend { color: var(--text-muted); font-size: var(--text-xs); margin-top: var(--space-2xs); display: flex; align-items: center; gap: var(--space-2xs); }
    .main-content { margin-left: var(--sidebar-width); padding: 0 28px 28px; min-height: 100vh; position: relative; }
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .page-title { color: white; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }

    .tab-nav { display: flex; gap: 2px; margin-bottom: 24px; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; }
    .tab-btn { padding: 8px 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,0.45); border-radius: 10px; transition: all var(--transition); }
    .tab-btn:hover { color: rgba(255,255,255,0.8); }
    .tab-btn.active { background: rgba(255,255,255,0.1); color: white; font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: tabIn 0.35s ease; }

    .ambient-table {
      width: 100%; border-collapse: collapse;
    }
    .ambient-table th { padding: 12px 16px; text-align: left; font-weight: 500; font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .ambient-table td { padding: 12px 16px; font-size: 14px; color: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .ambient-table tr:hover td { background: rgba(255,255,255,0.03); }

    .ambient-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
    .ambient-select option { background: #1e293b; color: white; }
    .ambient-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
    .ambient-input::placeholder { color: rgba(255,255,255,0.25); }
    .ambient-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(8,145,178,0.15); }

    .ambient-badge { display: inline-flex; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.08); }
    .ambient-badge-success { background: rgba(16,185,129,0.15); color: #6ee7b7; border-color: rgba(16,185,129,0.2); }
    .ambient-badge-warning { background: rgba(245,158,11,0.15); color: #fcd34d; border-color: rgba(245,158,11,0.2); }
    .ambient-badge-danger { background: rgba(239,68,68,0.15); color: #fca5a5; border-color: rgba(239,68,68,0.2); }
    .ambient-badge-info { background: rgba(59,130,246,0.15); color: #93c5fd; border-color: rgba(59,130,246,0.2); }

    .whatsapp-glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 20px 24px; }
    .whatsapp-glass h3 { color: white; font-size: 16px; margin: 0; }
    .whatsapp-glass label { color: rgba(255,255,255,0.4); font-size: 12px; }

    #calendar { background: #fff; border: 1px solid #e2e8f0; border-radius: var(--radius); padding: 0; }
    .fc {
      font-family: 'Inter', sans-serif !important;
      --fc-page-bg-color: #fff;
      --fc-neutral-bg-color: #f8fafc;
      --fc-border-color: #e2e8f0;
      --fc-button-bg-color: #f1f5f9;
      --fc-button-border-color: #e2e8f0;
      --fc-button-text-color: #475569;
      --fc-button-hover-bg-color: #e2e8f0;
      --fc-button-hover-border-color: #cbd5e1;
      --fc-button-active-bg-color: #0891b2;
      --fc-button-active-border-color: #0891b2;
      --fc-today-bg-color: #ecfeff;
      --fc-event-bg-color: #0891b2;
      --fc-event-border-color: #0891b2;
      --fc-event-text-color: #fff;
      --fc-list-event-hover-bg-color: #f8fafc;
      background: #fff; border-radius: var(--radius);
    }
    .fc .fc-toolbar-title { color: #0f172a; font-size: 17px; font-weight: 700; }
    .fc .fc-button { border-radius: 8px; font-size: 13px; padding: 6px 14px; }
    .fc .fc-button-primary:not(:disabled).fc-button-active { font-weight: 700; color: #fff !important; }
    .fc .fc-col-header-cell-cushion { color: #475569; font-weight: 600; font-size: 12px; }
    .fc .fc-daygrid-day-number { color: #0f172a; font-size: 13px; font-weight: 500; }
    .fc .fc-daygrid-day-events { min-height: 40px; }
    .fc .fc-daygrid-day-frame { background: transparent; }
    .fc .fc-day-other .fc-daygrid-day-top { opacity: 0.35; }
    .fc .fc-daygrid-event { border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 600; border: none; margin: 2px 4px; }
    .fc .fc-daygrid-more-link { color: #64748b !important; font-size: 11px; }

    .appt-glass {
      display: flex; align-items: center; gap: 16px; padding: 14px 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius); transition: all var(--transition-slow); cursor: pointer;
    }
    .appt-glass:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }
    .appt-glass .apt-time { font-size: 16px; font-weight: 700; color: var(--primary-light); min-width: 50px; }
    .appt-glass .apt-name { flex: 1; font-size: 14px; color: rgba(255,255,255,0.9); }

    .patient-glass {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius); overflow: hidden; transition: all var(--transition);
    }
    .patient-glass:hover { background: rgba(255,255,255,0.06); }

    .page-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .lang-switcher { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; outline: none; }
    .lang-switcher option { background: #1e293b; color: white; }

    .empty-glass { text-align: center; padding: 60px 24px; }
    .empty-glass svg { width: 48px; height: 48px; color: rgba(255,255,255,0.15); margin-bottom: 16px; }
    .empty-glass h3 { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 6px; }
    .empty-glass p { color: rgba(255,255,255,0.3); font-size: 13px; }

    .modal-glass { background: rgba(15,23,42,0.95); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); }
    .modal-glass .modal-title { color: white; }
    .modal-glass .modal-close { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }

    [data-i18n] { transition: opacity 0.2s; }

    @keyframes tabIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-slide-up > * { animation: fadeSlideUp 0.4s ease both; }
    .fade-slide-up > *:nth-child(1) { animation-delay: 0.02s; }
    .fade-slide-up > *:nth-child(2) { animation-delay: 0.06s; }
    .fade-slide-up > *:nth-child(3) { animation-delay: 0.10s; }
    .fade-slide-up > *:nth-child(4) { animation-delay: 0.14s; }
    .fade-slide-up > *:nth-child(5) { animation-delay: 0.18s; }
    .fade-slide-up > *:nth-child(6) { animation-delay: 0.22s; }
    .stagger > * { animation: slideUp 0.4s ease both; }
    .stagger > *:nth-child(1) { animation-delay: 0.05s; }
    .stagger > *:nth-child(2) { animation-delay: 0.1s; }
    .stagger > *:nth-child(3) { animation-delay: 0.15s; }
    .stagger > *:nth-child(4) { animation-delay: 0.2s; }
    .stagger > *:nth-child(5) { animation-delay: 0.25s; }
    .stagger > *:nth-child(6) { animation-delay: 0.3s; }

    @media (max-width: 768px) {
      .main-content { margin-left: 0; padding: 0 12px 12px; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .page-header { flex-direction: column; align-items: stretch; }
      .glass-stat .stat-value { font-size: 18px; }
      .glass-stat { padding: 12px 14px; }
      #menuToggle { display: flex; }
      .stats-grid { grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 14px; }
    }
    @media (max-width: 480px) {
      .main-content { padding: 0 8px 8px; }
      .stats-grid { grid-template-columns: 1fr; gap: 6px; margin-bottom: 12px; }
    }
  </style>
</head>
<body>
  <div class="ambient-bg">
    <img src="images/gradient-purple.jpg" alt="" class="bg-img bg-img-1">
    <img src="images/abstract-flow.jpg" alt="" class="bg-img bg-img-2">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="grid-overlay"></div>
  </div>

  <aside class="sidebar ambient-sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#0f172a"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span class="sidebar-logo" data-i18n="appName">KIVON</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-link active" data-tab="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span data-i18n="calendar">Takvim</span>
      </button>
      <button class="sidebar-link" data-tab="list">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span data-i18n="list">Liste</span>
      </button>
      <button class="sidebar-link" data-tab="patients">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span data-i18n="patients">Hastalar</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-link" data-tab="whatsapp" style="margin-bottom:2px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <span data-i18n="whatsapp">WhatsApp</span>
      </button>
      <a href="profile.html" class="sidebar-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span data-i18n="settings">Profil</span>
      </a>
      <a href="#" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span data-i18n="logout">Çıkış Yap</span>
      </a>
    </div>
  </aside>

  <button id="menuToggle" style="position:fixed;top:12px;left:12px;z-index:99;width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:white;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center">☰</button>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="pageTitle" data-i18n="adminPanel">Yönetim Paneli</h1>
        <div style="font-size:13px;color:rgba(255,255,255,0.35);margin-top:4px" id="pageSubtitle"></div>
      </div>
      <div class="page-actions">
        <button id="statsToggleBtn" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer" title="İstatistikler">📊</button>
        <select class="lang-switcher" id="langSwitcher">
          <option value="tr">TR</option>
          <option value="en">EN</option>
        </select>
        <div class="avatar" id="userAvatar" style="width:36px;height:36px;font-size:14px;border:2px solid rgba(255,255,255,0.1)">D</div>
      </div>
    </div>

    <div class="tab-content active" id="tabCalendar">
      <div class="stats-grid stagger" id="statsContainer">
        <div class="stat-card-dash">
          <div class="stat-label" data-i18n="todayCount">Bugün</div>
          <div class="stat-value" id="statToday">0</div>
          <div class="stat-trend" id="trendToday"></div>
        </div>
        <div class="stat-card-dash">
          <div class="stat-label" data-i18n="totalCount">Toplam</div>
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-trend" style="opacity:0.4">·</div>
        </div>
        <div class="stat-card-dash">
          <div class="stat-label" data-i18n="pendingCount">Bekleyen</div>
          <div class="stat-value" id="statPending">0</div>
          <div class="stat-trend" style="opacity:0.4">·</div>
        </div>
        <div class="stat-card-dash">
          <div class="stat-label" data-i18n="completedCount">Tamamlanan</div>
          <div class="stat-value" id="statCompleted">0</div>
          <div class="stat-trend" style="opacity:0.4">·</div>
        </div>
      </div>
      <div id="calendar"></div>
    </div>

    <div class="tab-content" id="tabList">
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
        <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.06)">
          <span style="font-size:12px;color:rgba(255,255,255,0.4)" data-i18n="availability">Müsaitlik:</span>
          <label class="toggle-switch">

  <div id="chartInline" style="display:none;margin-top:var(--space-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:var(--space-xl);max-width:320px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md)">
      <span style="font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text)" data-i18n="stats">İstatistikler</span>
      <button id="chartCloseBtn" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px">&times;</button>

    <canvas id="chartCanvas" width="280" height="280"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://unpkg.com/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { redirectIfNotAuthenticated, getUser, clearToken } from './js/auth.js';
    import { supabase, getSession, getAppointments, cancelAppointment, generateSlots } from './js/api.js';
    import { showToast, confirmDialog, showSkeleton, getInitials } from './js/ui.js';
    import { t, initI18n, setLanguage, getCurrentLang } from './js/i18n.js';

    redirectIfNotAuthenticated();
    initI18n();

    const user = getUser();
    const avatar = document.getElementById('userAvatar');
    if (user && (user.full_name || user.email)) {
      avatar.textContent = getInitials(user.full_name || user.email);
    }

    let calendar = null;
    let allAppointments = [];
    let doctorIdCache = null;
    let chartInstance = null;

    function animateValue(el, target, duration = 600) {
      if (!el) return;
      const start = parseInt(el.textContent) || 0;
      if (start === target) return;
      const startTime = performance.now();
      function tick(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(start + (target - start) * eased);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => { el.style.animation = 'none'; el.classList.remove('active'); });
      document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
      const tabEl = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
      if (tabEl) { tabEl.style.animation = ''; tabEl.classList.add('active'); }
      document.querySelector(`.sidebar-link[data-tab="${tab}"]`)?.classList.add('active');
      if (tab === 'patients') loadPatients();
      if (tab === 'calendar') {
        if (calendar) setTimeout(() => calendar.updateSize(), 100);
        renderChart();
      }
    }

    document.querySelectorAll('.sidebar-link[data-tab]').forEach(el => {
      el.addEventListener('click', () => switchTab(el.dataset.tab));
    });

    document.getElementById('exportBtn')?.addEventListener('click', () => {
      const rows = [['Tarih','Saat','Hasta','Durum']];
      allAppointments.forEach(a => {
        rows.push([a.date, a.time?.slice(0,5)||'', a.patient_name||a.profiles?.full_name||'-', a.status]);
      });
      const csv = rows.map(r => r.join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'randevular.csv'; a.click();
      URL.revokeObjectURL(a.href);
      showToast('Dışa aktarıldı', 'success');
    });

    async function checkRole() {
      const session = await getSession();
      if (!session) return;
      const { data: profile } = await supabase.from('profiles').select('role').eq('id', session.user.id).single();
      if (profile && profile.role !== 'doctor') { window.location.href = 'panel'; return; }
      const { data: dr } = await supabase.from('doctors').select('sector, profile:profiles(full_name)').eq('profile_id', session.user.id).single();
      if (dr) {
        const sektorAdi = { 'doktor':'Doktor','kuaför':'Kuafor','güzellik':'Guzellik','berber':'Berber','spor':'Spor','fitness':'Fitness','masaj':'Masaj','avukat':'Avukat','veteriner':'Veteriner','psikolog':'Psikolog' }[dr.sector] || 'İşletme';
        document.title = `${sektorAdi} Paneli — ${dr.profile?.full_name || 'KIVON'}`;
        document.getElementById('pageTitle').textContent = `${sektorAdi} Paneli`;
        document.getElementById('pageSubtitle').textContent = dr.profile?.full_name || '';
      }
    }

    async function getDoctorId() {
      if (doctorIdCache) return doctorIdCache;
      const session = await getSession();
      const { data: doctor } = await supabase.from('doctors').select('id').eq('profile_id', session.user.id).single();
      if (!doctor) throw new Error('Doktor profili bulunamadi');
      doctorIdCache = doctor.id; return doctor.id;
    }

    async function fetchDoctorAppointments() {
      const session = await getSession();
      const doctorId = await getDoctorId();
      const { data, error } = await supabase
        .from('appointments')
        .select('id, date, time, status, notes, user_id, patient_name, patient_phone, patient_id')
        .eq('doctor_id', doctorId)
        .order('date', { ascending: true }).order('time', { ascending: true });
      if (error) throw new Error(error.message);
      if (data?.length) {
        const userIds = data.filter(a => a.user_id).map(a => a.user_id);
        if (userIds.length) {
          const { data: profiles } = await supabase.from('profiles').select('id, full_name, phone').in('id', userIds);
          if (profiles) {
            const pm = {}; profiles.forEach(p => pm[p.id] = p);
            data.forEach(a => { if (a.user_id) a.profiles = pm[a.user_id]; });
          }
        }
      }
      return data || [];
    }

    function renderChart() {
      if (chartInstance) chartInstance.destroy();
      chartInstance = null;
      const ctx = document.getElementById('chartCanvas');
      if (!ctx) return;
      const pending = allAppointments.filter(a => a.status === 'pending').length;
      const confirmed = allAppointments.filter(a => a.status === 'confirmed').length;
      const completed = allAppointments.filter(a => a.status === 'completed').length;
      const cancelled = allAppointments.filter(a => a.status === 'cancelled').length;
      if ((pending+confirmed+completed+cancelled) === 0) { document.getElementById('chartInline').style.display = 'none'; return; }
      try {
        chartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Bekleyen','Onaylandı','Tamamlandı','İptal'],
            datasets: [{
              data: [pending, confirmed, completed, cancelled],
              backgroundColor: ['rgba(245,158,11,0.7)','rgba(8,145,178,0.7)','rgba(16,185,129,0.7)','rgba(239,68,68,0.5)'],
              borderColor: ['#f59e0b','#0891b2','#10b981','#ef4444'],
              borderWidth: 2
            }]
          },
          options: {
            responsive: true, cutout: '72%',
            plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: {size:11, family:'Inter'} } } }
          }
        });
      } catch(e) { /* ignore chart errors */ }
    }

    document.getElementById('statsToggleBtn').addEventListener('click', () => {
      const el = document.getElementById('chartInline');
      if (el.style.display === 'none' || !el.style.display) { el.style.display = 'block'; setTimeout(renderChart, 50); }
      else el.style.display = 'none';
    });
    document.getElementById('chartCloseBtn').addEventListener('click', () => {
      document.getElementById('chartInline').style.display = 'none';
    });

    function initCalendar(events) {
      const el = document.getElementById('calendar');
      if (!el) return;
      if (calendar) { try { calendar.destroy(); } catch(e) { } }
      try {
        calendar = new FullCalendar.Calendar(el, {
          initialView: 'dayGridMonth', firstDay: 1, height: 600,
          headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
          events: events,
          eventClick: function(info) {
            const p = info.event.extendedProps || {};
            const statusText = p.description || '';
            showToast(`${info.event.title}`, statusText.includes('Onayland') ? 'info' : 'warning');
          },
          eventDidMount: function(info) {
            info.el.style.cursor = 'pointer';
          }
        });
        calendar.render();
      } catch(e) { /* ignore */ }
    }

    function buildCalendarEvents(appointments) {
      const labels = { pending:t('statusPending'), confirmed:t('statusConfirmed'), cancelled:t('statusCancelled'), completed:t('statusCompleted') };
      const colors = {
        pending: { bg:'rgba(245,158,11,0.2)', text:'#fcd34d', border:'#f59e0b' },
        confirmed: { bg:'rgba(8,145,178,0.2)', text:'#7dd3fc', border:'#0891b2' },
        cancelled: { bg:'rgba(239,68,68,0.15)', text:'#fca5a5', border:'#ef4444' },
        completed: { bg:'rgba(16,185,129,0.15)', text:'#6ee7b7', border:'#10b981' }
      };
      return appointments.map(apt => {
        const name = apt.profiles?.full_name || apt.patient_name || 'Bilinmeyen';
        const time = apt.time ? apt.time.slice(0,5) : '';
        const s = (apt.status||'pending').toLowerCase();
        const c = colors[s] || colors.pending;
        return {
          id: apt.id, title: time ? `${time} ${name}` : name, start: apt.date,
          backgroundColor: c.bg, textColor: c.text, borderColor: c.border,
          classNames: ['rounded'],
          extendedProps: { status:s, patientName:name, time:time, description:`${labels[s]||s}` }
        };
      });
    }

    async function loadPatients() {
      const container = document.getElementById('patientsContainer');
      showSkeleton(container, 4, 'row');
      try {
        const doctorId = await getDoctorId();
        const { data: appointments } = await supabase
          .from('appointments').select('id, date, time, status, patient_name, patient_phone, patient_id')
          .eq('doctor_id', doctorId).neq('status','cancelled').order('date', { ascending: false });
        if (!appointments?.length) {
          container.innerHTML = '<div class="empty-glass"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><h3 data-i18n="noPatients">Henüz hasta yok</h3><p>Henüz kayıtlı hastanız bulunmuyor.</p></div>';
          return;
        }
        const pm = {};
        appointments.forEach(a => {
          const k = a.patient_phone || a.patient_name || 'x';
          if (!pm[k]) pm[k] = { name: a.patient_name||'Bilinmeyen', phone: a.patient_phone||'-', count:0, lastDate:'', visits:[] };
          pm[k].count++;
          const ds = a.date ? new Date(a.date+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'}) : '';
          if (ds > pm[k].lastDate) pm[k].lastDate = ds;
          pm[k].visits.push({date:ds, time:a.time?.slice(0,5)||'', status:a.status});
        });
        const patients = Object.values(pm).sort((a,b) => b.count - a.count);
        let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <h3 style="color:white;font-size:16px;font-weight:600">${t('patients')}</h3>
          <span style="font-size:12px;color:rgba(255,255,255,0.35)">${patients.length} ${t('visitCount')}</span>
        </div>`;
        patients.forEach(p => {
          const visits = p.visits.map(v => `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
            <span style="font-size:13px;color:rgba(255,255,255,0.7)">${v.date}</span>
            <span style="font-size:12px;color:rgba(255,255,255,0.4)">${v.time}</span>
            <span class="ambient-badge ambient-badge-${v.status==='confirmed'?'success':v.status==='cancelled'?'danger':'info'}">${t('status'+v.status.charAt(0).toUpperCase()+v.status.slice(1))||v.status}</span>
          </div>`).join('');
          html += `<div class="patient-glass">
            <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
              <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:white;flex-shrink:0">${(p.name.charAt(0)||'?').toUpperCase()}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.9)">${p.name}</div>
                <div style="font-size:11px;color:rgba(255,255,255,0.35)">${p.phone}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:18px;font-weight:700;color:var(--primary-light)">${p.count}</div>
                <div style="font-size:10px;color:rgba(255,255,255,0.3)">${t('visitCount')}</div>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:rgba(255,255,255,0.2)"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div style="display:none;padding:8px 16px 12px;border-top:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.02)">
              <div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px" data-i18n="visitHistory">Ziyaret Geçmişi</div>
              ${visits || '<div style="font-size:13px;color:rgba(255,255,255,0.3);padding:8px 0">-</div>'}
            </div>
          </div>`;
        });
        container.innerHTML = html;
      } catch(err) {
        container.innerHTML = `<p style="color:rgba(239,68,68,0.7);text-align:center;padding:40px">${t('error')}<br><button class="btn btn-outline retry-btn" style="margin-top:16px" onclick="event.stopPropagation();loadAppointments()">${t('retry')}</button></p>`;
      }
    }

    async function cancelDoctorAppointment(id) {
      const doctorId = await getDoctorId();
      const { data: appt } = await supabase.from('appointments').select('slot_id').eq('id',id).eq('doctor_id',doctorId).single();
      if (!appt) throw new Error('Randevu bulunamadi');
      if (appt.slot_id) await supabase.from('availability').update({is_booked:false}).eq('id',appt.slot_id);
      const { error } = await supabase.from('appointments').update({status:'cancelled'}).eq('id',id).eq('doctor_id',doctorId);
      if (error) throw error;
      return true;
    }

    initCalendar([]);

    async function loadAppointments() {
      const container = document.getElementById('appointmentsContainer');
      const todayContainer = document.getElementById('todayAppointments');
      showSkeleton(container, 3, 'row');
      showSkeleton(todayContainer, 2, 'card');
      try {
        allAppointments = await fetchDoctorAppointments();
        const today = new Date().toISOString().slice(0,10);
        const todayApts = allAppointments.filter(a => a.date === today && a.status === 'confirmed');
        const total = allAppointments.length;
        animateValue(document.getElementById('statToday'), todayApts.length);
        animateValue(document.getElementById('statTotal'), total);
        animateValue(document.getElementById('statPending'), allAppointments.filter(a => a.status === 'pending').length);
        animateValue(document.getElementById('statCompleted'), allAppointments.filter(a => a.status === 'completed').length);
        const trend = document.getElementById('trendToday');
        if (todayApts.length > 0) trend.innerHTML = `<span style="color:var(--success);font-size:var(--text-xs)">▲ ${todayApts.length} ${t('todayCount')}</span>`;

        if (todayApts.length) {
          todayContainer.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px" class="stagger">${todayApts.map(apt => {
            const name = apt.profiles?.full_name || apt.patient_name || 'Bilinmeyen';
            return `<div class="appt-glass"><span class="apt-time">${apt.time?.slice(0,5)||''}</span><span class="apt-name">${name}</span><span class="ambient-badge ambient-badge-success">${t('statusConfirmed')}</span></div>`;
          }).join('')}</div>`;
        } else {
          todayContainer.innerHTML = '<div style="text-align:center;padding:24px;color:rgba(255,255,255,0.3);font-size:13px">Bugün randevu yok</div>';
        }

        const events = buildCalendarEvents(allAppointments);
        if (calendar) {
          calendar.removeAllEvents();
          events.forEach(e => calendar.addEvent(e));
        }
        renderChart();

        if (!allAppointments.length) {
          container.innerHTML = `<div class="empty-glass"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><h3>${t('noAppointments')}</h3><p>Henüz size ait bir randevu bulunmuyor.</p></div>`;
          return;
        }

        let tableHtml = `<table class="ambient-table"><thead><tr><th>${t('date')}</th><th>${t('time')}</th><th>${t('patient')}</th><th>${t('stats')}</th><th></th></tr></thead><tbody>`;
        allAppointments.forEach(apt => {
          const date = new Date(apt.date+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
          const time = apt.time?.slice(0,5)||'';
          const s = (apt.status||'pending').toLowerCase();
          const name = apt.profiles?.full_name || apt.patient_name || 'Bilinmeyen';
          const badgeClass = {pending:'warning',confirmed:'info',cancelled:'danger',completed:'success'}[s]||'info';
          const statusTxt = t('status'+s.charAt(0).toUpperCase()+s.slice(1))||s;
          tableHtml += `<tr><td>${date}</td><td>${time}</td><td style="color:rgba(255,255,255,0.9)">${name}</td><td><span class="ambient-badge ambient-badge-${badgeClass}">${statusTxt}</span></td><td>
            ${s==='pending'||s==='confirmed'?`<button class="btn btn-sm cancel-btn" data-id="${apt.id}" style="font-size:11px;padding:3px 12px;background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.15);border-radius:6px">${t('cancel')}</button>`:''}
          </td></tr>`;
        });
        tableHtml += '</tbody></table>';
        container.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <h3 style="color:white;font-size:16px;font-weight:600">${t('appointments')}</h3>
          <span style="font-size:12px;color:rgba(255,255,255,0.35)">${allAppointments.length}</span>
        </div><div style="overflow-x:auto">${tableHtml}</div>`;

        container.querySelectorAll('.cancel-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const ok = await confirmDialog(t('cancelConfirm'), t('cancel'));
            if (ok) {
              try { await cancelDoctorAppointment(btn.dataset.id); showToast(t('cancelled'),'success'); loadAppointments(); }
              catch(e) { showToast(t('error'),'error'); }
            }
          });
        });

      } catch(err) {
        container.innerHTML = `<p style="color:rgba(239,68,68,0.7);text-align:center;padding:40px">${t('error')}<br><button class="btn btn-outline retry-btn" style="margin-top:16px" onclick="event.stopPropagation();loadAppointments()">${t('retry')}</button></p>`;
      }
    }

    async function cancelBooking(id) {
      try { await cancelDoctorAppointment(id); return true; }
      catch { return false; }
    }

    await checkRole();
    loadAppointments();

    async function loadDoctorWhatsApp() {
      try {
        const session = await getSession();
        const { data: doctor } = await supabase.from('doctors').select('id, whatsapp_number').eq('profile_id',session.user.id).single();
        if (doctor) {
          document.getElementById('whatsappNumberDisplay').textContent = doctor.whatsapp_number || '-';
          const statusEl = document.getElementById('botStatus');
          const qrContainer = document.getElementById('qrContainer');
          if (!doctor.whatsapp_number) {
            statusEl.textContent = 'Numara ayarlanmamış';
            statusEl.style.color = 'rgba(255,255,255,0.4)';
            qrContainer.style.display = 'none';
            return;
          }
          const qrPhone = `qr_${doctor.id}`;
          const { data: qrData } = await supabase.from('whatsapp_sessions').select('*').eq('phone_number', qrPhone).maybeSingle();
          if (qrData?.conversation_state === 'connected') {
            statusEl.textContent = 'WhatsApp Bağlı ✅';
            statusEl.style.color = '#34d399';
            qrContainer.style.display = 'none';
          } else if (qrData?.context?.qr_text) {
            statusEl.textContent = 'QR hazır, okutmayı bekliyor';
            statusEl.style.color = '#fbbf24';
            qrContainer.style.display = 'block';
            document.getElementById('qrCanvas').innerHTML = '';
            new QRCode(document.getElementById('qrCanvas'), { text: qrData.context.qr_text, width: 200, height: 200 });
          } else {
            statusEl.textContent = 'Bağlanıyor...';
            statusEl.style.color = '#fbbf24';
            qrContainer.style.display = 'none';
          }
        }
      } catch(e) {}
    }
    loadDoctorWhatsApp();
    setInterval(loadDoctorWhatsApp, 5000);

    document.getElementById('editWpBtn').addEventListener('click', () => {
      document.getElementById('wpNumberForm').style.display = 'block';
      document.getElementById('wpNumberInput').value = document.getElementById('whatsappNumberDisplay').textContent === '-' ? '' : document.getElementById('whatsappNumberDisplay').textContent;
    });
    document.getElementById('cancelWpBtn').addEventListener('click', () => document.getElementById('wpNumberForm').style.display = 'none');
    document.getElementById('saveWpBtn').addEventListener('click', async () => {
      const val = document.getElementById('wpNumberInput').value.trim();
      if (!val) return;
      try {
        const session = await getSession();
        await supabase.from('doctors').update({whatsapp_number:val}).eq('profile_id',session.user.id);
        document.getElementById('whatsappNumberDisplay').textContent = val;
        document.getElementById('wpNumberForm').style.display = 'none';
        showToast('Kaydedildi','success');
      } catch(e) { showToast(t('error'),'error'); }
    });

    const toggle = document.getElementById('availabilityToggle');
    const statusEl = document.getElementById('availabilityStatus');
    toggle.addEventListener('change', () => {
      statusEl.textContent = toggle.checked ? t('available') : t('unavailable');
      statusEl.style.color = toggle.checked ? '#6ee7b7' : '#fca5a5';
    });

    const generateModal = document.getElementById('generateModal');
    document.getElementById('generateSlotsBtn').addEventListener('click', () => {
      generateModal.classList.add('open');
      document.getElementById('startDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('endDate').value = '';
    });
    generateModal.querySelector('.modal-close').addEventListener('click', () => generateModal.classList.remove('open'));
    generateModal.addEventListener('click', (e) => { if (e.target === generateModal) generateModal.classList.remove('open'); });
    document.getElementById('generateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.classList.add('btn-loading'); btn.textContent = ' Oluşturuluyor...';
      try {
        const session = await getSession();
        const { data: doctor } = await supabase.from('doctors').select('id').eq('profile_id',session.user.id).single();
        await generateSlots(doctor.id, document.getElementById('startDate').value, document.getElementById('endDate').value);
        generateModal.classList.remove('open'); loadAppointments(); showToast('Slotlar oluşturuldu','success');
      } catch(err) { showToast(t('error'),'error'); }
      finally { btn.disabled = false; btn.textContent = t('generateSlots'); }
    });

    const addModal = document.getElementById('addAppointmentModal');
    document.getElementById('addAppointmentBtn').addEventListener('click', () => {
      addModal.classList.add('open');
      document.getElementById('appointmentDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('appointmentTime').value = '';
      document.getElementById('patientName').value = '';
      document.getElementById('patientPhone').value = '';
      document.getElementById('appointmentNotes').value = '';
    });
    addModal.querySelector('.modal-close').addEventListener('click', () => addModal.classList.remove('open'));
    addModal.addEventListener('click', (e) => { if (e.target === addModal) addModal.classList.remove('open'); });
    document.getElementById('addAppointmentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const btn = f.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'Oluşturuluyor...';
      const patientName = document.getElementById('patientName').value.trim();
      const patientPhone = document.getElementById('patientPhone').value.trim().replace(/[^0-9]/g, '');
      const date = document.getElementById('appointmentDate').value;
      const time = document.getElementById('appointmentTime').value;
      const notes = document.getElementById('appointmentNotes').value.trim();
      if (!patientName || !patientPhone || !date || !time) { showToast('Lütfen tüm zorunlu alanları doldurun', 'error'); btn.disabled = false; btn.textContent = 'Randevu Oluştur'; return; }
      try {
        const session = await getSession();
        const { data: doctor } = await supabase.from('doctors').select('id').eq('profile_id', session.user.id).single();
        const phoneClean = patientPhone.replace(/[^0-9]/g, '');
        let patientId = null;
        const { data: existingPatient } = await supabase.from('patients').select('id').eq('phone', phoneClean).maybeSingle();
        if (existingPatient) { patientId = existingPatient.id; }
        else {
          const parts = patientName.split(/\s+/);
          const { data: newPatient } = await supabase.from('patients').insert({ phone: phoneClean, full_name: patientName, first_name: parts[0] || null }).select().single();
          if (newPatient) patientId = newPatient.id;
        }
        const { data: slot, error: slotError } = await supabase.from('availability').select('id').eq('doctor_id', doctor.id).eq('date', date).eq('start_time', time).eq('is_booked', false).maybeSingle();
        if (!slot || slotError) { showToast('Seçilen saat müsait değil', 'error'); btn.disabled = false; btn.textContent = 'Randevu Oluştur'; return; }
        const { error: bookErr } = await supabase.from('availability').update({ is_booked: true }).eq('id', slot.id);
        if (bookErr) throw bookErr;
        const { error: apptErr } = await supabase.from('appointments').insert({
          doctor_id: doctor.id, slot_id: slot.id, date, time, status: 'confirmed',
          patient_name: patientName, patient_phone: phoneClean, patient_id: patientId,
          notes: notes || ''
        });
        if (apptErr) throw apptErr;
        addModal.classList.remove('open');
        showToast('Randevu oluşturuldu', 'success');
        loadAppointments();
      } catch(err) { showToast(err.message || 'Hata oluştu', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Randevu Oluştur'; }
    });

    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await clearToken();
      window.location.href = 'giris';
    });
  </script>
</body>
</html>
