<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doktor Paneli — KIVON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <style>
    .stat-num-primary { color: var(--primary); }
    .stat-num-secondary { color: var(--secondary); }
    .stat-num-warning { color: var(--warning); }
    .stat-num-success { color: var(--success); }
    .section-title-sm { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .tab-nav { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .tab-btn { padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #calendar { max-width: 100%; margin: 0 auto; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .fc { font-family: 'Inter', sans-serif; }
    .fc .fc-toolbar-title { font-size: 18px; font-weight: 700; }
    .fc .fc-button-primary { background: var(--primary); border-color: var(--primary); }
    .fc .fc-button-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    .fc .fc-daygrid-day.fc-day-today { background: var(--primary-subtle); }
    .fc .fc-daygrid-event { background: var(--primary); border: none; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
    .fc .fc-daygrid-event.fc-event-cancelled { background: var(--danger-subtle); color: var(--danger); text-decoration: line-through; }
    .fc .fc-daygrid-event.fc-event-completed { background: var(--success-subtle); color: #166534; }
  </style>
</head>
<body>
  <div class="dashboard">
    <aside class="dash-sidebar" id="sidebar">
      <a href="admin.html" class="dash-sidebar-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        KIVON
      </a>
      <nav class="dash-nav">
        <a href="#" class="active" data-tab="calendar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Takvim
        </a>
        <a href="#" data-tab="list">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Liste
        </a>
        <a href="#" data-tab="patients">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Hastalar
        </a>
      </nav>
      <div class="dash-sidebar-footer">
        <a href="#" id="logoutBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cikis Yap
        </a>
      </div>
    </aside>

    <main class="dash-main">
      <div class="dash-header">
        <h1 id="pageTitle">Panel</h1>
        <div class="dash-header-right">
          <div class="user-avatar" id="userAvatar">D</div>
        </div>
      </div>

      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px">
        <div class="admin-box">
          <span style="font-size:14px;color:var(--text-muted)">Musaitlik:</span>
          <label class="toggle-switch">
            <input type="checkbox" id="availabilityToggle" checked>
            <span class="toggle-slider"></span>
          </label>
          <span id="availabilityStatus" style="font-size:14px;color:var(--success);font-weight:500">Musait</span>
        </div>
        <button class="btn btn-primary" id="generateSlotsBtn">Slot Olustur</button>
      </div>

      <div class="whatsapp-card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <svg viewBox="0 0 24 24" fill="#25D366" width="28" height="28"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          <h3 style="margin:0;font-size:18px;font-weight:600">WhatsApp Bot</h3>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <label style="font-size:13px;color:var(--text-muted);display:block;margin-bottom:4px">Bagli Numara</label>
            <div style="display:flex;align-items:center;gap:8px">
              <span id="whatsappNumberDisplay" style="font-size:16px;font-weight:500">-</span>
              <button class="btn btn-sm btn-ghost" id="editWpBtn">Degistir</button>
            </div>
          </div>
          <div>
            <label style="font-size:13px;color:var(--text-muted);display:block;margin-bottom:4px">Bot Durumu</label>
            <span id="botStatus" style="font-size:14px;color:var(--text-muted)">Bilinmiyor</span>
          </div>
        </div>
        <div id="wpNumberForm" style="display:none;margin-top:12px">
          <div style="display:flex;gap:8px">
            <input type="text" id="wpNumberInput" class="form-input" placeholder="+90 5XX XXX XXXX" style="flex:1">
            <button class="btn btn-primary" id="saveWpBtn">Kaydet</button>
            <button class="btn btn-sm btn-ghost" id="cancelWpBtn">Iptal</button>
          </div>
        </div>
        <div style="margin-top:12px;padding:12px 16px;background:var(--success-subtle);border:1px solid rgba(37,211,102,0.2);border-radius:8px;font-size:13px;color:var(--text-muted);line-height:1.6">
          <strong style="color:#059669">Baglanti:</strong> WhatsApp botunu calistirin ve QR kodu telefonda WhatsApp &gt; Bagli cihazlar &gt; Cihaz bagla ile okutun.
        </div>
      </div>

      <div class="dash-stats" style="margin-top:24px">
        <div class="stat-card">
          <div class="stat-label">Bugun</div>
          <div id="statToday" class="stat-value stat-num-primary">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Toplam</div>
          <div id="statTotal" class="stat-value stat-num-secondary">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Bekleyen</div>
          <div id="statPending" class="stat-value stat-num-warning">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Tamamlanan</div>
          <div id="statCompleted" class="stat-value stat-num-success">0</div>
        </div>
      </div>

      <div class="tab-content active" id="tabCalendar">
        <div id="calendar"></div>
      </div>

      <div class="tab-content" id="tabList">
        <div id="todayAppointments" style="margin-bottom:24px"></div>
        <div id="appointmentsContainer"></div>
      </div>

      <div class="tab-content" id="tabPatients">
        <div id="patientsContainer"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="generateModal">
    <div class="modal">
      <button class="modal-close">&times;</button>
      <h2>Slot Olustur</h2>
      <form id="generateForm">
        <div class="form-group">
          <label>Baslangic Tarihi</label>
          <input type="date" class="form-input" id="startDate" required>
        </div>
        <div class="form-group">
          <label>Bitis Tarihi</label>
          <input type="date" class="form-input" id="endDate" required>
        </div>
        <button type="submit" class="btn btn-primary form-submit">Olustur</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script type="module">
    import { redirectIfNotAuthenticated, getUser, clearToken } from './js/auth.js';
    import { supabase, getSession, getAppointments, cancelAppointment, generateSlots } from './js/api.js';

    redirectIfNotAuthenticated();

    const user = getUser();
    const avatar = document.getElementById('userAvatar');
    if (user && user.full_name) {
      avatar.textContent = user.full_name.charAt(0).toUpperCase();
    }

    let calendar = null;
    let allAppointments = [];
    let doctorIdCache = null;

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.dash-nav a').forEach(el => el.classList.remove('active'));
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
      document.querySelector(`.dash-nav a[data-tab="${tab}"]`).classList.add('active');
      if (tab === 'patients') loadPatients();
      if (tab === 'calendar' && calendar) calendar.render();
    }

    document.querySelectorAll('.dash-nav a[data-tab]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        switchTab(el.dataset.tab);
      });
    });

    async function checkRole() {
      const session = await getSession();
      if (!session) return;
      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single();
      if (profile && profile.role !== 'doctor') {
        window.location.href = 'panel.html';
      }
      const { data: dr } = await supabase
        .from('doctors')
        .select('sector, profile:profiles(full_name)')
        .eq('profile_id', session.user.id)
        .single();
      if (dr) {
        const sector = dr.sector || 'randevu';
        const name = dr.profile?.full_name || 'Panel';
        const sektorAdi = { 'doktor': 'Doktor', 'kuaför': 'Kuafor', 'güzellik': 'Guzellik', 'berber': 'Berber', 'spor': 'Spor', 'fitness': 'Fitness', 'masaj': 'Masaj', 'avukat': 'Avukat', 'veteriner': 'Veteriner', 'psikolog': 'Psikolog' }[sector] || 'Isletme';
        document.title = `${sektorAdi} Paneli — ${name}`;
        document.getElementById('pageTitle').textContent = `${sektorAdi} Paneli`;
      }
    }

    async function getDoctorId() {
      if (doctorIdCache) return doctorIdCache;
      const session = await getSession();
      if (!session) throw new Error('Oturum bulunamadi');
      const { data: doctor } = await supabase
        .from('doctors')
        .select('id')
        .eq('profile_id', session.user.id)
        .single();
      if (!doctor) throw new Error('Doktor profili bulunamadi');
      doctorIdCache = doctor.id;
      return doctor.id;
    }

    async function fetchDoctorAppointments() {
      const session = await getSession();
      if (!session) throw new Error('Oturum bulunamadi');
      const doctorId = await getDoctorId();
      const { data, error } = await supabase
        .from('appointments')
        .select('id, date, time, status, notes, user_id, patient_name, patient_phone, patient_id')
        .eq('doctor_id', doctorId)
        .order('date', { ascending: true })
        .order('time', { ascending: true });
      if (error) throw new Error(error.message);
      if (data && data.length) {
        const userIds = data.filter(a => a.user_id).map(a => a.user_id);
        if (userIds.length) {
          const { data: profiles } = await supabase
            .from('profiles')
            .select('id, full_name, phone')
            .in('id', userIds);
          if (profiles) {
            const profileMap = {};
            profiles.forEach(p => { profileMap[p.id] = p; });
            data.forEach(a => { if (a.user_id) a.profiles = profileMap[a.user_id]; });
          }
        }
      }
      return data || [];
    }

    function initCalendar(events) {
      const el = document.getElementById('calendar');
      if (!el) return;
      if (calendar) { calendar.destroy(); }
      calendar = new FullCalendar.Calendar(el, {
        initialView: 'dayGridMonth',
        locale: 'tr',
        firstDay: 1,
        height: 'auto',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek'
        },
        buttonText: {
          today: 'Bugun',
          month: 'Ay',
          week: 'Hafta',
          day: 'Gun'
        },
        events: events,
        eventClick: function(info) {
          alert(info.event.title + '\n' + (info.event.extendedProps.description || ''));
        }
      });
      calendar.render();
    }

    function buildCalendarEvents(appointments) {
      const statusLabels = { pending: 'Beklemede', confirmed: 'Onaylandi', cancelled: 'Iptal', completed: 'Tamamlandi' };
      return appointments.map(apt => {
        const patientName = apt.profiles?.full_name || apt.patient_name || 'Bilinmeyen';
        const time = apt.time ? apt.time.slice(0, 5) : '';
        const status = (apt.status || 'pending').toLowerCase();
        const colors = {
          pending: { bg: '#fef3c7', text: '#92400e', border: '#f59e0b' },
          confirmed: { bg: '#dbeafe', text: '#1e40af', border: '#3b82f6' },
          cancelled: { bg: '#fecaca', text: '#991b1b', border: '#ef4444' },
          completed: { bg: '#dcfce7', text: '#166534', border: '#22c55e' }
        };
        const c = colors[status] || colors.pending;
        return {
          id: apt.id,
          title: `${time} ${patientName}`,
          start: apt.date,
          description: `${patientName} - ${statusLabels[status] || status}${time ? ' ' + time : ''}`,
          backgroundColor: c.bg,
          textColor: c.text,
          borderColor: c.border,
          classNames: ['fc-event-' + status],
          extendedProps: { status, patientName, time }
        };
      });
    }

    async function loadPatients() {
      const container = document.getElementById('patientsContainer');
      try {
        const session = await getSession();
        const doctorId = await getDoctorId();
        const { data: appointments } = await supabase
          .from('appointments')
          .select('id, date, time, status, patient_name, patient_phone, patient_id')
          .eq('doctor_id', doctorId)
          .neq('status', 'cancelled')
          .order('date', { ascending: false });

        if (!appointments || !appointments.length) {
          container.innerHTML = '<div class="empty-state"><h3>Henuz hasta yok</h3><p>Henuz kayitli bir hastaniz bulunmuyor.</p></div>';
          return;
        }

        const patientMap = {};
        appointments.forEach(apt => {
          const key = apt.patient_phone || apt.patient_name || 'bilinmeyen';
          if (!patientMap[key]) {
            patientMap[key] = { name: apt.patient_name || 'Bilinmeyen', phone: apt.patient_phone || '-', count: 0, lastDate: '', visits: [] };
          }
          patientMap[key].count++;
          const dateStr = apt.date ? new Date(apt.date + 'T00:00:00').toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
          if (dateStr > patientMap[key].lastDate) patientMap[key].lastDate = dateStr;
          patientMap[key].visits.push({ date: dateStr, time: apt.time ? apt.time.slice(0, 5) : '', status: apt.status });
        });

        const patients = Object.values(patientMap).sort((a, b) => b.count - a.count);

        let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <h3 style="font-size:18px;font-weight:700">Hastalar</h3>
          <span style="font-size:13px;color:var(--text-muted)">${patients.length} hasta</span>
        </div>`;
        html += '<div style="display:flex;flex-direction:column;gap:8px">';
        patients.forEach(p => {
          const visitList = p.visits.map(v => 
            `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-light)">
              <span>${v.date}</span>
              <span style="color:var(--text-muted)">${v.time}</span>
              <span class="badge badge-${v.status}">${v.status === 'confirmed' ? 'Onaylandi' : v.status}</span>
            </div>`
          ).join('');
          html += `<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
            <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
              <div style="width:38px;height:38px;border-radius:50%;background:var(--secondary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0">${(p.name.charAt(0) || '?').toUpperCase()}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:15px;font-weight:600">${p.name}</div>
                <div style="font-size:12px;color:var(--text-muted)">${p.phone}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:15px;font-weight:700;color:var(--primary)">${p.count}</div>
                <div style="font-size:11px;color:var(--text-muted)">ziyaret</div>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div style="display:none;padding:8px 16px 12px;border-top:1px solid var(--border-light);background:var(--bg)">
              <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Ziyaret Gecmisi</div>
              ${visitList || '<div style="font-size:13px;color:var(--text-muted);padding:8px 0">Kayit bulunamadi</div>'}
            </div>
          </div>`;
        });
        html += '</div>';
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = `<p style="color:var(--danger);text-align:center;padding:40px">${err.message}</p>`;
      }
    }

    async function cancelDoctorAppointment(id) {
      const session = await getSession();
      if (!session) throw new Error('Oturum bulunamadi');
      const doctorId = await getDoctorId();
      const { data: appt, error: getError } = await supabase
        .from('appointments')
        .select('slot_id')
        .eq('id', id)
        .eq('doctor_id', doctorId)
        .single();
      if (getError) throw new Error('Randevu bulunamadi');
      if (appt.slot_id) {
        await supabase.from('availability').update({ is_booked: false }).eq('id', appt.slot_id);
      }
      const { error } = await supabase
        .from('appointments')
        .update({ status: 'cancelled' })
        .eq('id', id)
        .eq('doctor_id', doctorId);
      if (error) throw new Error(error.message);
      return true;
    }

    async function loadAppointments() {
      const container = document.getElementById('appointmentsContainer');
      const todayContainer = document.getElementById('todayAppointments');
      try {
        allAppointments = await fetchDoctorAppointments();
        const today = new Date().toISOString().slice(0, 10);
        const todayApts = allAppointments.filter(a => a.date === today && a.status === 'confirmed');

        const total = allAppointments.length;
        const todayCount = todayApts.length;
        const pendingCount = allAppointments.filter(a => a.status === 'pending' || a.status === 'confirmed').length;
        const completedCount = allAppointments.filter(a => a.status === 'completed').length;

        document.getElementById('statToday').textContent = todayCount;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statPending').textContent = pendingCount;
        document.getElementById('statCompleted').textContent = completedCount;

        if (todayApts.length) {
          let html = '<h3 class="section-title-sm" style="color:var(--primary)">Bugunku Randevular</h3><div style="display:flex;flex-direction:column;gap:8px">';
          todayApts.forEach(apt => {
            const time = apt.time ? apt.time.slice(0, 5) : '';
            const patientName = apt.profiles?.full_name || apt.patient_name || 'Bilinmeyen';
            html += `<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border:1px solid var(--border);border-radius:8px">
              <span style="font-size:18px;font-weight:700;color:var(--primary);min-width:50px">${time}</span>
              <span style="flex:1;font-size:15px">${patientName}</span>
              <span class="badge badge-${apt.status}">Onaylandi</span>
            </div>`;
          });
          html += '</div>';
          todayContainer.innerHTML = html;
        } else {
          todayContainer.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:14px">Bugun randevu yok</div>';
        }

        if (!allAppointments.length) {
          container.innerHTML = `
            <h3 class="section-title-sm">Tum Randevular</h3>
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <h3>Henuz randevu yok</h3>
              <p>Henuz size ait bir randevu bulunmuyor.</p>
            </div>
          `;
          return;
        }

        const table = document.createElement('table');
        table.style.cssText = 'width:100%;border-collapse:collapse';
        table.innerHTML = `
          <thead>
            <tr style="background:var(--bg);border-bottom:1px solid var(--border)">
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px">Tarih</th>
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px">Saat</th>
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px">Hasta</th>
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px">Durum</th>
              <th style="padding:12px 16px;text-align:left;color:var(--text-muted);font-weight:500;font-size:13px"></th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const tbody = table.querySelector('tbody');

        allAppointments.forEach(apt => {
          const date = new Date(apt.date + 'T00:00:00');
          const fullDate = date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
          const time = apt.time ? apt.time.slice(0, 5) : '';
          const status = (apt.status || 'pending').toLowerCase();
          const patientName = apt.profiles?.full_name || apt.patient_name || 'Bilinmeyen Hasta';
          const labels = { pending: 'Beklemede', confirmed: 'Onaylandi', cancelled: 'Iptal Edildi', completed: 'Tamamlandi' };
          const statusLabel = labels[status] || status;

          const tr = document.createElement('tr');
          tr.style.cssText = 'border-bottom:1px solid var(--border);transition:background 0.2s';
          tr.addEventListener('mouseenter', () => { tr.style.background = 'var(--bg)'; });
          tr.addEventListener('mouseleave', () => { tr.style.background = ''; });
          tr.innerHTML = `
            <td style="padding:12px 16px;font-size:14px">${fullDate}</td>
            <td style="padding:12px 16px;font-size:14px">${time}</td>
            <td style="padding:12px 16px;font-size:14px">${patientName}</td>
            <td style="padding:12px 16px"><span class="badge badge-${status}">${statusLabel}</span></td>
            <td style="padding:12px 16px">
              ${status === 'pending' || status === 'confirmed' ? `<button class="btn btn-sm btn-danger cancel-btn" data-id="${apt.id}">Iptal</button>` : ''}
            </td>
          `;
          tbody.appendChild(tr);

          const cancelBtn = tr.querySelector('.cancel-btn');
          if (cancelBtn) {
            cancelBtn.addEventListener('click', async () => {
              if (await cancelBooking(cancelBtn.dataset.id)) {
                loadAppointments();
              }
            });
          }
        });

        container.innerHTML = '<h3 class="section-title-sm">Tum Randevular</h3>';
        container.appendChild(table);

        const events = buildCalendarEvents(allAppointments);
        initCalendar(events);

      } catch (err) {
        container.innerHTML = `<p style="color:var(--danger);text-align:center;padding:40px">${err.message}</p>`;
      }
    }

    async function cancelBooking(id) {
      const confirmed = confirm('Randevuyu iptal etmek istediginize emin misiniz?');
      if (!confirmed) return false;
      try {
        await cancelDoctorAppointment(id);
        return true;
      } catch (err) {
        alert(err.message);
        return false;
      }
    }

    await checkRole();
    loadAppointments();

    async function loadDoctorWhatsApp() {
      try {
        const session = await getSession();
        const { data: doctor } = await supabase
          .from('doctors')
          .select('id, whatsapp_number')
          .eq('profile_id', session.user.id)
          .single();
        if (doctor) {
          document.getElementById('whatsappNumberDisplay').textContent = doctor.whatsapp_number || '-';
        }
      } catch (e) { /* ignore */ }
    }
    loadDoctorWhatsApp();

    document.getElementById('editWpBtn').addEventListener('click', () => {
      const display = document.getElementById('whatsappNumberDisplay');
      document.getElementById('wpNumberForm').style.display = 'block';
      document.getElementById('wpNumberInput').value = display.textContent === '-' ? '' : display.textContent;
    });
    document.getElementById('cancelWpBtn').addEventListener('click', () => {
      document.getElementById('wpNumberForm').style.display = 'none';
    });
    document.getElementById('saveWpBtn').addEventListener('click', async () => {
      const val = document.getElementById('wpNumberInput').value.trim();
      if (!val) return alert('Numara girin');
      try {
        const session = await getSession();
        const { error } = await supabase
          .from('doctors')
          .update({ whatsapp_number: val })
          .eq('profile_id', session.user.id);
        if (error) throw error;
        document.getElementById('whatsappNumberDisplay').textContent = val;
        document.getElementById('wpNumberForm').style.display = 'none';
      } catch (e) { alert('Hata: ' + e.message); }
    });

    const toggle = document.getElementById('availabilityToggle');
    const statusEl = document.getElementById('availabilityStatus');
    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        statusEl.textContent = 'Musait';
        statusEl.style.color = 'var(--success)';
      } else {
        statusEl.textContent = 'Musait Degil';
        statusEl.style.color = 'var(--danger)';
      }
    });

    const generateModal = document.getElementById('generateModal');
    document.getElementById('generateSlotsBtn').addEventListener('click', () => {
      generateModal.classList.add('open');
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('startDate').value = today;
      document.getElementById('endDate').value = '';
    });

    generateModal.querySelector('.modal-close').addEventListener('click', () => generateModal.classList.remove('open'));
    generateModal.addEventListener('click', (e) => { if (e.target === generateModal) generateModal.classList.remove('open'); });

    document.getElementById('generateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Olusturuluyor...';
      try {
        const session = await getSession();
        const { data: doctor } = await supabase
          .from('doctors')
          .select('id')
          .eq('profile_id', session.user.id)
          .single();
        await generateSlots(doctor.id, startDate, endDate);
        generateModal.classList.remove('open');
        loadAppointments();
      } catch (err) {
        alert('Hata: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Olustur';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await clearToken();
      window.location.href = 'giris.html';
    });
  </script>
</body>
</html>
