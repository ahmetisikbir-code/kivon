<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Kayit Ol — KIVON Randevu</title>
</head>
<body>
  <div class="auth-page">
    <div class="auth-canvas" id="authCanvas"></div>
    <div class="auth-card glass" style="max-width:520px">
      <h1>Kayit Ol</h1>
      <p>Isletmeniz icin KIVON hesabi olusturun</p>
      <form id="registerForm">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label for="first_name">Ad</label>
            <input type="text" id="first_name" class="form-input" placeholder="Adiniz" required>
          </div>
          <div class="form-group">
            <label for="last_name">Soyad</label>
            <input type="text" id="last_name" class="form-input" placeholder="Soyadiniz" required>
          </div>
        </div>
        <div class="form-group">
          <label for="business_name">Isletme Adi</label>
          <input type="text" id="business_name" class="form-input" placeholder="Ornegin: Dr. Ahmet Dis Poliklinigi" required>
        </div>
        <div class="form-group">
          <label for="sector">Sektor</label>
          <select id="sector" class="form-select" required>
            <option value="">Seciniz...</option>
            <option value="doktor">Doktor / Dis Hekimi</option>
            <option value="kuaför">Kuafor / Berber</option>
            <option value="güzellik">Guzellik Salonu</option>
            <option value="spor">Spor / Fitness / Pilates</option>
            <option value="masaj">Masaj / Fizyoterapi</option>
            <option value="veteriner">Veteriner</option>
            <option value="psikolog">Psikolog / Diyetisyen</option>
            <option value="avukat">Avukat / Danisman</option>
            <option value="diger">Diger</option>
          </select>
        </div>
        <div class="form-group">
          <label for="address">Adres</label>
          <input type="text" id="address" class="form-input" placeholder="Il, ilce, cadde, no ...">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label for="email">E-posta</label>
            <input type="email" id="email" class="form-input" placeholder="ornek@email.com" required>
          </div>
          <div class="form-group">
            <label for="phone">Telefon</label>
            <input type="tel" id="phone" class="form-input" placeholder="05XX XXX XX XX" required>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label for="password">Sifre</label>
            <input type="password" id="password" class="form-input" placeholder="En az 6 karakter" minlength="6" required>
          </div>
          <div class="form-group">
            <label for="confirm_password">Sifre Tekrar</label>
            <input type="password" id="confirm_password" class="form-input" placeholder="Sifrenizi tekrar girin" required>
          </div>
        </div>
        <div id="formError" class="form-error"></div>
        <div id="formSuccess" class="form-success"></div>
        <button type="submit" class="btn btn-primary form-submit">Kayit Ol</button>
      </form>
      <div class="form-footer">
        Zaten hesabin var mi? <a href="giris.html">Giris Yap</a>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
    import { initDNAScene } from './js/dna-scene.js';
    import { supabase, signup } from './js/api.js';
    import { isAuthenticated, redirectIfAuthenticated } from './js/auth.js';

    redirectIfAuthenticated();

    initDNAScene('authCanvas', { cameraZ: 8, tubeRadius: 0.12, starCount: 2000 });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('formError');
      const successEl = document.getElementById('formSuccess');
      errEl.classList.remove('visible');
      successEl.classList.remove('visible');

      const firstName = document.getElementById('first_name').value.trim();
      const lastName = document.getElementById('last_name').value.trim();
      const fullName = `${firstName} ${lastName}`;
      const businessName = document.getElementById('business_name').value.trim();
      const sector = document.getElementById('sector').value;
      const address = document.getElementById('address').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;

      if (!firstName || !lastName || !businessName || !sector || !email || !phone || !password || !confirmPassword) {
        errEl.textContent = 'Tum zorunlu alanlari doldurun.';
        errEl.classList.add('visible');
        return;
      }

      if (password !== confirmPassword) {
        errEl.textContent = 'Sifreler eslesmiyor.';
        errEl.classList.add('visible');
        return;
      }

      if (password.length < 6) {
        errEl.textContent = 'Sifre en az 6 karakter olmalidir.';
        errEl.classList.add('visible');
        return;
      }

      try {
        const res = await signup({ full_name: fullName, email, phone, role: 'doctor', password });

        const { error: profileError } = await supabase
          .from('profiles')
          .update({ full_name: businessName, role: 'doctor' })
          .eq('id', res.user.id);
        if (profileError) console.error('Profil hatasi:', profileError);

        const { error: doctorError } = await supabase
          .from('doctors')
          .insert({
            profile_id: res.user.id,
            specialty: sector,
            address: address || null,
            whatsapp_number: phone
          });
        if (doctorError) console.error('Doktor hatasi:', doctorError);

        successEl.textContent = 'Kaydiniz olusturuldu! E-posta adresinize gelen dogrulama linkine tiklayin, ardindan giris yapabilirsiniz.';
        successEl.classList.add('visible');
        document.getElementById('registerForm').querySelector('button').disabled = true;
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('visible');
      }
    });
  </script>
</body>
</html>
