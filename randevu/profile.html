<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil — KIVON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%235b5bd6'/><text x='50' y='68' font-size='52' font-weight='bold' fill='white' text-anchor='middle' font-family='Inter,sans-serif'>K</text></svg>">
  <style>
    :root {
      --bg: #0f172a; --bg-alt: #1e293b; --surface: rgba(255,255,255,0.06);
      --primary: #22d3ee; --primary-dark: #0891b2; --primary-light: #67e8f9;
      --secondary: #a78bfa; --success: #34d399; --danger: #f87171;
      --text: rgba(255,255,255,0.9); --text-muted: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .ambient-bg { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
    .ambient-bg .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.3; }
    .ambient-bg .orb-1 { width:500px; height:500px; top:-120px; right:-100px; background:radial-gradient(circle,#22d3ee 0%,transparent 70%); }
    .ambient-bg .orb-2 { width:400px; height:400px; bottom:-80px; left:-80px; background:radial-gradient(circle,#a78bfa 0%,transparent 70%); }
    .profile-card { background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:16px; padding:40px; max-width:560px; width:100%; }
    .form-label { display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
    .form-input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:15px; outline:none; transition:all 0.3s; }
    .form-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(34,211,238,0.15); }
    .form-input::placeholder { color:rgba(255,255,255,0.2); }
    .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#0f172a; font-weight:700; border:none; padding:12px 24px; border-radius:8px; cursor:pointer; font-size:14px; transition:all 0.3s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(34,211,238,0.3); }
    .btn-outline { background:transparent; color:var(--text-muted); border:1px solid var(--border); padding:12px 24px; border-radius:8px; cursor:pointer; font-size:14px; transition:all 0.3s; text-decoration:none; }
    .btn-outline:hover { background:rgba(255,255,255,0.06); color:var(--text); }
    .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { display:flex; align-items:center; gap:8px; padding:14px 20px; border-radius:10px; font-size:14px; font-weight:500; backdrop-filter:blur(16px); animation:slideIn 0.3s ease; min-width:280px; }
    .toast-success { background:rgba(52,211,153,0.2); border:1px solid rgba(52,211,153,0.3); color:#6ee7b7; }
    .toast-error { background:rgba(248,113,113,0.2); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }
    .toast-info { background:rgba(96,165,250,0.2); border:1px solid rgba(96,165,250,0.3); color:#93c5fd; }
    @keyframes slideIn { from { opacity:0; transform:translateX(100px); } to { opacity:1; transform:translateX(0); } }
    @media (max-width:640px) { .profile-card { padding:24px; margin:0 16px; } }
  </style>
</head>
<body>
  <div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
  <div style="position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px;flex-direction:column">
    <div style="width:100%;max-width:560px;margin-bottom:24px">
      <a href="admin.html" class="btn-outline" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Geri Don
      </a>
    </div>
    <div class="profile-card">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:32px">
        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#0f172a;flex-shrink:0" id="avatarInitial">K</div>
        <div>
          <h1 style="font-size:22px;font-weight:700;margin-bottom:2px">Profil</h1>
          <p style="font-size:13px;color:var(--text-muted)" id="profileEmail">Hesap bilgilerinizi duzenleyin</p>
        </div>
      </div>
      <form id="profileForm">
        <div class="form-group" style="margin-bottom:20px">
          <label class="form-label">Ad Soyad</label>
          <input type="text" class="form-input" id="fullName" required placeholder="Adiniz ve soyadiniz">
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label class="form-label">E-posta</label>
          <input type="email" class="form-input" id="email" required placeholder="ornek@email.com" disabled style="opacity:0.6">
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label class="form-label">Telefon</label>
          <input type="tel" class="form-input" id="phone" placeholder="05XX XXX XX XX">
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label class="form-label">Yeni Sifre (opsiyonel)</label>
          <input type="password" class="form-input" id="password" placeholder="Bos birakilirsa degismez" autocomplete="new-password">
        </div>
        <div style="display:flex;gap:12px;margin-top:32px">
          <button type="submit" class="btn-primary" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px" id="saveBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Kaydet
          </button>
          <a href="admin.html" class="btn-outline" style="display:flex;align-items:center;justify-content:center">Iptal</a>
        </div>
      </form>
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
        <a href="#" id="logoutBtn" style="color:var(--danger);font-size:14px;text-decoration:none;display:flex;align-items:center;gap:8px;padding:8px 0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cikis Yap
        </a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, getSession, getProfile, updateProfile } from './js/api.js';
    import { getUser, clearToken, redirectIfNotAuthenticated } from './js/auth.js';
    import { showToast } from './js/ui.js';

    redirectIfNotAuthenticated();

    async function loadProfile() {
      try {
        const session = await getSession();
        if (!session) return;
        const emailEl = document.getElementById('email');
        const nameEl = document.getElementById('fullName');
        const phoneEl = document.getElementById('phone');
        const avatarEl = document.getElementById('avatarInitial');
        emailEl.value = session.user.email || '';
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile) {
          nameEl.value = profile.full_name || '';
          phoneEl.value = profile.phone || '';
          const initial = (profile.full_name || session.user.email || 'K').charAt(0).toUpperCase();
          avatarEl.textContent = initial;
        }
      } catch (err) {
        showToast('Profil yuklenemedi: ' + err.message, 'error');
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0"></div> Kaydediliyor...';
      try {
        const session = await getSession();
        const fullName = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        if (fullName) {
          const { error: nameErr } = await supabase.from('profiles').update({ full_name: fullName, updated_at: new Date().toISOString() }).eq('id', session.user.id);
          if (nameErr) throw nameErr;
        }
        if (phone) {
          const phoneClean = phone.replace(/[^0-9]/g, '');
          const { error: phoneErr } = await supabase.from('profiles').update({ phone: phoneClean, updated_at: new Date().toISOString() }).eq('id', session.user.id);
          if (phoneErr) throw phoneErr;
        }
        if (password && password.length >= 6) {
          const { error: pwErr } = await supabase.auth.updateUser({ password });
          if (pwErr) throw pwErr;
        }
        showToast('Profil basariyla guncellendi', 'success');
        loadProfile();
        document.getElementById('password').value = '';
      } catch (err) {
        showToast(err.message || 'Hata olustu', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Kaydet';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await clearToken();
      window.location.href = 'giris.html';
    });

    loadProfile();
  </script>
</body>
</html>
