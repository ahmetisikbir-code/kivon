<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KIVON hesabiniza giris yapin.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Giris Yap — KIVON Randevu</title>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">KIVON</a>
    <div class="nav-links">
      <a href="index.html">Ana Sayfa</a>
      <a href="kayit.html" class="btn-nav">Kayit Ol</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">KIVON</a>
      <h1>Giris Yap</h1>
      <p>KIVON hesabiniza giris yapin</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">E-posta</label>
          <input type="email" id="email" class="form-input" placeholder="ornek@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Sifre</label>
          <input type="password" id="password" class="form-input" placeholder="Sifreniz" required autocomplete="current-password">
        </div>
        <div id="formError" class="form-error" role="alert"></div>
        <button type="submit" class="btn btn-primary form-submit">Giris Yap</button>
      </form>

      <div class="form-footer">
        Hesabiniz yok mu? <a href="kayit.html">Kayit Ol</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, login } from './js/api.js';
    import { isAuthenticated, redirectIfAuthenticated } from './js/auth.js';

    redirectIfAuthenticated();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('formError');
      errEl.classList.remove('visible');
      errEl.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errEl.textContent = 'E-posta ve sifre gereklidir.';
        errEl.classList.add('visible');
        return;
      }

      try {
        const result = await login(email, password);
        const { data: profile } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', result.user.id)
          .single();
        window.location.href = (profile?.role === 'doctor') ? 'admin.html' : 'panel.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('visible');
      }
    });
  </script>
</body>
</html>
