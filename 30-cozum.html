<style>:root{--navy:#050510;--cyan:#38bdf8;--indigo:#6366f1;--gold:#fbbf24;--muted:#94a3b8}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'Segoe UI','Inter',sans-serif;background:var(--navy);color:#fff;overflow-x:hidden}#canvas3d{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}.container{max-width:1100px;margin:0 auto;padding:0 24px}nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,5,16,0.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(56,189,248,0.06);height:64px}.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1200px;margin:0 auto;padding:0 24px}.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;text-decoration:none}.nav-logo span{color:var(--cyan)}.nav-logo,.nav-logo:visited{color:#fff}.hero{padding:88px 0 40px;text-align:center}.hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:-0.03em}.hero p{color:var(--muted);font-size:15px;margin-top:8px}.filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}.filter-btn{padding:6px 16px;border-radius:100px;background:rgba(15,15,40,0.4);border:1px solid rgba(56,189,248,0.08);color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;transition:0.2s;font-family:inherit}.filter-btn.active{background:rgba(56,189,248,0.1);color:var(--cyan);border-color:rgba(56,189,248,0.2)}.filter-btn:hover{color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:40px}.card{background:rgba(15,15,40,0.4);border:1px solid rgba(56,189,248,0.06);border-radius:16px;padding:24px 20px;transition:0.3s}.card:hover{border-color:rgba(56,189,248,0.15);transform:translateY(-3px)}.card .kod{font-size:11px;color:rgba(255,255,255,0.2);margin-bottom:4px;font-family:monospace}.card h3{font-size:16px;font-weight:700;margin-bottom:4px}.card .sektor{font-size:11px;color:var(--gold);margin-botto <body><canvas id="canvas3d"></canvas><script>(function(){var c=document.getElementById("canvas3d"),ctx=c.getContext("2d"),w,h,ps=[],mx={x:0,y:0};function rs(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}rs();window.addEventListener("resize",rs);window.addEventListener("mousemove",function(e){mx.x=e.clientX;mx.y=e.clientY});for(var i=0;i<80;i++){ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2})}function dr(){ctx.clearRect(0,0,w,h);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;var dx=mx.x-p.x,dy=mx.y-p.y;if(Math.sqrt(dx*dx+dy*dy)<200){p.vx+=dx*5e-5;p.vy+=dy*5e-5}ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fillStyle="rgba(56,189,248,0.15)";ctx.fill()}for(var i=0;i<ps.length;i++){for(var j=i+1;j<ps.length;j++){var dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=dx*dx+dy*dy;if(d<15000){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle="rgba(56,189,248,"+(0.03*(1-d/15000))+")";ctx.lineWidth=0.3;ctx.stroke()}}}requestAnimationFrame(dr)}dr()})();</script>

<script>
var products = [
{kod:"KIVN-MUH-001",ad:"Akıllı Fatura İşleme",sektor:"Muhasebe",fiyat:"1.500–4.500 TL/ay",aciklama:"Faturaları otomatik okur, sınıflandırır ve muhasebe sisteminize işler.",etiket:["Logo","Paraşüt","LUCA"]},
{kod:"KIVN-MUH-004",ad:"Vergi Asistanı",sektor:"Muhasebe",fiyat:"1.500–5.000 TL/ay",aciklama:"Vergi dönemlerinde beyanname hazırlığı ve hatırlatmaları.",etiket:["Vergi","Beyanname"]},
{kod:"KIVN-SAT-001",ad:"WhatsApp Satış Asistanı",sektor:"Satış",fiyat:"2.500–8.000 TL/ay",aciklama:"WhatsApp üzerinden 7/24 satış yapan AI asistan.",etiket:["WhatsApp"]},
{kod:"KIVN-SAT-004",ad:"CRM Chat Asistanı",sektor:"Satış",fiyat:"2.000–6.000 TL/ay",aciklama:"CRM verilerine doğal dille sorgulama yapmanızı sağlar.",etiket:["CRM","AI"]},
{kod:"ETC-013",ad:"Alışveriş Asistanı",sektor:"E-Ticaret",fiyat:"2.500–7.500 TL/ay",aciklama:"Müşterilere 7/24 alışveriş desteği, ürün önerisi.",etiket:["Chatbot","E-Ticaret"]},
{kod:"DOKUMAN-25",ad:"Bilgi Tabanı Chatbot",sektor:"Doküman",fiyat:"12k-20k + 1.500/ay",aciklama:"Şirket dokümanlarınıza göre eğitilmiş RAG chatbot.",etiket:["RAG","Doküman"]},
{kod:"PROJE-29",ad:"Müşteri Onboarding",sektor:"Proje",fiyat:"8k-15k + 1.000/ay",aciklama:"Yeni müşterilerin onboarding sürecini otomatikleştirir.",etiket:["Onboarding"]},
];

var sectors = [...new Set(products.map(p=>p.sektor))];
var filterDiv = document.getElementById('filters');
filterDiv.innerHTML = '<button class="filter-btn active" data-f="all">Tümü ('+products.length+')</button>' + sectors.map(s => '<button class="filter-btn" data-f="'+s+'">'+s+'</button>').join('');

function render(f) {
  var filtered = f === 'all' ? products : products.filter(p => p.sektor === f);
  document.getElementById('grid').innerHTML = filtered.map(p => '<div class="card" data-sektor="'+p.sektor+'"><div class="kod">'+p.kod+'</div><h3>'+p.ad+'</h3><div class="sektor">'+p.sektor+'</div><p>'+p.aciklama+'</p><div class="fiyat">'+p.fiyat+'<span></span></div><div>'+p.etiket.map(e => '<span class="etiket">#'+e+'</span>').join('')+'</div></div>').join('');
}
render('all');

document.querySelectorAll('.filter-btn').forEach(function(b) {
  b.onclick = function() {
    document.querySelectorAll('.filter-btn').forEach(function(x) { x.classList.remove('active'); });
    b.classList.add('active');
    render(b.dataset.f);
  };
});
</script>
<script>(function(){var b=document.getElementById("mobileToggle"),o=document.getElementById("mobileOverlay"),c=document.getElementById("mobileClose");if(b&&o){b.onclick=function(){o.style.display="flex"};c.onclick=function(){o.style.display="none"};o.querySelectorAll("a").forEach(function(a){a.onclick=function(){o.style.display="none"}})}})();</script></body>
