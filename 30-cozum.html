<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>KIVON — 30 AI Çözümü</title>
<style>:root{--navy:#050510;--cyan:#38bdf8;--indigo:#6366f1;--gold:#fbbf24;--muted:#94a3b8}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'Segoe UI','Inter',sans-serif;background:var(--navy);color:#fff;overflow-x:hidden}.container{max-width:1100px;margin:0 auto;padding:0 24px}nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,5,16,0.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(56,189,248,0.06);height:64px}.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1200px;margin:0 auto;padding:0 24px}.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;text-decoration:none}.nav-logo span{color:var(--cyan)}.nav-logo,.nav-logo:visited{color:#fff}.hero{padding:120px 0 40px;text-align:center}.hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:-0.03em}.hero p{color:var(--muted);font-size:15px;margin-top:8px}.filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}.filter-btn{padding:6px 16px;border-radius:100px;background:rgba(15,15,40,0.4);border:1px solid rgba(56,189,248,0.08);color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;transition:0.2s;font-family:inherit}.filter-btn.active{background:rgba(56,189,248,0.1);color:var(--cyan);border-color:rgba(56,189,248,0.2)}.filter-btn:hover{color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:40px}.card{background:rgba(15,15,40,0.4);border:1px solid rgba(56,189,248,0.06);border-radius:16px;padding:24px 20px;transition:0.3s}.card:hover{border-color:rgba(56,189,248,0.15);transform:translateY(-3px)}.card .kod{font-size:11px;color:rgba(255,255,255,0.2);margin-bottom:4px;font-family:monospace}.card h3{font-size:16px;font-weight:700;margin-bottom:4px}.card .sektor{font-size:11px;color:var(--gold);margin-bottom:8px}.card p{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px}.card .fiyat{font-size:14px;font-weight:700;color:var(--cyan)}.card .fiyat span{font-size:11px;font-weight:400;color:var(--muted)}.card .etiket{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(99,102,241,0.1);color:var(--indigo);margin-right:4px;margin-top:8px}.hide{display:none}footer{text-align:center;padding:40px 24px;border-top:1px solid rgba(56,189,248,0.04);color:rgba(255,255,255,0.12);font-size:12px}@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav><div class="nav-inner"><a href="index.html" class="nav-logo"><span>KIVON</span> — 30 AI Çözümü</a></div></nav>
<section class="hero container"><h1>🚀 30 AI Çözümü</h1><p>8 kategoride, 9 sektörde. Her bütçeye uygun.</p></section>

<section class="container">
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
</section>

<footer>© 2026 Kivon · Bursa · <a href="index.html" style="color:rgba(255,255,255,0.2)">Ana Sayfa</a></footer>

<script>
var products = [
{kod:"KIVN-MUH-001",ad:"Akıllı Fatura İşleme",sektor:"Muhasebe",fiyat:"1.500–4.500 TL/ay",aciklama:"Faturaları otomatik okur, sınıflandırır ve muhasebe sisteminize işler.",etiket:["Logo","Paraşüt","LUCA"]},
{kod:"KIVN-MUH-002",ad:"Kira Mutabakat Otomasyonu",sektor:"Muhasebe",fiyat:"2.000–6.000 TL/ay",aciklama:"Kira ödemelerini takip eder, mutabakat sağlar, gecikme uyarısı verir.",etiket:["Otomasyon"]},

{kod:"KIVN-SAT-001",ad:"WhatsApp Satış Asistanı",sektor:"Satış",fiyat:"2.500–8.000 TL/ay",aciklama:"WhatsApp üzerinden 7/24 satış yapan AI asistan.",etiket:["WhatsApp"]},
{kod:"KIVN-SAT-002",ad:"Lead Keşif Asistanı",sektor:"Satış",fiyat:"2.000–6.000 TL/ay",aciklama:"Potansiyel müşterileri otomatik keşfeder ve sınıflandırır.",etiket:["CRM"]},
{kod:"KIVN-SAT-003",ad:"Randevu Takip Asistanı",sektor:"Satış",fiyat:"1.000–3.500 TL/ay",aciklama:"Müşteri randevularını yönetir, hatırlatma gönderir.",etiket:["Randevu"]},
{kod:"KIVN-SAT-004",ad:"CRM Chat Asistanı",sektor:"Satış",fiyat:"2.000–6.000 TL/ay",aciklama:"CRM verilerine doğal dille sorgulama yapmanızı sağlar.",etiket:["CRM","AI"]},
{kod:"KIVN-IK-001",ad:"CV Tarama Asistanı",sektor:"İK",fiyat:"1.500–9.000 TL/ay",aciklama:"Yüzlerce CV'yi saniyeler içinde tarar ve eşleştirir.",etiket:["İşe Alım"]},
{kod:"KIVN-IK-002",ad:"AI Mülakat Platformu",sektor:"İK",fiyat:"2.500–15.000 TL/ay",aciklama:"AI destekli ön mülakat ve değerlendirme.",etiket:["Mülakat"]},
{kod:"KIVN-IK-003",ad:"Politika Chatbot",sektor:"İK",fiyat:"1.500–7.500 TL/ay",aciklama:"Şirket politikaları hakkında 7/24 bilgi veren chatbot.",etiket:["İK","Chatbot"]},
{kod:"KIVN-IK-004",ad:"Ayrımcılık Analiz Asistanı",sektor:"İK",fiyat:"3.000–12.000 TL/ay",aciklama:"İşe alım süreçlerinde ayrımcılık riskini analiz eder.",etiket:["Analiz"]},
{kod:"ETC-013",ad:"Alışveriş Asistanı",sektor:"E-Ticaret",fiyat:"2.500–7.500 TL/ay",aciklama:"Müşterilere 7/24 alışveriş desteği, ürün önerisi.",etiket:["Chatbot","E-Ticaret"]},
{kod:"ETC-014",ad:"Yorum Analizi",sektor:"E-Ticaret",fiyat:"1.500–5.000 TL/ay",aciklama:"Müşteri yorumlarını analiz eder, duygu durumu raporlar.",etiket:["Analiz"]},
{kod:"ETC-015",ad:"Stok Takip",sektor:"E-Ticaret",fiyat:"2.000–6.000 TL/ay",aciklama:"Stok seviyelerini anlık izler, kritik uyarı verir.",etiket:["Stok"]},
{kod:"ETC-016",ad:"İade Otomasyonu",sektor:"E-Ticaret",fiyat:"1.500–4.500 TL/ay",aciklama:"İade sürecini otomatik yönetir, müşteriyi bilgilendirir.",etiket:["İade"]},
{kod:"PAZ-017",ad:"Dört Platform İçerik",sektor:"Pazarlama",fiyat:"1.000–3.500 TL/ay",aciklama:"Instagram, LinkedIn, Facebook, Twitter için içerik üretir.",etiket:["Sosyal Medya"]},
{kod:"PAZ-018",ad:"Marka Sesi Blog",sektor:"Pazarlama",fiyat:"1.500–4.000 TL/ay",aciklama:"Markanızın sesiyle blog yazıları üretir.",etiket:["Blog"]},
{kod:"PAZ-019",ad:"GA4 Rapor",sektor:"Pazarlama",fiyat:"750–2.500 TL/ay",aciklama:"Google Analytics verilerini doğal dille sorgular.",etiket:["GA4","Analiz"]},
{kod:"PAZ-020",ad:"Sosyal Medya Takvim",sektor:"Pazarlama",fiyat:"1.500–4.500 TL/ay",aciklama:"Sosyal medya takviminizi AI ile planlar.",etiket:["Planlama"]},
{kod:"DST-021",ad:"Sesli Chatbot",sektor:"Destek",fiyat:"3.500–12.000 TL/ay",aciklama:"Telefonla arayan müşterilerinize AI yanıt verir.",etiket:["Ses","Telefon"]},
{kod:"DST-022",ad:"Bilet Sistemi",sektor:"Destek",fiyat:"1.000–4.000 TL/ay",aciklama:"Destek taleplerini otomatik sınıflandırır ve yönlendirir.",etiket:["Destek"]},
{kod:"DST-023",ad:"E-Posta Özet",sektor:"Destek",fiyat:"750–3.000 TL/ay",aciklama:"Gelen e-postaları özetler ve önceliklendirir.",etiket:["E-posta"]},
{kod:"DST-024",ad:"Telegram Asistan",sektor:"Destek",fiyat:"500–2.000 TL/ay",aciklama:"Telegram üzerinden müşteri desteği sağlar.",etiket:["Telegram"]},
{kod:"DOKUMAN-25",ad:"Bilgi Tabanı Chatbot",sektor:"Doküman",fiyat:"12k-20k + 1.500/ay",aciklama:"Şirket dokümanlarınıza göre eğitilmiş RAG chatbot.",etiket:["RAG","Doküman"]},
{kod:"DOKUMAN-26",ad:"Banka Ekstre Dijitalleştirme",sektor:"Doküman",fiyat:"8k-15k + 1.000/ay",aciklama:"Banka ekstrelerini dijitalleştirir, kategorize eder.",etiket:["Finans"]},
{kod:"DOKUMAN-27",ad:"Doğal Dil DB Sorgu",sektor:"Doküman",fiyat:"Özel",aciklama:"Veritabanınıza doğal dille soru sormanızı sağlar.",etiket:["Veritabanı"]},
{kod:"PROJE-28",ad:"Toplantı Asistanı",sektor:"Proje",fiyat:"6k-12k + 1.000/ay",aciklama:"Zoom toplantılarını özetler, aksiyon maddelerini çıkarır.",etiket:["Zoom","Toplantı"]},
{kod:"PROJE-29",ad:"Müşteri Onboarding",sektor:"Proje",fiyat:"8k-15k + 1.000/ay",aciklama:"Yeni müşterilerin onboarding sürecini otomatikleştirir.",etiket:["Onboarding"]},
{kod:"TEKNIK-30",ad:"Sunucu Yönetimi",sektor:"Teknik",fiyat:"8k-14k + 750/ay",aciklama:"Sunucu sağlığını izler, arıza durumunda bildirim gönderir.",etiket:["DevOps"]},
];

var sectors = [...new Set(products.map(p=>p.sektor))];
var filterDiv = document.getElementById('filters');
filterDiv.innerHTML = '<button class="filter-btn active" data-f="all">Tümü ('+products.length+')</button>' + sectors.map(s => '<button class="filter-btn" data-f="'+s+'">'+s+'</button>').join('');

function render(f) {
  var filtered = f === 'all' ? products : products.filter(p => p.sektor === f);
  document.getElementById('grid').innerHTML = filtered.map(p => '<div class="card" data-sektor="'+p.sektor+'"><div class="kod">'+p.kod+'</div><h3>'+p.ad+'</h3><div class="sektor">'+p.sektor+'</div><p>'+p.aciklama+'</p><div class="fiyat">'+p.fiyat+'<span></span></div><div>'+p.etiket.map(e => '<span class="etiket">#'+e+'</span>').join('')+'</div></div>').join('');
}
render('all');

document.querySelectorAll('.filter-btn').forEach(function(b) {
  b.onclick = function() {
    document.querySelectorAll('.filter-btn').forEach(function(x) { x.classList.remove('active'); });
    b.classList.add('active');
    render(b.dataset.f);
  };
});
</script>
</body>
</html>
