<!DOCTYPE html>

<style>
:root {
  --navy: #050510; --navy2: #0a0a1a; --cyan: #38bdf8; --indigo: #6366f1; --gold: #fbbf24;
  --white: #f1f5f9; --muted: #94a3b8;
  --tr: 0.4s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: -apple-system,'Segoe UI','Inter',sans-serif;
  background: var(--navy); color: var(--white);
  overflow-x: hidden; -webkit-font-smoothing: antialiased;
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#canvas3d { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

/* ─── CONTENT ─── */
.content {
  position:relative; z-index:1; text-align:center;
  padding:40px 24px; max-width:500px;
}
.logo {
  display:inline-flex; align-items:center; gap:10px;
  font-weight:800; font-size:20px; letter-spacing:3px; text-decoration:none; color:var(--white);
  margin-bottom:40px;
}
.logo svg { width:32px; height:32px; }
.logo span { color:var(--cyan); }

.error-404 {
  font-size:clamp(6rem,20vw,12rem); font-weight:900; letter-spacing:-0.06em; line-height:1;
  background:linear-gradient(135deg,var(--cyan) 0%,var(--indigo) 40%,#a855f7 70%,var(--gold) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:8px; animation:float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

h2 {
  font-size:20px; font-weight:300; color:rgba(255,255,255,0.3);
  margin-bottom:32px; letter-spacing:0.02em;
}

.btn {
  display:inline-flex; align-items:center; gap:8px;
  padding:16px 36px; border-radius:100px;
  background:linear-gradient(135deg,var(--cyan),var(--indigo));
  color:#fff; font-weight:700; font-size:14px; text-decoration:none;
  transition:var(--tr); box-shadow:0 0 30px rgba(56,189,248,0.15);
}
.btn:hover { transform:translateY(-3px); box-shadow:0 0 50px rgba(56,189,248,0.3); }

.hint {
  margin-top:40px; font-size:12px; color:rgba(255,255,255,0.08);
  font-family:monospace; letter-spacing:0.5px;
}

footer { position:fixed; bottom:0; left:0; right:0; z-index:1; text-align:center; padding:24px; }
footer p { font-size:11px; color:rgba(255,255,255,0.06); }
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<div class="content">
  <a href="index.html" class="logo">
    <svg viewBox="0 0 28 28" fill="none"><rect x="1" y="1" width="26" height="26" rx="7" fill="#0a0a1a" stroke="#38bdf8" stroke-width="1.5"/><circle cx="9" cy="10" r="2" fill="#38bdf8"/><circle cx="19" cy="8" r="2" fill="#38bdf8"/><circle cx="14" cy="18" r="2" fill="#38bdf8"/><line x1="11" y1="10" x2="17" y2="8" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="12" x2="12.5" y2="16.5" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/><line x1="19" y1="10.5" x2="15.5" y2="16.5" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span>KIVON</span>
  </a>

  <div class="error-404">404</div>
  <h2>Sayfa bulunamadı</h2>

  <a href="index.html" class="btn">← Ana Sayfaya Dön</a>

  <div class="hint">HTTP 404 · KIVON · kivontr.com</div>
</div>

<footer><p>© 2026 Kivon · Bursa</p></footer>

<!-- ═══ 3D BACKGROUND ═══ -->
<script>
(function() {
  var c = document.getElementById('canvas3d');
  var ctx = c.getContext('2d');
  var w, h, particles = [];
  var mouse = { x: 0, y: 0 };

  function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });

  var count = Math.min(120, Math.floor(w * h / 8000));
  for (var i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.4 + 0.1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      var dx = mouse.x - p.x, dy = mouse.y - p.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) { p.vx += dx * 0.00005; p.vy += dy * 0.00005; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(56,189,248,' + p.alpha + ')';
      ctx.fill();
    }
    for (var i = 0; i < particles.length; i++) {
      for (var j = i + 1; j < particles.length; j++) {
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var dist = dx * dx + dy * dy;
        var maxDist = 12000;
        if (dist < maxDist) {
          var alpha = 0.04 * (1 - dist / maxDist);
          if (mouse.x > 0) {
            var mx = (particles[i].x + particles[j].x) / 2 - mouse.x;
            var my = (particles[i].y + particles[j].y) / 2 - mouse.y;
            var md = Math.sqrt(mx * mx + my * my);
            if (md < 300) alpha += 0.06 * (1 - md / 300);
          }
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(56,189,248,' + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
