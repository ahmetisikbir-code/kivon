<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kivon AI — Potansiyel Müşteriler</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; }
h1 { font-size: 24px; color: #00e5ff; margin-bottom: 8px; }
.subtitle { color: #888; margin-bottom: 24px; font-size: 14px; }
.stats { display: flex; gap: 16px; margin-bottom: 24px; }
.stat-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px 24px; flex: 1; }
.stat-box .number { font-size: 32px; font-weight: 700; color: #00e5ff; }
.stat-box .label { font-size: 12px; color: #888; margin-top: 4px; }
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.filter-btn.active { background: #00e5ff; color: #000; border-color: #00e5ff; font-weight: 600; }
.search { background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 13px; flex: 1; min-width: 200px; }
.search::placeholder { color: #555; }
table { width: 100%; border-collapse: collapse; background: #111; border-radius: 8px; overflow: hidden; }
th { text-align: left; padding: 10px 14px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #222; cursor: pointer; user-select: none; }
th:hover { color: #00e5ff; }
td { padding: 10px 14px; font-size: 14px; border-bottom: 1px solid #1a1a1a; }
tr:hover td { background: #1a1a1a; }
.badge { display: inline-block; background: #00e5ff15; color: #00e5ff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge.dev { background: #7c3aed15; color: #a78bfa; }
.badge.github { background: #222; color: #888; }
.puan { font-weight: 600; }
.puan.high { color: #00e5ff; }
.puan.mid { color: #fbbf24; }
.puan.low { color: #888; }
a { color: #00e5ff; text-decoration: none; }
a:hover { text-decoration: underline; }
.loading { text-align: center; padding: 60px; color: #555; }
.date { font-size: 12px; color: #555; }
@media (max-width: 600px) {
  .stats { flex-direction: column; }
  .filters { flex-direction: column; }
  table { font-size: 12px; }
  th, td { padding: 6px 8px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Potansiyel Müşteriler</h1>
  <p class="subtitle">GitHub'da Türkiye lokasyonlu organizasyonlar — Kivon AI müşteri bulucu</p>

  <div class="stats">
    <div class="stat-box"><div class="number" id="totalCount">-</div><div class="label">Toplam</div></div>
    <div class="stat-box"><div class="number" id="companyCount">-</div><div class="label">Şirket</div></div>
    <div class="stat-box"><div class="number" id="devCount">-</div><div class="label">Geliştirici</div></div>
    <div class="stat-box"><div class="number" id="lastRun">-</div><div class="label">Son Güncelleme</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Tümü</button>
    <button class="filter-btn" data-filter="sirket">Şirketler</button>
    <button class="filter-btn" data-filter="gelistirici">Geliştiriciler</button>
    <input class="search" id="searchInput" placeholder="Ara...">
  </div>

  <table>
    <thead>
      <tr>
        <th data-sort="name">İsim</th>
        <th data-sort="type">Tür</th>
        <th data-sort="puan">Puan</th>
        <th data-sort="not">Not</th>
        <th data-sort="tarih">Tarih</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let leads = [];

async function load() {
  try {
    const res = await fetch('leads.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    leads = await res.json();
    render();
  } catch (e) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#555;">Yüklenemedi: ' + e.message + '</td></tr>';
  }
}

function formatDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('tr-TR');
}

function getPuanClass(p) {
  if (p >= 80) return 'high';
  if (p >= 50) return 'mid';
  return 'low';
}

function render() {
  const filter = document.querySelector('.filter-btn.active')?.dataset?.filter || 'all';
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = leads;
  if (filter === 'sirket') filtered = filtered.filter(l => l.type === 'sirket');
  else if (filter === 'gelistirici') filtered = filtered.filter(l => l.type === 'gelistirici');
  if (search) filtered = filtered.filter(l => l.name.toLowerCase().includes(search));

  filtered.sort((a, b) => (b.puan || 0) - (a.puan || 0));

  document.getElementById('totalCount').textContent = leads.length;
  document.getElementById('companyCount').textContent = leads.filter(l => l.type === 'sirket').length;
  document.getElementById('devCount').textContent = leads.filter(l => l.type === 'gelistirici').length;
  document.getElementById('lastRun').textContent = formatDate(leads[0]?.tarih);

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map(l => `
    <tr>
      <td><a href="${l.url || '#'}" target="_blank">${l.name}</a></td>
      <td><span class="badge ${l.type === 'gelistirici' ? 'dev' : ''}">${l.type === 'sirket' ? '🏢 Şirket' : '👤 Geliştirici'}</span></td>
      <td><span class="puan ${getPuanClass(l.puan)}">${l.puan || '-'}</span></td>
      <td style="color:#888;font-size:13px;">${l.not || '-'}</td>
      <td class="date">${formatDate(l.tarih)}</td>
    </tr>
  `).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', render);

load();
</script>
</body>
</html>
