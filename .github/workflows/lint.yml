name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML structure
        run: |
          errors=0
          for f in $(find . -name '*.html' -not -path './engine/*'); do
            if ! grep -q '</html>' "$f"; then
              echo "⚠️  $f missing </html>"
              errors=$((errors+1))
            fi
          done
          echo "Kontrol tamam: $errors eksik"
          exit 0
