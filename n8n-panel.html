  var filtered = sektor ? workflows.filter(function(w){return w.sektor===sektor}) : workflows;
  grid.innerHTML = filtered.map(function(w){

function filtreleriOlustur() {

// 3D particle background
var canvas = document.createElement('canvas');
canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0';
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
document.body.insertBefore(canvas, document.body.firstChild);
var ctx = canvas.getContext('2d');
var prt = [];
var pCount = Math.min(80, Math.floor(window.innerWidth / 15));
for(var i=0;i<pCount;i++){
  prt.push({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,z:Math.random()*300+50,
    size:Math.random()*3+1,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
    alpha:Math.random()*0.3+0.05
  });
}
function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var cx=canvas.width/2,cy=canvas.height/2;
  for(var i=0;i<prt.length;i++){
    var p=prt[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<-50)p.x=canvas.width+50;if(p.x>canvas.width+50)p.x=-50;
    if(p.y<-50)p.y=canvas.height+50;if(p.y>canvas.height+50)p.y=-50;
    var scale=500/(500+p.z);
    var px=(p.x-cx)*scale+cx,py=(p.y-cy)*scale+cy;
    ctx.beginPath();
    ctx.arc(px,py,p.size*scale,0,Math.PI*2);
    ctx.fillStyle='rgba(56,189,248,'+p.alpha*scale+')';
    ctx.fill();
  }
  requestAnimationFrame(anim);
}
anim();
